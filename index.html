window.switchLegal=function(tab){
  const c=document.getElementById("legal-content");
  const bt=document.getElementById("tab-terminos");
  const bp=document.getElementById("tab-privacidad");
  if(!c)return;
  if(bt&&bp){
    if(tab==="terminos"){
      bt.style.background="#1565C0";bt.style.color="#fff";
      bp.style.background="#fff";bp.style.color="#1565C0";
    } else {
      bp.style.background="#1565C0";bp.style.color="#fff";
      bt.style.background="#fff";bt.style.color="#1565C0";

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">I. IDENTIDAD Y DOMICILIO DEL RESPONSABLE</h3>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">II. DATOS PERSONALES QUE SE RECABAN</h3>
<p>Para la prestación de servicios médicos, QP Clinic recaba las siguientes categorías de datos personales:</p>
<p><strong>Datos de identificación:</strong> nombre completo, fecha de nacimiento, sexo, CURP, estado civil, nacionalidad, escolaridad, ocupación.</p>
<p><strong>Datos de contacto:</strong> domicilio, teléfono, celular, correo electrónico.</p>
<p><strong>Datos de salud (datos sensibles):</strong> antecedentes heredofamiliares, antecedentes personales patológicos y no patológicos, diagnósticos, tratamientos, signos vitales, estudios de laboratorio y gabinete, notas médicas, alergias, medicamentos e información relacionada con su estado de salud.</p>
<p><strong>Datos financieros:</strong> información de facturación (RFC, régimen fiscal), datos de seguro médico.</p>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">III. FINALIDADES DEL TRATAMIENTO</h3>

  <li>Prestación de servicios médicos y de salud</li>
  <li>Diagnóstico, tratamiento y seguimiento médico</li>
  <li>Emisión de recetas, notas médicas e interconsultas</li>
  <li>Cumplimiento de obligaciones legales en materia de salud</li>
  <li>Facturación de servicios médicos</li>
  <li>Gestión de cobertura con aseguradoras</li>
</ul>
<p><strong>Finalidades secundarias (puede oponerse):</strong></p>
<ul style="margin:6px 0 6px 20px">
  <li>Envío de información sobre servicios, promociones y campañas de salud de QP Clinic</li>
  <li>Evaluación de la calidad de la atención médica recibida</li>
  <li>Fines estadísticos internos (datos anonimizados)</li>
</ul>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">IV. TRANSFERENCIAS DE DATOS</h3>
<p>QP Clinic podrá transferir sus datos personales, sin requerir su consentimiento, en los siguientes casos:</p>
<ul style="margin:6px 0 6px 20px">
  <li>A médicos especialistas en caso de interconsulta, para garantizar la continuidad de su atención</li>
  <li>A instituciones de salud cuando sea necesario para su atención de urgencias</li>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">V. DERECHOS ARCO</h3>
<p>Usted tiene derecho a <strong>Acceder, Rectificar, Cancelar u Oponerse</strong> al tratamiento de sus datos personales. Para ejercer estos derechos deberá presentar solicitud por escrito a:</p>
<p style="background:#E3F2FD;padding:10px 14px;border-radius:7px;margin:8px 0"><strong>Correo:</strong> recepcion@qpclinic.mx<br>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">VI. SEGURIDAD DE LOS DATOS</h3>
<p>QP Clinic implementa medidas de seguridad administrativas, técnicas y físicas para proteger sus datos personales contra daño, pérdida, alteración, destrucción o acceso no autorizado. El sistema utiliza cifrado SSL/TLS, autenticación segura y bases de datos protegidas conforme a estándares internacionales.</p>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">VII. CAMBIOS AL AVISO DE PRIVACIDAD</h3>

<h3 style="font-size:13px;font-weight:700;color:#1565C0;margin:14px 0 6px">VIII. AUTORIDAD</h3>

window.doLogin=async function(){
  let usuario=gv("lu").trim().toLowerCase();
  const pass=gv("lp");
  if(!usuario||!pass){showLoginError("Ingresa tu usuario y contraseña");return;}
  const lb=document.getElementById("login-btn");
  lb.textContent="Entrando...";lb.disabled=true;

  // Si no tiene @ lo tratamos como username → buscar email en usuarios
  let email=usuario;
  if(!usuario.includes("@")){
    // Buscar en tabla usuarios por username
    const {data:uData}=await SB.from("usuarios").select("email,username").eq("username",usuario).maybeSingle();
    if(uData?.email){
      email=uData.email;
    } else {
      // Intentar con formato username@qpclinic.mx como fallback
      email=usuario+"@qpclinic.mx";
    }
  }

  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){
    showLoginError("Usuario o contraseña incorrectos");
    lb.textContent="Entrar al Sistema";lb.disabled=false;
    return;
  }
  STATE.user=data.user;
  const {data:prof}=await SB.from("usuarios").select("*").eq("id",data.user.id).maybeSingle();
  STATE.userProfile=prof;
  STATE.medProfile=prof; // alias para recetas y documentos
  go("agenda");
}
function showLoginError(msg){const e=document.getElementById("login-error");if(e){e.style.display="block";e.textContent=msg;}}

async function cargarPacientes(q=""){
  let query=SB.from("pacientes").select("id,numero_expediente,nombre,apellido_paterno,apellido_materno,fecha_nacimiento,celular,sexo_biologico").eq("activo",true).order("apellido_paterno");
  if(q)query=query.or(`nombre.ilike.%${q}%,apellido_paterno.ilike.%${q}%,apellido_materno.ilike.%${q}%,curp.ilike.%${q}%`);
  const {data,error}=await query.limit(50);
  const t=document.getElementById("tbl");if(!t)return;
  if(error){t.innerHTML=`<p style="color:${DA};padding:16px">Error: ${error.message}</p>`;return;}
  if(!data||data.length===0){t.innerHTML=`<div style="background:#fff;border-radius:10px;padding:32px;text-align:center;color:${MU}">No se encontraron pacientes${q?" con ese criterio":""}</div>`;return;}
  t.innerHTML=`<div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:${PL}">${["Exp.","Nombre","Ap. Paterno","Ap. Materno","Nacimiento","Celular","Sexo",""].map(h=>`<th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:${TX};text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
      <tbody>${data.map((p,i)=>`<tr style="border-top:1px solid ${BR};background:${i%2?"#FAFAFA":"#fff"}">
        <td style="padding:10px 12px;font-size:11px;color:${AC};font-weight:700">${p.numero_expediente||"—"}</td>
        <td style="padding:10px 12px;font-weight:600">${p.nombre}</td>
        <td style="padding:10px 12px">${p.apellido_paterno}</td>
        <td style="padding:10px 12px">${p.apellido_materno||""}</td>
        <td style="padding:10px 12px;color:${MU};font-size:11px">${p.fecha_nacimiento?p.fecha_nacimiento.split("-").reverse().join("/"):"—"}</td>
        <td style="padding:10px 12px">${p.celular||"—"}</td>
        <td style="padding:10px 12px;color:${MU};font-size:11px">${p.sexo_biologico||"—"}</td>
        <td style="padding:10px 12px">${btn("Ver expediente","abrirExpediente('"+p.id+"')","p",1)}</td>
      </tr>`).join("")}</tbody>
    </table>
    <p style="font-size:11px;color:${MU};padding:8px 12px">${data.length} paciente(s) encontrado(s)</p>
  </div>`;
}
window.buscarPacs=function(){
  const q=(document.getElementById("bq")||{value:""}).value.trim();
  cargarPacientes(q);
}
window.abrirExpediente=async function(id){
  loading(true,"Cargando expediente...");
  const {data,error}=await SB.from("pacientes").select("*").eq("id",id).single();
  loading(false);
  if(error||!data){showToast("Error al cargar expediente",false);return;}
  STATE.pat=data;
  STATE.expTab="ficha";
  STATE.ficTab="gen";
  STATE.consultaActual=null;
  // Cargar antecedentes en paralelo
  const [{data:ap},{data:af},{data:al},{data:disc},{data:gin}]=await Promise.all([
    SB.from("antecedentes_patologicos").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("antecedentes_familiares").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("alergias").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("discapacidades").select("categoria").eq("paciente_id",id),
    SB.from("antecedentes_gineco").select("*").eq("paciente_id",id).maybeSingle(),
  ]);
  STATE.patData=ap?JSON.parse(JSON.stringify(ap.seleccionados||{})):{};
  STATE.patOtrasNotes=ap?ap.notas_otras||"":"";
  STATE.famData=af?JSON.parse(JSON.stringify(af.datos||{})):{};
  STATE.alergs=al?JSON.parse(JSON.stringify(al.lista||[])):[];
  STATE.discapacidades=disc?disc.map(d=>d.categoria):[];
  STATE.ginData=gin||{};
  go("expediente");
}

window.guardarNuevoPac=async function(){
  const nom=gv("nn"),apP=gv("na");
  if(!nom.trim()||!apP.trim()){showToast("Nombre y apellido paterno son requeridos",false);return;}

  // Verificar sesión activa
  const {data:{session}}=await SB.auth.getSession();
  if(!session){showToast("Sesión expirada — vuelve a iniciar sesión",false);go("login");return;}

  loading(true,"Registrando paciente...");
  const payload={
    nombre:nom.trim().toUpperCase(),
    apellido_paterno:apP.trim().toUpperCase(),
    apellido_materno:gv("na2").trim().toUpperCase()||null,
    curp:gv("nc").trim().toUpperCase()||null,
    folio_clinica:gv("nfolio").trim()||null,
    fecha_nacimiento:gv("nfnac")||null,
    sexo_biologico:gv("nsb")||null,
    sexo_curp:gv("nscurp")||null,
    genero:gv("ngen")||null,
    estado_civil:gv("nec")||null,
    tipo_sangre:gv("nts")||null,
    pais_nacimiento:gv("npais")||"MÉXICO",
    entidad_federativa:gv("nef")||null,
    migrante:gv("nmig")||null,
    afromexicano:gv("nafro")||null,
    indigena:gv("nindig")||null,
    ocupacion:gv("noc")||null,
    escolaridad:gv("nesc")||null,
    celular:gv("ncel")||null,
    telefono_principal:gv("ntel")||null,
    correo:gv("nmail")||null,
    referido_por:gv("nref")||null,
    firmo_privacidad:document.getElementById("npriv")?.checked||false,
    firmo_consentimiento:document.getElementById("ncons")?.checked||false,
    created_by:session.user.id
  };

  const {data,error}=await SB.from("pacientes").insert(payload).select().single();
  loading(false);

  if(error){
    console.error("Error Supabase:",error);
    showToast("Error: "+error.message,false);
    return;
  }

  STATE.pat=data;
  STATE.expTab="ficha";
  STATE.ficTab="gen";
  STATE.famData={};
  STATE.patData={};
  STATE.patOtrasNotes="";
  STATE.alergs=["ALERGIAS NEGADAS"];
  STATE.discapacidades=[];
  STATE.consultaActual=null;

  showToast("✓ Paciente registrado — Exp. "+data.numero_expediente);
  go("expediente");
}

window.guardarAnt=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  loading(true,"Guardando antecedentes...");
  const nota=document.getElementById("pat-otras");if(nota)STATE.patOtrasNotes=nota.value;
  const texto=document.getElementById("nopa");if(texto)STATE.antNoPatText=texto.value;
  const med=document.getElementById("meda");if(med)STATE.medText=med.value;

  if(STATE.antTab==="pat"){
    await SB.from("antecedentes_patologicos").upsert({paciente_id:pid,seleccionados:STATE.patData,notas_otras:STATE.patOtrasNotes},{onConflict:"paciente_id"});
  } else if(STATE.antTab==="oc"){
    const otros=document.getElementById("oc-otros");
    if(otros)STATE.patData["oc_otros"]=otros.value;
    await SB.from("antecedentes_patologicos").upsert({paciente_id:pid,seleccionados:STATE.patData,notas_otras:STATE.patOtrasNotes},{onConflict:"paciente_id"});
  } else if(STATE.antTab==="fam"){
    await SB.from("antecedentes_familiares").upsert({paciente_id:pid,datos:STATE.famData},{onConflict:"paciente_id"});
  } else if(STATE.antTab==="al"){
    await SB.from("alergias").upsert({paciente_id:pid,lista:STATE.alergs},{onConflict:"paciente_id"});
  } else if(STATE.antTab==="nop"){
    await SB.from("antecedentes_no_patologicos").upsert({paciente_id:pid,texto:STATE.antNoPatText||""},{onConflict:"paciente_id"});
  } else if(STATE.antTab==="med"){
    await SB.from("medicamentos_usados").upsert({paciente_id:pid,texto:STATE.medText||""},{onConflict:"paciente_id"});
  }
  loading(false);
  showToast("✓ Antecedentes guardados en el expediente");
}

window.removeDiscap=async function(idx){
  const pid=STATE.pat?.id;if(!pid)return;
  const cat=STATE.discapacidades[idx];
  await SB.from("discapacidades").delete().eq("paciente_id",pid).eq("categoria",cat);
  STATE.discapacidades.splice(idx,1);renderAB();showToast("✓ Eliminada");
}

      <div style="padding:8px 10px;border-bottom:1px solid ${BR};display:flex;flex-wrap:wrap;gap:5px">
        ${s.sintomas.map(st=>`<button onclick="addSintoma('${s.key}','${st}')" style="background:#F8F9FA;color:#263238;border:1px solid ${BR};border-radius:20px;padding:3px 10px;cursor:pointer;font-size:10px;transition:all .15s" onmouseover="this.style.background='${PL}';this.style.borderColor='#90CAF9'" onmouseout="this.style.background='#F8F9FA';this.style.borderColor='${BR}'">${st}</button>`).join("")}
      </div>
      <textarea id="inter_${s.key}" rows="3" placeholder="Haga clic en los síntomas de arriba o escriba directamente..." style="width:100%;border:none;padding:9px 12px;font-size:12px;resize:vertical;outline:none;font-family:inherit;line-height:1.6;color:#263238">${data?data[s.key]||"":""}</textarea>

  `).join("");
}

window.addSintoma=function(key,txt){
  const ta=document.getElementById("inter_"+key);if(!ta)return;
  if(ta.value==="NORMAL"||ta.value==="Interrogado y negado")ta.value="";
  const sep=ta.value&&!ta.value.endsWith("\n")&&!ta.value.endsWith(", ")&&ta.value.length>0?", ":"";
  ta.value+=sep+txt;
  ta.focus();
}
window.setSintoma=function(key,txt){
  const ta=document.getElementById("inter_"+key);if(ta){ta.value=txt;ta.focus();}
}
window.guardarInterrogatorio=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  loading(true,"Guardando interrogatorio...");
  const campos=["digestivo","cardiovascular","respiratorio","urinario","genital","hematologico","endocrino","osteomuscular","nervioso"];
  const etiquetas={digestivo:"Ap. Digestivo",cardiovascular:"Ap. Cardiovascular",respiratorio:"Ap. Respiratorio",urinario:"Ap. Urinario",genital:"Ap. Genital",hematologico:"Ap. Hematológico",endocrino:"Sist. Endocrino",osteomuscular:"Sist. Osteomuscular",nervioso:"Sist. Nervioso"};
  const payload={paciente_id:pid};
  campos.forEach(c=>{const e=document.getElementById("inter_"+c);if(e)payload[c]=e.value;});
  await SB.from("interrogatorio_aparatos").upsert(payload,{onConflict:"paciente_id"});
  loading(false);
  showToast("✓ Interrogatorio guardado");

  // Mostrar resumen
  const hoy=new Date().toLocaleString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const resumen=campos.map(c=>{
    const val=payload[c]||"";
    if(!val)return null;
    const esNormal=val.trim().toUpperCase()==="NORMAL";
    const esNegado=val.trim().toLowerCase().includes("interrogado y negado");
    return{etiqueta:etiquetas[c],val,esNormal,esNegado};
  }).filter(Boolean);

  const previo=document.getElementById("inter-resumen");
  if(previo)previo.remove();

  const div=document.createElement("div");
  div.id="inter-resumen";
  div.style.cssText=`max-width:1100px;margin:0 auto 0;padding:0 14px`;
  div.innerHTML=`<div style="background:#fff;border:1.5px solid #B3E5FC;border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px #00000010">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <p style="font-size:12px;font-weight:700;color:${P}">📋 Resumen del Interrogatorio por Aparatos y Sistemas</p>
      <span style="font-size:10px;color:${MU};background:#F0F4F8;padding:3px 9px;border-radius:20px">Guardado: ${hoy}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${resumen.map(r=>`<div style="background:${r.esNormal?"#E8F5E9":r.esNegado?"#ECEFF1":"#FFF8E1"};border-radius:7px;padding:8px 10px">
        <p style="font-size:10px;font-weight:700;color:${r.esNormal?"#2E7D32":r.esNegado?"#546E7A":"#E65100"};margin-bottom:3px">${r.esNormal?"✓":r.esNegado?"—":"⚠️"} ${r.etiqueta}</p>
        <p style="font-size:10px;color:#263238;line-height:1.5">${r.esNormal?"Normal":r.esNegado?"Interrogado y negado":r.val.substring(0,120)+(r.val.length>120?"...":"")}</p>
      </div>`).join("")}
      ${resumen.length===0?`<p style="grid-column:span 3;text-align:center;color:${MU};font-size:12px">Sin datos capturados</p>`:""}
    </div>
  </div>`;

  const grid=document.getElementById("inter-grid");
  if(grid&&grid.parentNode)grid.parentNode.insertBefore(div,grid);
}

window.enviarFirmaWAGlobal=async function(){
  const cel=document.getElementById("gfcel")?.value||"";
  const pid=STATE.pat?.id;
  if(!cel){showToast("Ingresa el celular del paciente",false);return;}
  const checks=document.querySelectorAll(".doc-check:checked");
  if(checks.length===0){showToast("Selecciona al menos un documento",false);return;}
  const docs=Array.from(checks).map(c=>c.dataset.doc);
  const codigo=Math.random().toString(36).substring(2,8).toUpperCase();

  // Guardar documentos pendientes con código de firma
  if(pid){
    await SB.from("anexos").insert(docs.map(d=>({
      paciente_id:pid,
      titulo:"PENDIENTE FIRMA: "+d.toUpperCase(),
      tipo_documento:"firma_pendiente_"+d,
      origen:"digital",
      firmado:false,
      codigo_firma:codigo,
      fecha:new Date().toISOString().split("T")[0],
    })));
  }

  const celLimpio=cel.replace(/\D/g,"");
  const celFinal=celLimpio.length===10?"52"+celLimpio:celLimpio;
  const nomPac=STATE.pat?`${STATE.pat.nombre} ${STATE.pat.apellido_paterno}`:"Paciente";
  const url=`https://www.qpclinic.org/firmar?pac=${pid}&docs=${docs.join(",")}&cod=${codigo}`;
  const msg=`🏥 *QP Clinic — Firma de Documentos Médicos*\n\nEstimado(a) ${nomPac}, le enviamos el enlace para leer y firmar sus documentos médicos desde su celular:\n\n🔗 ${url}\n\n*Código de seguridad: ${codigo}*\n\nSu información es tratada con absoluta confidencialidad.\n_QP Clinic — Especialistas en Salud Integral_`;
  window.open(`https://wa.me/${celFinal}?text=${encodeURIComponent(msg)}`,"_blank");
  showToast("✓ Abre WhatsApp en +52 5644237028 y envía el mensaje");
  document.getElementById("modal-firma-global")?.remove();
}

window.subirDocumento=async function(){
  const titulo=gv("doc-titulo");const tipo=gv("doc-tipo");
  const fi=document.getElementById("file-input");
  const pid=STATE.pat?.id;
  if(!titulo.trim()){showToast("Escribe un título para el documento",false);return;}
  if(!pid)return;
  loading(true,"Subiendo documento...");
  let storagePath=null;
  if(fi?.files[0]){
    const file=fi.files[0];
    const ext=file.name.split(".").pop();
    const path=`${pid}/${Date.now()}.${ext}`;
    const {data:up,error:ue}=await SB.storage.from("expedientes").upload(path,file,{cacheControl:"3600",upsert:false});
    if(!ue)storagePath=path;
  }
  const {error}=await SB.from("anexos").insert({paciente_id:pid,titulo:titulo.toUpperCase().trim(),tipo_documento:tipo,origen:"subido",firmado:false,storage_path:storagePath||null});
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Documento subido al expediente");
  ocultarFormSubida();
  renderDocsAnexos(document.getElementById("anexo-body"));
}
window.eliminarDocsSel=async function(){
  const checks=document.querySelectorAll("#docs-tbody input[type=checkbox]:checked");
  if(checks.length===0){showToast("Selecciona al menos un documento",false);return;}
  loading(true,"Eliminando...");
  const ids=Array.from(checks).map(c=>c.dataset.id);
  await SB.from("anexos").delete().in("id",ids);
  loading(false);showToast("✓ Documento(s) eliminado(s)");
  renderDocsAnexos(document.getElementById("anexo-body"));
}
window.verPDF=async function(docId){
  loading(true,"Obteniendo documento...");
  const {data}=await SB.from("anexos").select("*").eq("id",docId).single();
  loading(false);
  if(data?.storage_path){
    const {data:urlData}=await SB.storage.from("expedientes").createSignedUrl(data.storage_path,3600);
    if(urlData?.signedUrl){
      window.open(urlData.signedUrl,"_blank");
    } else {
      showToast("Error al obtener el documento",false);
    }
  } else {
    showToast("Este documento no tiene archivo PDF adjunto aún",false);
  }
}

window.toggleMotivos=function(){
  const d=document.getElementById("motivos-dropdown");
  if(d)d.style.display=d.style.display==="none"?"block":"none";
}
window.agregarMotivo=function(motivo){
  const ta=document.getElementById("cs_subj");
  if(!ta)return;
  const sep=ta.value&&!ta.value.endsWith("\n")&&ta.value.length>0?"\n":"";
  ta.value+=sep+"Motivo de consulta: "+motivo+".";
  ta.focus();
}

// ── MODAL IA ──────────────────────────────────────────────
let _recognition=null;let _grabando=false;let _transcripcion="";let _timerGrab=null;let _segundos=0;

window.abrirModalIA=function(){
  const m=document.getElementById("modal-ia");
  if(m)m.style.display="flex";
}
window.cerrarModalIA=function(){
  const m=document.getElementById("modal-ia");
  if(m)m.style.display="none";
  if(_grabando)toggleGrabacion();
}
window.toggleGrabacion=function(){
  if(_grabando){
    // Detener grabación
    _grabando=false;
    if(_recognition){try{_recognition.stop();}catch(e){}}
    clearInterval(_timerGrab);
    document.getElementById("btn-grabar").style.background="#C62828";
    document.getElementById("txt-grabar").textContent="Iniciar grabación";
    document.getElementById("ic-grabar").textContent="🎤";
    document.getElementById("ondas").style.display="none";
    document.getElementById("tiempo-grab").style.display="none";
  } else {
    // Iniciar grabación
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("Tu navegador no soporta reconocimiento de voz. Usa Chrome.",false);return;}
    _recognition=new SR();
    _recognition.continuous=true;
    _recognition.interimResults=true;
    _recognition.lang="es-MX";
    _recognition.onresult=function(e){
      let final="";let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      _transcripcion+=final;
      const live=document.getElementById("transcripcion-live");
      if(live)live.innerHTML=(_transcripcion+"<span style='color:#90A4AE;'>"+interim+"</span>")||"Escuchando...";
    };
    _recognition.onerror=function(e){showToast("Error de micrófono: "+e.error,false);_grabando=false;};
    _recognition.start();
    _grabando=true;
    _segundos=0;
    document.getElementById("btn-grabar").style.background="#2E7D32";
    document.getElementById("txt-grabar").textContent="Detener grabación";
    document.getElementById("ic-grabar").textContent="⏹";
    document.getElementById("ondas").style.display="flex";
    document.getElementById("tiempo-grab").style.display="inline";
    _timerGrab=setInterval(()=>{
      _segundos++;
      const m=Math.floor(_segundos/60).toString().padStart(2,"0");
      const s=(_segundos%60).toString().padStart(2,"0");
      const t=document.getElementById("tiempo-grab");

window.generarNotaIA=async function(){

  if(!texto||texto.includes("Haz clic en")){
    showToast("Graba o escribe el interrogatorio primero",false);return;
  }
  const btn=document.getElementById("btn-generar-ia");
  if(btn){btn.disabled=true;btn.textContent="⚙️ Generando nota con IA...";}
  const p=STATE.pat||{};
  const pacData=`Nombre: ${p.nombre||""} ${p.apellido_paterno||""}\nEdad: ${calcEdad(p.fecha_nacimiento)}\nSexo: ${p.sexo_biologico||"No especificado"}`;
  const antData=`Alergias: ${STATE.alergs.join(", ")||"Sin alergias conocidas"}\nPatológicos: ${Object.keys(STATE.patData||{}).filter(k=>STATE.patData[k]).join(", ")||"No especificados"}`;
  try{
    const res=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({transcripcion:texto,paciente:pacData,antecedentes:antData})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    // Llenar campos IA
    const set=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    set("ia_subj",data.subjetivo);
    set("ia_expl",data.exploracion_sugerida);
    set("ia_trat",data.tratamiento);
    set("ia_lab",data.laboratorios);
    set("ia_gab",data.gabinete);
    set("ia_plan",data.plan);
    // Diagnósticos
    const dl=document.getElementById("ia_diagnosticos_lista");
    if(dl&&data.diagnosticos){
      dl.innerHTML=data.diagnosticos.map((d,i)=>`
        <label style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #C8E6C9;cursor:pointer">
          <input type="checkbox" checked data-diag="${d.cie10}: ${d.nombre}" style="accent-color:#2E7D32;width:16px;height:16px;flex-shrink:0;margin-top:2px">
          <div>

            <span style="background:${d.probabilidad==="alta"?"#C8E6C9":d.probabilidad==="media"?"#FFF3E0":"#ECEFF1"};color:${d.probabilidad==="alta"?"#1B5E20":d.probabilidad==="media"?"#E65100":"#546E7A"};padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700">Probabilidad: ${d.probabilidad}</span>
          </div>
        </label>`).join("");
    }
    document.getElementById("ia-resultados").style.display="block";
    document.getElementById("ia-resultados").scrollIntoView({behavior:"smooth"});
    showToast("✓ Nota médica generada con IA");
  }catch(err){
    showToast("Error al generar: "+err.message+". Verifica que ANTHROPIC_API_KEY esté configurada en Vercel.",false);
  }finally{
    if(btn){btn.disabled=false;btn.textContent="✨ Paso 2: Generar Nota Médica Completa";}
  }
}

window.generarPDFReceta=async function(tipo="receta"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
  const p=STATE.pat||{};
  const med=STATE.medProfile||STATE.userProfile||{};
  const contenido=document.getElementById("recipe-content")?.value||"";
  const nomPac=`${p.nombre||""} ${p.apellido_paterno||""} ${p.apellido_materno||""}`.trim().toUpperCase();
  const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
  const medNom=`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim().toUpperCase();
  const W=216, M=15; // W=ancho carta, M=margen

  // ── Función imagen con proporción ──
  async function addImg(url,x,y,maxH,maxW){
    try{
      const res=await fetch(url);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      doc.addImage(b64,url.toLowerCase().includes("png")?"PNG":"JPEG",x,y,w,h);
      return{w,h};
    }catch(e){return{w:0,h:0};}
  }

  // ── CALCULAR LÍNEAS del médico ──
  const credLines=[];
  credLines.push({txt:medNom,bold:true,sz:9});
  if(med.especialidad_1||med.institucion_grado)
    credLines.push({txt:[med.especialidad_1,med.institucion_grado].filter(Boolean).join(" ").toUpperCase(),bold:false,sz:8});
  if(med.cedula_medico)
    credLines.push({txt:`Céd. Prof. ${med.cedula_medico}`,bold:false,sz:8});
  if(med.especialidad_2||med.institucion_esp_1)
    credLines.push({txt:`Especialidad en ${[med.especialidad_2,med.institucion_esp_1].filter(Boolean).join(" ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_esp_1)
    credLines.push({txt:`Céd. Esp. ${med.cedula_esp_1}`,bold:false,sz:8});
  if(med.subespecialidad||med.institucion_esp_2)
    credLines.push({txt:`Subespecialidad en ${[med.subespecialidad,med.institucion_esp_2].filter(Boolean).join(" ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_subesp)
    credLines.push({txt:`Céd. Subesp. ${med.cedula_subesp}`,bold:false,sz:8});
  if(med.alta_especialidad)
    credLines.push({txt:`Alta Especialidad en ${med.alta_especialidad}${med.institucion_alta?" "+med.institucion_alta:""}`.toUpperCase(),bold:false,sz:8});

  const headerH=Math.max(18, credLines.length*4.5+4);
  const lineY=headerH+4;

  // ── LOGO izquierda ──
  await addImg(
    "https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg",
    M, 7, headerH-2, 35
  );

  // ── DATOS MÉDICO derecha ──
  let ry=12;
  for(const cl of credLines){
    doc.setFontSize(cl.sz);
    doc.setFont("helvetica",cl.bold?"bold":"normal");
    doc.setTextColor(cl.bold?38:70,cl.bold?50:70,cl.bold?56:70);
    // Truncar si es muy largo
    let txt=cl.txt;
    while(doc.getTextWidth(txt)>90&&txt.length>5)txt=txt.slice(0,-2);
    doc.text(txt,W-M,ry,{align:"right"});
    ry+=cl.sz===9?4.8:4;
  }

  // ── LÍNEA SEPARADORA ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.6);
  doc.line(M,lineY,W-M,lineY);

  // ── DATOS PACIENTE ──
  const py=lineY+6;
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  doc.setFont("helvetica","bold");doc.text("NOMBRE DEL PACIENTE:",M,py);
  doc.setFont("helvetica","normal");doc.text(nomPac,M+45,py);
  doc.setFont("helvetica","bold");doc.text("FECHA:",W-M-27,py);
  doc.setFont("helvetica","normal");doc.text(hoy,W-M,py,{align:"right"});

  const py2=py+5;
  doc.setFont("helvetica","bold");doc.text("Edad:",M,py2);
  doc.setFont("helvetica","normal");doc.text(calcEdad(p.fecha_nacimiento)||"",M+12,py2);
  doc.setFont("helvetica","bold");doc.text("Fecha de nacimiento:",M+46,py2);
  doc.setFont("helvetica","normal");doc.text(p.fecha_nacimiento||"",M+88,py2);

  // ── LÍNEA ──
  const l2y=py2+4;
  doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
  doc.line(M,l2y,W-M,l2y);

  // ── LEYENDA ALERGIA ──
  let contentY=l2y+7;
  if(tipo==="receta"){
    doc.setFontSize(7);doc.setFont("helvetica","italic");doc.setTextColor(90,90,90);
    doc.text("TOMAR O APLICAR SOLO SI NO ES ALÉRGICO / TAKE OR APPLY ONLY IF PATIENT IS NOT ALLERGIC",W/2,l2y+5,{align:"center"});
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
    doc.line(M,l2y+7,W-M,l2y+7);
    contentY=l2y+13;
  }

  // ── TÍTULO ──
  const titulos={receta:"TRATAMIENTO",lab:"SOLICITUD DE LABORATORIO",gab:"SOLICITUD DE ESTUDIOS DE GABINETE"};
  doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text(titulos[tipo],M,contentY);
  doc.setLineWidth(0.4);doc.setDrawColor(38,50,56);
  doc.line(M,contentY+1,M+doc.getTextWidth(titulos[tipo]),contentY+1);
  contentY+=7;

  // ── CONTENIDO ──
  const maxContentY=135; // media carta
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  for(const rawLine of contenido.split("\n")){
    if(contentY>maxContentY){doc.addPage();contentY=20;}
    if(!rawLine.trim()){contentY+=2;continue;}
    const isNum=rawLine.match(/^\d+[.\-]/);
    doc.setFont("helvetica",isNum?"bold":"normal");
    const wrapped=doc.splitTextToSize(rawLine,W-M*2);
    for(const wl of wrapped){
      if(contentY>maxContentY){doc.addPage();contentY=20;}
      doc.text(wl,M,contentY);
      contentY+=4.5;
    }
  }

  // ── FIRMA CENTRADA ──
  const firmaLineY=148;
  const firmaLineX1=W/2-38;
  const firmaLineX2=W/2+38;

  if(med.firma_digital){
    // Calcular proporciones sin dibujar
    try{
      const res=await fetch(med.firma_digital);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const maxH=18,maxW=55;
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      const fx=W/2-w/2;
      const fy=firmaLineY-h-2;
      doc.addImage(b64,med.firma_digital.toLowerCase().includes("png")?"PNG":"JPEG",fx,fy,w,h);
    }catch(e){}
  }
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(firmaLineX1,firmaLineY,firmaLineX2,firmaLineY);
  doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text("FIRMA DEL MÉDICO",W/2,firmaLineY+5,{align:"center"});

  // ── FOOTER ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(M,158,W-M,158);
  doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
  doc.text(medNom,W/2,163,{align:"center"});
  doc.text(med.direccion_clinica||"Insurgentes Sur 933, Nápoles, Benito Juárez, Ciudad de México C.P. 03810",W/2,167,{align:"center"});
  doc.text("Teléfono: 55 5682 4345 / 56 4423 7028  Celular: 55 8767 3104",W/2,171,{align:"center"});
  doc.text(med.email||"dr.polanco@qpclinic.mx",W/2,175,{align:"center"});

  const nombre=tipo==="receta"?"Receta":tipo==="lab"?"Solicitud_Lab":"Solicitud_Gabinete";
  doc.save(`${nombre}_${nomPac.replace(/ /g,"_")}_${hoy.replace(/\//g,"-")}.pdf`);
  showToast("✓ PDF generado");
}

function calcEdad(fnac){
  if(!fnac)return"—";
  const hoy=new Date(),nac=new Date(fnac);
  let años=hoy.getFullYear()-nac.getFullYear();
  let meses=hoy.getMonth()-nac.getMonth();
  if(meses<0){años--;meses+=12;}
  if(hoy.getDate()<nac.getDate())meses--;
  if(meses<0){años--;meses+=12;}
  return años>0?`${años}a ${meses}m`:`${meses} meses`;
}

window.guardarVacuna=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const nom=document.getElementById("vac-nombre")?.value;
  const fecha=document.getElementById("vac-fecha")?.value;
  if(!nom||nom===""||!fecha){showToast("Selecciona la vacuna y la fecha",false);return;}
  loading(true,"Guardando vacuna...");
  const {error}=await SB.from("vacunas").insert({
    paciente_id:pid,
    nombre:nom,
    fecha_aplicacion:fecha,
    dosis:document.getElementById("vac-dosis")?.value||null,

    laboratorio:document.getElementById("vac-lab")?.value||null,

    alta_especialidad:gv("pf_altaesp").trim(),
    institucion_alta:gv("pf_instaltaesp").trim(),
  };
  // Subir firma si se seleccionó archivo
  const firmaFile=document.getElementById("pf_firma_file")?.files[0];
  if(firmaFile){
    const ext=firmaFile.name.split(".").pop().toLowerCase();
    const path=`${uid}/firma.${ext}`;
    const {error:upErr}=await SB.storage.from("firmas-medicos").upload(path,firmaFile,{upsert:true,contentType:firmaFile.type});
    if(!upErr){
      const {data:urlData}=SB.storage.from("firmas-medicos").getPublicUrl(path);
      payload.firma_digital=urlData.publicUrl+"?t="+Date.now();
    } else {
      showToast("Error al subir firma: "+upErr.message,false);
    }
  }
  const {data,error}=await SB.from("usuarios").update(payload).eq("id",uid).select().single();
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  STATE.userProfile=data;
  STATE.medProfile=data;
  showToast("✓ Perfil médico actualizado");
  pgPerfil(); // recargar para mostrar la firma
}

window.guardarNuevoUsuario=async function(){
  const username=gv("nu_username").trim().toLowerCase();
  const email=gv("nu_email").trim().toLowerCase();
  const nom=gv("nu_nom").trim();const ap=gv("nu_ap").trim();
  if(!username||!nom||!ap){showToast("Nombre de usuario, nombre y apellidos son requeridos",false);return;}
  if(!email){showToast("Ingresa el correo del usuario (el mismo que pusiste en Supabase)",false);return;}
  loading(true,"Buscando usuario en sistema...");
  // Buscar el usuario en auth por email
  const {data:uData}=await SB.from("usuarios").select("id,email").eq("email",email).maybeSingle();
  if(!uData){
    loading(false);
    showToast("No se encontró el usuario. Primero créalo en Supabase → Authentication → Users",false);
    return;
  }
  const payload={
    username,
    nombre:nom,
    apellidos:ap,
    titulo:gv("nu_titulo"),
    rol:gv("nu_rol"),
    especialidad_1:gv("nu_esp"),
    cedula_medico:gv("nu_ced"),
    activo:true,
  };
  const {error}=await SB.from("usuarios").update(payload).eq("id",uData.id);
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Perfil de usuario configurado correctamente");
  ocultarFormNuevoUsuario();
  cargarMedicos();
}

    ${sec("Declaración","He leído la información proporcionada, he sido informado(a) por el médico tratante, entiendo los riesgos y beneficios del procedimiento, he comprendido las posibles alternativas y mis dudas han sido aclaradas satisfactoriamente. Otorgo mi consentimiento para que me sea practicado el procedimiento de infiltración. Soy conocedor(a) de que en caso de urgencia o causas imprevistas podrán utilizarse las actuaciones médicas necesarias para mantenerme con vida. Sé que puedo revocar este consentimiento en cualquier momento.")}
    ${footer}`,

    // 7. PRUEBA DE ESFUERZO
    "esfuerzo":`${header}
    ${titulo("Consentimiento Informado para Prueba de Esfuerzo","NOM-004-SSA3-2012 | NOM-006-SSA3-2011")}
    <p style="font-size:12px;margin-bottom:10px">Yo, <b>${nomPac}</b>, con ${edadPac} de edad, habiendo sido informado(a) por <b>${m.nombre_completo}</b> sobre la Prueba de Esfuerzo, manifiesto:</p>
    ${sec("¿Qué es?","Es una prueba de ejercicio físico progresivo e incremental que valora la respuesta del organismo durante el esfuerzo. Determina los umbrales aeróbico y anaeróbico individuales, permitiendo diseñar planes de entrenamiento personalizados y conocer la intensidad óptima de trabajo. Permite además la detección de arritmias, miocardiopatías y cardiopatías.")}
    ${sec("Procedimiento","Se realiza en cinta rodante o bicicleta ergométrica, aumentando progresivamente la carga. Durante toda la exploración se monitorizan presión arterial, frecuencia cardíaca y electrocardiograma. La prueba se detendrá ante síntomas o signos alarmantes.")}
    ${sec("Riesgos","Pueden presentarse síntomas como cansancio muscular, mareo, angina o dolor en piernas. En casos de enfermedad coronaria importante pueden ocurrir arritmias graves, síncope e infarto de miocardio. El riesgo de muerte es excepcional (1 por 10,000). El personal médico presente está capacitado para atender cualquier complicación.")}
    ${sec("Beneficios","Determinación del nivel de esfuerzo apropiado, optimización del entrenamiento, detección de patología cardíaca y evaluación del riesgo cardiovascular para la actividad deportiva.")}
    ${sec("Declaración","He recibido y comprendido la hoja de información. He tenido oportunidad de aclarar mis dudas en entrevista con el médico tratante. He recibido respuesta a todas mis preguntas. Tomo la decisión de manera libre y voluntaria.")}
    ${footer}`,

    // 8. GLP-1 / OZEMPIC
    "glp1":`${header}
    ${titulo("Consentimiento Informado — Tratamiento con Agonistas GLP-1","NOM-004-SSA3-2012 | Semaglutida (Ozempic®) / Tirzepatida (Mounjaro®)")}
    <p style="font-size:12px;margin-bottom:10px">Yo, <b>${nomPac}</b>, con ${edadPac} de edad, declaro que <b>${m.nombre_completo}</b>${m.especialidad_1?", "+m.especialidad_1:""}${m.cedula_medico?", Céd. Prof. "+m.cedula_medico:""} me ha informado sobre el tratamiento con agonistas del receptor GLP-1:</p>
    ${sec("Objetivo","Control de diabetes tipo 2 y/o reducción de peso corporal en el contexto de obesidad o sobrepeso, con beneficios metabólicos adicionales documentados.")}
    ${sec("Mecanismo de acción","Semaglutida (Ozempic®) es un agonista del receptor GLP-1 que incrementa la secreción de insulina en respuesta a alimentos, reduce el vaciado gástrico, disminuye la glucemia y promueve saciedad. Tirzepatida (Mounjaro®) actúa sobre receptores GLP-1 y GIP.")}
    ${sec("Beneficios esperados","Reducción de HbA1c, mejoría del control glucémico, pérdida de peso (si aplica), reducción del riesgo cardiovascular y de complicaciones de la diabetes.")}
    ${sec("Efectos adversos frecuentes (≥5%)","Náuseas, vómito, diarrea, dolor abdominal, estreñimiento, cambios en la visión.")}
    ${sec("Efectos adversos menos frecuentes","Hipoglucemia (en combinación con insulina o secretagogos), litiasis vesicular (especialmente con pérdida de peso rápida), aumento de frecuencia cardíaca, alteración en absorción de fármacos por vaciado gástrico retardado, empeoramiento de retinopatía diabética al inicio del tratamiento. Advertencia de laboratorio: tumores de células C de tiroides en roedores (no establecida causalidad en humanos).")}
    ${sec("Riesgo grave de neuropatía óptica isquémica (NAION)","Estudios publicados en JAMA Ophthalmology (julio 2024) y confirmados por la European Medicines Agency (EMA, junio 2025) identificaron asociación entre semaglutida y Neuropatía Óptica Isquémica Anterior No Arterítica (NAION): riesgo 4-7x mayor vs. otros tratamientos. La EMA clasificó NAION como efecto adverso 'muy raro' (≤1 de 10,000 pacientes). El daño puede ser irreversible. Se han identificado también asociaciones con papilitis óptica y maculopatía paracentral aguda. Ante cualquier cambio visual (visión borrosa, sombras, pérdida de visión, dolor ocular) se debe notificar inmediatamente al médico y derivar a oftalmología.")}
    ${sec("Alternativas terapéuticas","Existen otros antidiabéticos y aproximaciones para el manejo de obesidad, con sus propios perfiles de eficacia y seguridad, discutidas con el médico tratante.")}
    ${sec("Declaración de consentimiento","He sido informado(a) de los beneficios, riesgos y alternativas del tratamiento. Comprendo que puedo rechazarlo o discontinuarlo en cualquier momento. Acepto iniciar el tratamiento bajo supervisión médica, comprometiéndome a reportar con prontitud cualquier cambio visual u otro efecto adverso.")}
    ${footer}`,

    // 9. AVISO DE PRIVACIDAD (simplificado para firma)
    "privacidad":`${header}
    ${titulo("Aviso de Privacidad Simplificado","LFPDPPP | Para firma del paciente")}
    <p style="font-size:12px;margin-bottom:10px"><b>${m.institucion}</b>, con domicilio en ${m.direccion}, es responsable del tratamiento de sus datos personales conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares.</p>
    ${sec("Datos que se recaban","Datos de identificación, contacto y datos sensibles de salud (antecedentes clínicos, diagnósticos, tratamientos, estudios), así como datos financieros para facturación.")}
    ${sec("Finalidades","Integración y gestión del expediente clínico, prestación de servicios médicos, diagnóstico y tratamiento, facturación, y cumplimiento de obligaciones legales en materia de salud.")}
    ${sec("Transferencias","Sus datos podrán transferirse sin consentimiento a médicos especialistas para continuidad de atención, autoridades sanitarias cuando la ley lo requiera, y aseguradoras con su autorización.")}
    ${sec("Derechos ARCO","Puede ejercer sus derechos de Acceso, Rectificación, Cancelación u Oposición enviando solicitud a: recepcion@qpclinic.mx | ${m.direccion}")}
    ${sec("Consentimiento del paciente","Al firmar el presente documento, el paciente manifiesta haber leído y comprendido el Aviso de Privacidad completo disponible en qpclinic.org y otorga su consentimiento para el tratamiento de sus datos personales, incluyendo los datos sensibles de salud, para las finalidades señaladas.")}
    ${footer}`,
  };

  return docs[tipo]||`<p>Documento no encontrado</p>`;
}

// ── INIT ──────────────────────────────────────────────────
(async function init(){
  const {data:{session}}=await SB.auth.getSession();
  if(session){
    STATE.user=session.user;
    const {data:prof}=await SB.from("usuarios").select("*").eq("id",session.user.id).single();
    STATE.userProfile=prof;
    go("agenda");
  } else {
    go("login");
  }
  SB.auth.onAuthStateChange((event,session)=>{
    if(event==="SIGNED_OUT"){STATE.user=null;STATE.userProfile=null;go("login");}
  });
})();
</script>
