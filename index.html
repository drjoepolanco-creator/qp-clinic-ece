window.calcTfg=function(){
  const female=gv("tfg_sex")==="f";
  const age=parseFloat(gv("tfg_age")),scr=parseFloat(gv("tfg_scr")),peso=parseFloat(gv("tfg_peso")),scys=parseFloat(gv("tfg_scys"));
  const res=document.getElementById("tool-result");if(!res)return;
  if(isNaN(age)||isNaN(scr)||scr<=0){res.innerHTML=`<p style="color:${MU};font-size:13px;padding:12px;background:#F0F4F8;border-radius:8px">Complete edad y creatinina sérica para calcular.</p>`;return;}
  const egfr=ckdEpi2021(scr,age,female);
  const [stg,desc,col]=kdigoStage(egfr);

  // eGFRcr-cys (opcional)
  let crcysBlock="",txtCrCys="",egfrCrCys=null,stgCrCys=null;
  if(!isNaN(scys)&&scys>0){
    egfrCrCys=ckdEpiCrCys2021(scr,scys,age,female);
    const [stg2,,col2]=kdigoStage(egfrCrCys);stgCrCys=stg2;
    crcysBlock=`<div style="flex:1;min-width:160px;text-align:center;background:#6A1B9A14;border:1px solid #6A1B9A40;border-radius:10px;padding:14px">
      <p style="font-size:12px;color:${MU};font-weight:600;text-transform:uppercase;margin-bottom:6px">eGFRcr-cys (2021)</p>
      <p style="font-size:30px;font-weight:800;color:#6A1B9A">${egfrCrCys.toFixed(0)}</p>
      <p style="font-size:12px;color:${MU}">mL/min/1.73m² · estadio ${stg2}</p></div>`;
    txtCrCys=` eGFRcr-cys (creatinina-cistatina C, ecuación combinada 2021, más precisa): ${egfrCrCys.toFixed(0)} mL/min/1.73m² (estadio ${stg2}).`;
  }

  // Cockcroft-Gault (opcional)
  let cg="";let txtCg="";let crclVal=null;
  if(!isNaN(peso)&&peso>0){const crcl=cockcroftGault(age,peso,scr,female);crclVal=Math.round(crcl*10)/10;
    cg=`<div style="flex:1;min-width:160px;text-align:center;background:#1565C014;border:1px solid #1565C040;border-radius:10px;padding:14px">
      <p style="font-size:12px;color:${MU};font-weight:600;text-transform:uppercase;margin-bottom:6px">Cockcroft-Gault</p>
      <p style="font-size:28px;font-weight:800;color:#1565C0">${crcl.toFixed(0)}</p>
      <p style="font-size:12px;color:${MU}">mL/min · ajuste de dosis</p></div>`;
    txtCg=` Depuración Cockcroft-Gault: ${crcl.toFixed(0)} mL/min.`;
  }

  // Albuminuria / KDIGO heat map (opcional)
  const protTipo=gv("tfg_prot_tipo");
  let uacrVal=null,aCat=null,aDesc=null,heatBlock="",txtHeat="";
  if(protTipo==="uacr"){
    const u=parseFloat(gv("tfg_uacr"));
    if(!isNaN(u)&&u>=0){uacrVal=u;[aCat,aDesc]=albuminuriaCat(u);}
  } else if(protTipo==="dipstick"){
    const d=gv("tfg_dipstick");
    const map={"neg":["A1","<30 — Normal a levemente aumentada (estimado por tira)"],"1+":["A2","30–300 — Moderadamente aumentada (estimado por tira)"],"2+":["A3",">300 — Severamente aumentada (estimado por tira)"]};
    [aCat,aDesc]=map[d]||map["neg"];
  }
  if(aCat){
    const stgParaHeatmap=(stgCrCys||stg); // si hay eGFRcr-cys, usar ese para la estadificación
    const heat=kdigoHeatmap(stgParaHeatmap,aCat);
    heatBlock=`<div style="margin-top:14px;padding:14px;background:${heat.bg};border:1px solid ${heat.color}40;border-radius:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px">
        <p style="font-size:14px;font-weight:800;color:${heat.color}">🗺️ Mapa de riesgo KDIGO: ${stgParaHeatmap} + ${aCat}</p>
        <span style="background:${heat.color};color:#fff;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700">${heat.label}</span>
      </div>
      <p style="font-size:13px;color:${TX};margin-bottom:4px"><b>Albuminuria ${aCat}:</b> ${aDesc}${uacrVal!=null?` (UACR ${uacrVal} mg/g)`:""}</p>
      <p style="font-size:13px;color:${TX};line-height:1.5"><b>Recomendación:</b> ${heat.rec}</p>
    </div>`;
    txtHeat=` Albuminuria ${aCat} (${aDesc}${uacrVal!=null?`, UACR ${uacrVal} mg/g`:""}). Mapa de riesgo KDIGO ${stgParaHeatmap}+${aCat}: ${heat.label}.`;
  }

  const txt=`TFG estimada (CKD-EPI 2021): ${egfr.toFixed(0)} mL/min/1.73m² — Estadio KDIGO ${stg} (${desc}).${txtCrCys}${txtCg}${txtHeat}`;
  prepararGuardado(Math.round((egfrCrCys??egfr)*10)/10,"mL/min/1.73m²",{estadio_kdigo:stgCrCys||stg,egfr_cr:Math.round(egfr*10)/10,egfr_cr_cys:egfrCrCys!=null?Math.round(egfrCrCys*10)/10:null,scr,scys:!isNaN(scys)?scys:null,edad:age,sexo:female?"f":"m",cockcroft_gault:crclVal,albuminuria_cat:aCat,uacr:uacrVal});
  res.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:160px;text-align:center;background:${col}14;border:1px solid ${col}40;border-radius:10px;padding:14px">
        <p style="font-size:12px;color:${MU};font-weight:600;text-transform:uppercase;margin-bottom:6px">TFG — eGFRcr (2021)</p>
        <p style="font-size:30px;font-weight:800;color:${col}">${egfr.toFixed(0)}</p>
        <p style="font-size:12px;color:${MU}">mL/min/1.73m² · estadio ${stg}</p></div>
      ${crcysBlock}
      ${cg}
    </div>
    ${heatBlock}
    ${botonesResultado(txt)}`;
}

window.calcVo2=function(){
  const m=gv("vo2_metodo");const res=document.getElementById("tool-result");if(!res)return;

    const d=parseFloat(gv("vo2_dist"));

    vo2=(d-504.9)/44.73;detalle="Test de Cooper";

window.calcRm=function(){
  const w=parseFloat(gv("rm_peso")),r=parseFloat(gv("rm_reps"));
  const res=document.getElementById("tool-result");if(!res)return;
  if(isNaN(w)||isNaN(r)||w<=0||r<=0){res.innerHTML=`<p style="color:${MU};font-size:13px;padding:12px;background:#F0F4F8;border-radius:8px">Ingrese el peso levantado y las repeticiones.</p>`;return;}
  if(r>15){res.innerHTML=`<p style="color:#EF6C00;font-size:13px;padding:12px;background:#FFF3E0;border-radius:8px">⚠️ Las fórmulas pierden precisión con más de ~12–15 repeticiones. Use una serie más pesada para mayor exactitud.</p>`;return;}
  const epley=w*(1+r/30);
  const brzycki=w*36/(37-r);
  const lombardi=w*Math.pow(r,0.10);
  const prom=(epley+brzycki+lombardi)/3;
  const pcts=[[95,"Fuerza máx"],[90,"Fuerza"],[85,"Fuerza"],[80,"Fuerza-hipertrofia"],[75,"Hipertrofia"],[70,"Hipertrofia"],[65,"Resistencia"],[60,"Resistencia"]];

  const txt=`1RM estimado${ejercicio!=="Sin especificar"?" ("+ejercicio+")":""}: ${prom.toFixed(1)} kg (promedio de Epley ${epley.toFixed(1)}, Brzycki ${brzycki.toFixed(1)}, Lombardi ${lombardi.toFixed(1)} kg).`;
  prepararGuardado(Math.round(prom*10)/10,"kg",{ejercicio,peso_levantado:w,repeticiones:r,epley:Math.round(epley*10)/10,brzycki:Math.round(brzycki*10)/10,lombardi:Math.round(lombardi*10)/10});
  res.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">

        <p style="font-size:34px;font-weight:800;color:#EF6C00">${prom.toFixed(1)} <span style="font-size:16px">kg</span></p>
        <p style="font-size:12px;color:${MU}">Epley ${epley.toFixed(1)} · Brzycki ${brzycki.toFixed(1)} · Lombardi ${lombardi.toFixed(1)}</p></div>
    </div>
    <p style="font-size:13px;font-weight:700;color:${TX};margin-bottom:8px">Cargas de entrenamiento sugeridas</p>
    <table style="width:100%;border-collapse:collapse;font-size:14px">
      <thead><tr style="background:${PL}">${["% 1RM","Carga (kg)","Objetivo"].map(h=>`<th style="padding:7px 12px;text-align:left;font-weight:700;color:${TX}">${h}</th>`).join("")}</tr></thead>
      <tbody>${pcts.map(([pc,obj],i)=>`<tr style="border-top:1px solid ${BR};background:${i%2?"#FAFAFA":"#fff"}">
        <td style="padding:7px 12px;font-weight:700">${pc}%</td>
        <td style="padding:7px 12px;font-weight:700;color:#EF6C00">${(prom*pc/100).toFixed(1)}</td>
        <td style="padding:7px 12px;color:${MU}">${obj}</td></tr>`).join("")}</tbody>

}

window.guardarSV=async function(pid){
  loading(true,"Guardando signos vitales...");
  const p=parseFloat(gv("sv_peso"))||null;const t=parseFloat(gv("sv_talla"))||null;
  const imc=p&&t?parseFloat((p/(t*t)).toFixed(1)):null;
  const payload={
    paciente_id:pid,
    usuario_id:STATE.user?.id||null,
    usuario_nombre:gv("sv_enf"),
    fecha:new Date().toISOString(),
    temperatura:parseFloat(gv("sv_temp"))||null,
    frecuencia_cardiaca:parseInt(gv("sv_fc"))||null,
    frecuencia_respiratoria:parseInt(gv("sv_fr"))||null,
    saturacion_o2:parseFloat(gv("sv_sat"))||null,
    presion_sistolica:parseInt(gv("sv_tas"))||null,
    presion_diastolica:parseInt(gv("sv_tad"))||null,
    glucosa:parseFloat(gv("sv_glu"))||null,
    peso:p,talla:t,imc,
    perimetro_abdominal:parseFloat(gv("sv_pab"))||null,
    observaciones:gv("sv_obs"),
  };
  const {error}=await SB.from("signos_vitales").insert(payload);
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Signos vitales guardados");
  // Si hay una consulta abierta, pasar los valores automáticamente
  if(document.getElementById("cs_temp")){
    cargarSVEnConsulta();
    showToast("✓ Signos vitales guardados y cargados en la consulta activa");
  }
  setET("triage");
}
window.cargarSVEnConsulta=function(){
  const set=(id,val)=>{const e=document.getElementById(id);if(e&&val!==null&&val!==undefined&&val!=="")e.value=val;};
  set("cs_temp",gv("sv_temp"));set("cs_fc",gv("sv_fc"));
  set("cs_fr",gv("sv_fr"));set("cs_sat",gv("sv_sat"));
  set("cs_tas",gv("sv_tas"));set("cs_tad",gv("sv_tad"));

}

// ── 1. TIMER DE INACTIVIDAD (15 min) ─────────────────────────
let _timerInact=null,_timerWarn=null,_timerCd=null;
const INACT_WARN=14*60*1000,INACT_OUT=15*60*1000;

function iniciarTimerInactividad(){
  ["click","mousemove","keydown","touchstart","scroll"].forEach(e=>
    document.addEventListener(e,resetTimerInactividad,{passive:true}));
  resetTimerInactividad();
}
function detenerTimerInactividad(){
  clearTimeout(_timerInact);clearTimeout(_timerWarn);clearInterval(_timerCd);
  ["click","mousemove","keydown","touchstart","scroll"].forEach(e=>
    document.removeEventListener(e,resetTimerInactividad));
  document.getElementById("modal-inactividad")?.remove();
}
function resetTimerInactividad(){
  if(!STATE.user)return;
  clearTimeout(_timerInact);clearTimeout(_timerWarn);clearInterval(_timerCd);
  document.getElementById("modal-inactividad")?.remove();
  _timerWarn=setTimeout(()=>{
    const div=document.createElement("div");
    div.id="modal-inactividad";
    div.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99999;display:flex;align-items:center;justify-content:center";
    let sec=60;
    div.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 32px;text-align:center;max-width:360px;box-shadow:0 16px 40px #00000050">
      <div style="font-size:44px;margin-bottom:10px">⏱️</div>
      <h3 style="font-size:16px;font-weight:800;color:#263238;margin-bottom:8px">Sesión por cerrar</h3>
      <p style="font-size:14px;color:#546E7A;line-height:1.7;margin-bottom:16px">Por inactividad la sesión se cerrará en<br><b id="inact-cd" style="font-size:28px;color:#C62828">60</b> segundos.<br><small style="color:#9E9E9E">NOM-024-SSA3-2012 — Protección de datos del paciente</small></p>
      <button onclick="resetTimerInactividad()" style="background:#1565C0;color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;width:100%">✓ Continuar sesión</button>
    </div>`;
    document.body.appendChild(div);
    _timerCd=setInterval(()=>{
      sec--;const el=document.getElementById("inact-cd");
      if(el)el.textContent=sec;
      if(sec<=0)clearInterval(_timerCd);
    },1000);
  },INACT_WARN);
  _timerInact=setTimeout(async()=>{
    document.getElementById("modal-inactividad")?.remove();
    showToast("Sesión cerrada por inactividad — NOM-024-SSA3-2012");
    await new Promise(r=>setTimeout(r,1500));
    cerrarSesion();
  },INACT_OUT);
}

// ── 2. VALIDACIÓN DE CONTRASEÑA ROBUSTA (NOM-024) ────────────
function validarContrasena(pass){
  if(!pass||pass.length<8)return"Mínimo 8 caracteres";
  if(!/[A-Z]/.test(pass))return"Debe incluir al menos una MAYÚSCULA";
  if(!/[a-z]/.test(pass))return"Debe incluir al menos una minúscula";
  if(!/[0-9]/.test(pass))return"Debe incluir al menos un número";
  if(!/[^A-Za-z0-9]/.test(pass))return"Debe incluir al menos un carácter especial (!@#$%&...)";
  return null; // contraseña válida
}

// Parche sobre cambiarContrasena para aplicar validación robusta

}

async function guardarVersionNota(consultaId,payload){
  if(!consultaId)return;
  try{
    // Obtener versión actual antes de sobreescribir
    const {data:actual}=await SB.from("consultas")
      .select("subjetivo,exploracion_fisica,analisis,tratamiento,laboratorio,gabinete,plan,pronostico_funcion,pronostico_vida,datos_clinicos,version_num")
      .eq("id",consultaId).maybeSingle();
    if(!actual)return;
    const vn=(actual.version_num||0)+1;
    const med=STATE.userProfile||{};
    // Detectar si hubo cambios
    const camposClave=["subjetivo","exploracion_fisica","analisis","tratamiento","laboratorio","gabinete","plan"];
    const huboCambio=camposClave.some(k=>(actual[k]||"")!==(payload[k]||""));
    if(!huboCambio)return; // Sin cambios → no guardar versión
    await SB.from("consultas_historial").insert({
      consulta_id:consultaId,
      paciente_id:STATE.pat?.id,
      medico_id:STATE.user?.id,
      medico_nombre:`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim(),
      version_num:vn,
      subjetivo:actual.subjetivo,exploracion_fisica:actual.exploracion_fisica,
      analisis:actual.analisis,tratamiento:actual.tratamiento,
      laboratorio:actual.laboratorio,gabinete:actual.gabinete,plan:actual.plan,
      pronostico_funcion:actual.pronostico_funcion,pronostico_vida:actual.pronostico_vida,
      datos_clinicos:actual.datos_clinicos,
      motivo_modificacion:"Edición manual — guardado por "+`${med.nombre||""} ${med.apellidos||""}`.trim()
    });
    // Actualizar metadatos de la nota
    await SB.from("consultas").update({
      version_num:vn,
      ultima_modificacion:new Date().toISOString(),
      modificado_por:`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim()
    }).eq("id",consultaId);
  }catch(e){console.warn("Error guardando versión:",e.message);}
}

    <div style="background:${PD};padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0">
      <b style="color:#fff;font-size:15px">📋 Historial de versiones — NOM-004 Art. 15</b>
      <button onclick="this.closest('[style*=fixed]').remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:700">✕</button>
    </div>
    <div style="padding:16px">
      ${vs.length===0?`<p style="text-align:center;color:${MU};padding:20px">Sin versiones previas registradas</p>`
      :vs.map(v=>`<div style="border:1px solid ${BR};border-radius:9px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <b style="font-size:14px;color:${TX}">Versión ${v.version_num||"—"}</b>
            <span style="font-size:13px;color:${MU};margin-left:10px">${v.fecha_version?new Date(v.fecha_version).toLocaleString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):""}</span>
          </div>
          <span style="font-size:13px;color:${MU}">${v.medico_nombre||"—"}</span>
        </div>
        ${v.subjetivo?`<div style="font-size:13px;color:${MU};margin-bottom:4px"><b>Subjetivo:</b> ${(v.subjetivo||"").substring(0,200)}</div>`:""}
        ${v.tratamiento?`<div style="font-size:13px;color:${MU}"><b>Tratamiento:</b> ${(v.tratamiento||"").substring(0,200)}</div>`:""}
      </div>`).join("")}
    </div>
  </div>`;
  document.body.appendChild(overlay);
}


</script>
</body>
</html>
