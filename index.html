let S={

  famData:{},patData:{},patOtrasNotes:"",alergs:["ALERGIAS NEGADAS"],discapacidades:[],

const PACS=[

const RR=()=>document.getElementById("R");
function go(pg,ex={}){Object.assign(S,{page:pg,...ex});draw();}
function draw(){RR().innerHTML="";RR().className="fade";({login:pgLogin,agenda:pgAgenda,buscar:pgBuscar,expediente:pgExp,nuevo:pgNuevo,consulta:pgConsulta}[S.page]||pgLogin)();}
function btn(l,f,v="p",sm=0){const st={p:`background:${P};color:#fff;border:none`,s:`background:#fff;color:${P};border:1.5px solid ${BR}`,ok:`background:${SU};color:#fff;border:none`,d:`background:${DA};color:#fff;border:none`,wa:`background:${WA};color:#fff;border:none`};return`<button onclick="${f}" style="${st[v]||st.p};padding:${sm?"4px 10px":"7px 14px"};border-radius:7px;cursor:pointer;font-weight:600;font-size:${sm?11:12}px;display:inline-flex;align-items:center;gap:4px">${l}</button>`;}
function inp(id,val="",ph="",tp="text"){return`<input id="${id}" type="${tp}" value="${val}" placeholder="${ph}" style="width:100%;padding:7px 10px;border:1.5px solid ${BR};border-radius:7px;outline:none;background:#fff">`;}
function sel(id,opts,val=""){return`<select id="${id}" style="width:100%;padding:7px 10px;border:1.5px solid ${BR};border-radius:7px;outline:none;background:#fff">${opts.map(o=>`<option ${o===val?"selected":""}>${o}</option>`).join("")}</select>`;}
function ta(id,val,ph,rows=4){return`<textarea id="${id}" rows="${rows}" placeholder="${ph}" style="width:100%;padding:8px 10px;border:1.5px solid ${BR};border-radius:7px;resize:vertical;outline:none;font-family:inherit;line-height:1.5">${val||""}</textarea>`;}
function fld(l,inner,req=0){return`<div style="display:flex;flex-direction:column;gap:3px"><label style="font-size:10px;font-weight:700;color:${MU};text-transform:uppercase">${l}${req?`<span style="color:${DA}"> *</span>`:""}</label>${inner}</div>`;}
function nav(){
  const p=S.pat;
  return`<div style="background:${PD};height:46px;display:flex;align-items:center;padding:0 14px;gap:0;position:sticky;top:0;z-index:99">
    <div style="display:flex;align-items:center;gap:7px;margin-right:16px"><div style="width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center">🏥</div><b style="color:#fff;font-size:14px">QP Clinic</b></div>
    ${[["agenda","Agenda"],["buscar","Pacientes"],["nuevo","Nuevo paciente"]].map(([k,l])=>`<button onclick="go('${k}')" style="padding:0 11px;height:46px;border:none;background:${S.page===k?"rgba(255,255,255,.15)":"transparent"};color:#fff;cursor:pointer;font-size:12px;border-bottom:${S.page===k?"3px solid #64B5F6":"3px solid transparent"}">${l}</button>`).join("")}
    <div style="margin-left:auto;display:flex;gap:7px;align-items:center">
      ${p?`<button onclick="go('expediente')" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:3px 9px;color:#fff;cursor:pointer;font-size:10px">📋 ${p.nom} ${p.ap}</button>`:""}
      <span style="color:rgba(255,255,255,.8);font-size:11px">Dr. Polanco F.</span>
      <button onclick="go('login')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:3px 9px;color:#fff;cursor:pointer;font-size:11px">Salir</button>
    </div>
  </div>`;
}
function showToast(msg,ok=true){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:${ok?SU:DA};color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 12px #00000030`;
  t.textContent=msg;t.style.display="block";clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2500);
}

// ── LOGIN ──
function pgLogin(){RR().innerHTML=`<div style="min-height:100vh;background:linear-gradient(135deg,${PD},${AC});display:flex;align-items:center;justify-content:center;padding:20px"><div style="background:#fff;border-radius:16px;padding:36px;width:340px;box-shadow:0 16px 40px #00000030"><div style="text-align:center;margin-bottom:24px"><div style="width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,${P},${AC});margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px">🏥</div><h1 style="font-size:22px;color:${P};font-weight:800">QP Clinic</h1><p style="color:${MU};font-size:12px;margin-top:2px">Expediente Clínico Electrónico</p></div><div style="display:flex;flex-direction:column;gap:12px">${fld("Usuario",inp("lu","dr.polanco","usuario@qpclinic.mx"))}${fld("Contraseña",inp("lp","","••••••••","password"))}<button onclick="go('agenda')" style="width:100%;padding:10px;background:${P};color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px">Entrar al Sistema</button></div><p style="text-align:center;font-size:11px;color:#90A4AE;margin-top:16px">Al ingresar acepta los <span style="color:${P};cursor:pointer">Términos y Aviso de Privacidad</span></p><p style="text-align:center;font-size:11px;color:${AC};margin-top:10px;font-style:italic">"Ciencia, calidez y compromiso"</p></div></div>`;}

,1)}${btn("🔒 Bloquear","","s",1)}</div></div><div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;overflow:hidden">${hrs.map(h=>{const c=CITAS.find(x=>x.h===h);return`<div style="display:flex;min-height:${c?62:40}px;border-bottom:1px solid ${BR}"><div style="width:60px;padding:8px 12px;flex-shrink:0;border-right:1px solid ${BR};display:flex;align-items:flex-start"><span style="font-size:11px;color:${MU}">${h}</span></div><div style="flex:1;padding:7px 12px;display:flex;align-items:center">${c?`<div style="flex:1;background:${c.s?"#E8F5E9":"#FFF8E1"};border-left:3px solid ${c.s?SU:"#FFA726"};border-radius:6px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between"><div><b style="font-size:12px">${c.p}</b><p style="font-size:10px;color:${MU}">${c.t}</p></div><div style="display:flex;gap:6px;align-items:center"><span style="background:${c.s?"#C8E6C9":"#FFE0B2"};color:${c.s?"#1B5E20":"#E65100"};padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700">${c.s?"Confirmada":"Por confirmar"}</span><button onclick="verCita('${c.p}')" style="background:${P};color:#fff;border:none;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:10px;font-weight:600">Ver expediente</button></div></div>`:`<span style="font-size:10px;color:#ddd">— disponible</span>`}</div></div>`;}).join("")}</div></div></div>`;
}
window.verCita=function(n){const p=PACS.find(x=>x.nom===n.split(" ")[0])||PACS[0];S.pat=p;go("expediente");}

// ── BUSCAR ──
function pgBuscar(){
  RR().innerHTML=nav()+`<div style="max-width:920px;margin:0 auto;padding:16px" class="fade"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:17px;font-weight:800;color:${TX}">Buscar Paciente</h2>${btn("➕ Nuevo paciente","go('nuevo')","p",1)}</div><div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;padding:14px;margin-bottom:12px"><div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:140px">${fld("Nombre o apellidos",`<input id="bq" oninput="filtrar()" placeholder="Buscar..." style="width:100%;padding:7px 10px;border:1.5px solid ${BR};border-radius:7px;outline:none">`)}</div><div style="flex:1;min-width:100px">${fld("No. Expediente",inp("be","","377223"))}</div><div style="display:flex;align-items:flex-end">${btn("🔍 Buscar","","p",1)}</div></div></div><div id="tbl"></div></div>`;renderTbl(PACS);
}
window.filtrar=function(){const q=(document.getElementById("bq")||{value:""}).value.toLowerCase();renderTbl(q.length>1?PACS.filter(p=>`${p.nom} ${p.ap} ${p.am}`.toLowerCase().includes(q)):PACS);}
function renderTbl(list){const t=document.getElementById("tbl");if(!t)return;t.innerHTML=`<div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;overflow:hidden"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:${PL}">${["Exp.","Nombre","Ap. Paterno","Ap. Materno","Nacimiento","Celular","Edad",""].map(h=>`<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:${TX};text-transform:uppercase">${h}</th>`).join("")}</tr></thead><tbody>${list.map((p,i)=>`<tr style="border-top:1px solid ${BR};background:${i%2?"#FAFAFA":"#fff"}"><td style="padding:9px 10px;font-size:11px;color:${AC};font-weight:700">${p.exp}</td><td style="padding:9px 10px">${p.nom}</td><td style="padding:9px 10px">${p.ap}</td><td style="padding:9px 10px">${p.am}</td><td style="padding:9px 10px;color:${MU};font-size:11px">${p.nac}</td><td style="padding:9px 10px">${p.cel}</td><td style="padding:9px 10px;color:${MU};font-size:11px">${p.edad}</td><td style="padding:9px 10px"><button onclick="selPac(${PACS.indexOf(p)})" style="background:${P};color:#fff;border:none;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:10px;font-weight:600">Ver expediente</button></td></tr>`).join("")}</tbody></table></div>`;}
window.selPac=function(i){S.pat=PACS[i];go("expediente");}

}
window.setNT=function(t){S.nuevoTab=t;renderNB();}

  else if(S.anexos.subTab==="formularios"){

    <div style="background:${PL};border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:${TX}">

window.mostrarFormSubida=function(){const f=document.getElementById("form-subida");if(f)f.style.display="block";}

window.agregarAnotacion=function(){
  const titulo=document.getElementById("anot-titulo");
  const tipo=document.getElementById("anot-tipo");
  const texto=document.getElementById("anot-texto");
  if(!titulo||!texto||!texto.value.trim()){showToast("Escribe el texto de la anotación",false);return;}
  S.anotaciones.unshift({titulo:titulo.value||"Anotación",tipo:tipo?tipo.value:"Nota clínica",texto:texto.value,fecha:"14/05/2026 "+new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})});
  titulo.value="";texto.value="";
  showToast("✓ Anotación guardada");
  renderAnexoBody();
}
