// ── DICTADO POR VOZ ──────────────────────────────────────
let _dictRecog=null;
let _dictActive=null;
window.dictarCampo=function(fieldId){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast("Tu navegador no soporta dictado por voz. Usa Google Chrome.",false);return;
  }
  const btn=document.getElementById("mic_"+fieldId);
  // Si ya está activo en este campo, detener
  if(_dictActive===fieldId&&_dictRecog){
    _dictRecog.stop();return;
  }
  // Si hay otro campo activo, detenerlo
  if(_dictRecog){_dictRecog.stop();}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _dictRecog=new SR();
  _dictRecog.lang="es-MX";
  _dictRecog.continuous=true;
  _dictRecog.interimResults=true;
  _dictActive=fieldId;
  // Estado visual: activo
  if(btn){btn.textContent="⏹";btn.style.background="#FFEBEE";btn.style.borderColor="#E53935";btn.style.color="#E53935";}
  let interim="";
  const ta=document.getElementById(fieldId);
  const base=ta?ta.value:"";
  _dictRecog.onresult=function(e){
    interim="";
    let final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(ta){
      ta.value=base+(base&&final?" ":"")+final+(interim?` [${interim}]`:"");
      ta.scrollTop=ta.scrollHeight;
    }
  };
  _dictRecog.onend=function(){
    // Limpiar el [interim] residual
    if(ta)ta.value=ta.value.replace(/\s?\[.*?\]$/,"");
    if(btn){btn.textContent="🎤";btn.style.background="none";btn.style.borderColor=BR;btn.style.color=MU;}
    _dictActive=null;_dictRecog=null;
    showToast("✓ Dictado finalizado");
  };
  _dictRecog.onerror=function(e){
    if(btn){btn.textContent="🎤";btn.style.background="none";btn.style.borderColor=BR;btn.style.color=MU;}
    _dictActive=null;_dictRecog=null;
    if(e.error!=="aborted")showToast("Error de micrófono: "+e.error,false);
  };
  _dictRecog.start();
  showToast("🎤 Dictando — habla ahora. Clic en ⏹ para detener");
}

window.doLogin=async function(){
  let usuario=gv("lu").trim().toLowerCase();
  const pass=gv("lp");
  if(!usuario||!pass){showLoginError("Ingresa tu usuario y contraseña");return;}
  const lb=document.getElementById("login-btn");
  lb.textContent="Entrando...";lb.disabled=true;
  // Si no tiene @ lo tratamos como username → buscar email en usuarios
  let email=usuario;
  if(!usuario.includes("@")){
    // Buscar en tabla usuarios por username
    const {data:uData}=await SB.from("usuarios").select("email,username").eq("username",usuario).maybeSingle();
    if(uData?.email){
      email=uData.email;
    } else {
      // Intentar con formato username@qpclinic.mx como fallback
      email=usuario+"@qpclinic.mx";
    }
  }
  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){
    showLoginError("Usuario o contraseña incorrectos");
    lb.textContent="Entrar al Sistema";lb.disabled=false;
    return;
  }
  STATE.user=data.user;
  const {data:prof}=await SB.from("usuarios").select("*").eq("id",data.user.id).maybeSingle();
  STATE.userProfile=prof;
  STATE.medProfile=prof; // alias para recetas y documentos
  logBitacora("INICIO DE SESIÓN","Login exitoso",null);
  go("agenda");
}

window.cerrarModalUsuario=function(){
  const m=document.getElementById("modal-usuario");if(m)m.style.display="none";
  STATE._editingUserId=null;
}
window.guardarUsuario=async function(uid=""){
  const nom=gv("mu_nom").trim();const ap=gv("mu_ap").trim();
  const usuario=gv("mu_user").trim().toLowerCase().replace(/\s+/g,".");
  if(!nom||!ap||!usuario){showToast("Nombre, apellidos y usuario son obligatorios",false);return;}
  const pass=gv("mu_pass");const pass2=gv("mu_pass2");
  if(!uid&&!pass){showToast("Define una contraseña para el nuevo usuario",false);return;}
  if(pass&&pass!==pass2){showToast("Las contraseñas no coinciden",false);return;}
  if(pass){
    const errPass=validarContrasena(pass);
    if(errPass){showToast("Contraseña insegura: "+errPass,false);return;}
  }
  loading(true,uid?"Guardando cambios...":"Creando usuario...");
  const email=usuario+"@qpclinic.mx";
  // Subir firma si hay archivo seleccionado
  let firma_url=null;
  const firmaFile=document.getElementById("mu_firma_file")?.files[0];
  if(firmaFile&&(uid||true)){
    const targetId=uid||"new_"+Date.now();
    const ext=firmaFile.name.split(".").pop().toLowerCase()||"png";
    const path=`${targetId}/firma.${ext}`;
    const {error:upErr}=await SB.storage.from("firmas-medicos").upload(path,firmaFile,{upsert:true,contentType:firmaFile.type});
    if(!upErr){
      const {data:urlData}=SB.storage.from("firmas-medicos").getPublicUrl(path);
      firma_url=urlData?.publicUrl||null;
    } else {
      showToast("Advertencia: no se pudo subir la firma — "+upErr.message,false);
    }
  }
  const cedMed=gv("mu_cedmed").trim();
  const cedEsp1=gv("mu_cedesp1").trim();
  const profilePayload={
    username:usuario,email,titulo:gv("mu_titulo"),nombre:nom,apellidos:ap,rol:gv("mu_rol"),
    // Formación académica
    licenciatura:gv("mu_lic")||null,
    cedula_medico:cedMed||null,
    institucion_grado:gv("mu_igrado")||null,
    especialidad_1:gv("mu_esp1")||null,
    cedula_esp_1:cedEsp1||null,
    institucion_esp_1:gv("mu_iesp1")||null,
    subespecialidad:gv("mu_subesp")||null,
    cedula_subesp:gv("mu_cedsubesp")||null,
    institucion_esp_2:gv("mu_iesp2")||null,
    alta_especialidad:gv("mu_altaesp")||null,
    institucion_alta:gv("mu_ialta")||null,
    // Agenda y contacto
    telefono:gv("mu_tel")||null,
    calendar_url:gv("mu_cal")||null,
    calendar_color:document.getElementById("mu_color")?.value||"#1565C0",
    activo:true,
  };
  if(firma_url)profilePayload.firma_digital=firma_url;
  if(!uid){
    // Crear usuario en Auth usando cliente temporal para NO reemplazar la sesión del admin
    const SBtemp=window.supabase.createClient(
      "https://ebukjdxeekhzeurmhgkj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidWtqZHhlZWtoemV1cm1oZ2tqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDI3NDAsImV4cCI6MjA5NDM3ODc0MH0.eXaNf2lXjU8_q0CeYz8CHUBZJftp9_JZY153uZFWYVQ",
      {auth:{persistSession:false,autoRefreshToken:false}}
    );
    const {data:authData,error:authErr}=await SBtemp.auth.signUp({
      email,password:pass,
      options:{data:{username:usuario,nombre:nom,apellidos:ap}}
    });
    if(authErr&&!authErr.message?.includes("already registered")){
      loading(false);showToast("Error al crear cuenta: "+authErr.message,false);return;
    }
    const authId=authData?.user?.id;
    if(authId){
      profilePayload.id=authId;
      const {error:dbErr}=await SB.from("usuarios").upsert(profilePayload,{onConflict:"id"});
      if(dbErr){loading(false);showToast("Cuenta creada, error en perfil: "+dbErr.message,false);return;}
    } else {
      const {data:ex}=await SB.from("usuarios").select("id").eq("email",email).maybeSingle();
      if(ex?.id){await SB.from("usuarios").update(profilePayload).eq("id",ex.id);}
      else{loading(false);showToast("No se pudo crear el usuario. Verifica que el username no exista.",false);return;}
    }
    showToast("✓ Usuario creado correctamente");
  } else {
    const {error:dbErr}=await SB.from("usuarios").update(profilePayload).eq("id",uid);
    if(dbErr){loading(false);showToast("Error: "+dbErr.message,false);return;}
    if(pass){
      if(STATE.user?.id===uid){
        const {error:passErr}=await SB.auth.updateUser({password:pass});
        if(passErr)showToast("Perfil guardado. Error de contraseña: "+passErr.message,false);
        else showToast("✓ Usuario y contraseña actualizados");
      } else {
        showToast("✓ Perfil guardado. La contraseña solo puede cambiarla el propio usuario desde su perfil.");
      }
    } else {
      showToast("✓ Usuario actualizado correctamente");
    }
  }
  loading(false);
  cerrarModalUsuario();
  pgMedicos();
}
window.toggleActivoUsuario=async function(uid,activo){
  if(uid===STATE.user?.id){showToast("No puedes desactivar tu propia cuenta",false);return;}
  loading(true,"Actualizando...");
  await SB.from("usuarios").update({activo:!activo}).eq("id",uid);
  loading(false);
  showToast(!activo?"✓ Usuario activado":"✓ Usuario desactivado");
  pgMedicos();
}
window.resetPasswordUsuario=async function(uid){
  // Buscar datos del usuario
  const {data:u}=await SB.from("usuarios").select("username,email,nombre,apellidos").eq("id",uid).maybeSingle();
  if(!u)return;
  // Generar contraseña temporal aleatoria
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$";
  const tmp=Array.from({length:10},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  // Modal de reset
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  overlay.innerHTML=`

      <div style="background:#1565C0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between">
        <b style="color:#fff;font-size:15px">🔑 Restablecer contraseña</b>
        <button onclick="this.closest('[style*=fixed]').remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700">✕</button>
      </div>
      <div style="padding:20px">

window.previewFirmaPerfil=function(input){
  const file=input.files[0];if(!file)return;
  const prev=document.getElementById("pf_firma_preview");
  const img=document.getElementById("pf_firma_img");
  if(!prev||!img)return;
  const reader=new FileReader();
  reader.onload=e=>{img.src=e.target.result;prev.style.display="block";};
  reader.readAsDataURL(file);
}
window.subirFirmaPerfil=async function(){
  const uid=STATE.user?.id;if(!uid)return;
  const file=document.getElementById("pf_firma_file")?.files[0];
  if(!file){showToast("Selecciona un archivo de firma primero",false);return;}
  if(file.size>2*1024*1024){showToast("El archivo es muy grande (máx. 2MB)",false);return;}
  loading(true,"Subiendo firma...");
  const ext=file.name.split(".").pop().toLowerCase()||"png";
  const path=`${uid}/firma.${ext}`;
  const {error:upErr}=await SB.storage.from("firmas-medicos").upload(path,file,{upsert:true,contentType:file.type});
  if(upErr){loading(false);showToast("Error al subir: "+upErr.message,false);return;}
  const {data:urlData}=SB.storage.from("firmas-medicos").getPublicUrl(path);
  const firma_url=urlData?.publicUrl||null;
  await SB.from("usuarios").update({firma_digital:firma_url}).eq("id",uid);
  loading(false);
  const {data:fresh}=await SB.from("usuarios").select("*").eq("id",uid).maybeSingle();
  if(fresh){STATE.userProfile=fresh;STATE.medProfile=fresh;}
  showToast("✓ Firma subida y guardada correctamente");
  pgPerfil();
}

window.cambiarContrasena=async function(){
  const p1=gv("pf_pass1");const p2=gv("pf_pass2");
  if(!p1){showToast("Escribe la nueva contraseña",false);return;}
  if(p1!==p2){showToast("Las contraseñas no coinciden",false);return;}
  if(p1.length<6){showToast("La contraseña debe tener al menos 6 caracteres",false);return;}
  loading(true,"Actualizando contraseña...");
  const {error}=await SB.auth.updateUser({password:p1});
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  const p1el=document.getElementById("pf_pass1");const p2el=document.getElementById("pf_pass2");
  if(p1el)p1el.value="";if(p2el)p2el.value="";
  showToast("✓ Contraseña actualizada correctamente");
}

function renderCalendarioView(u,medicos,isAdmin){
  let url="";
  if(isAdmin&&STATE.calSeleccionado){
    url=(medicos||[]).find(x=>x.id===STATE.calSeleccionado)?.calendar_url||"";
  } else if(isAdmin&&medicos?.length>0){
    url=u.calendar_url||(medicos[0]?.calendar_url)||"";
  } else {
    url=u.calendar_url||"";
  }
  if(!url)return`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
    <i class="ti ti-calendar-off" style="font-size:56px;color:#90A4AE;margin-bottom:16px" aria-hidden="true"></i>
    <h3 style="font-size:16px;font-weight:700;color:${TX};margin-bottom:8px">Vincula tu Google Calendar</h3>
    <p style="font-size:13px;color:${MU};max-width:400px;line-height:1.7;margin-bottom:8px">Ve a <b>Configuración → Mi perfil médico → Google Calendar</b> y pega el enlace de integración de tu calendario.</p>
    <div style="background:#E8F5E9;border-radius:8px;padding:12px 16px;text-align:left;font-size:13px;color:#1B5E20;line-height:1.9;max-width:400px;margin:12px 0 20px">
      <b>Cómo obtener el enlace:</b><br>
      1. <a href="https://calendar.google.com/calendar/r/settings" target="_blank" style="color:${P}">Google Calendar → Configuración</a><br>
      2. Selecciona tu calendario en la barra lateral<br>
      3. Baja hasta <b>"Integrar calendario"</b><br>
      4. Copia la URL del iframe y pégala en tu perfil
    </div>
    ${btn("⚙️ Ir a Mi perfil médico","go('perfil')","p",1)}
  </div>`;
  let embedUrl=url;
  if(embedUrl.includes("calendar.google.com/calendar/embed")){
    const sep=embedUrl.includes("?")?"&":"?";
    if(!embedUrl.includes("mode="))embedUrl+=sep+"mode=WEEK";
    if(!embedUrl.includes("ctz="))embedUrl+="&ctz=America%2FMexico_City";
    if(!embedUrl.includes("hl="))embedUrl+="&hl=es";
    if(!embedUrl.includes("wkst="))embedUrl+="&wkst=2";
    if(!embedUrl.includes("showTitle="))embedUrl+="&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=1&bgcolor=%23ffffff";
  }
  return`<iframe src="${embedUrl}" style="width:100%;height:100%;border:none" frameborder="0" scrolling="no" allowfullscreen loading="lazy"></iframe>`;
}

window.toggleCfgMenu=function(){
  const m=document.getElementById("cfg-menu");
  if(!m)return;
  const visible=m.style.display==="block";
  m.style.display=visible?"none":"block";
  if(!visible){
    // Posicionar bajo el botón
    const wrap=document.getElementById("cfg-menu-wrap");
    if(wrap){const r=wrap.getBoundingClientRect();m.style.left=r.left+"px";}
    // Cerrar al hacer clic fuera
    setTimeout(()=>{
      document.addEventListener("click",function cerrar(e){
        if(!document.getElementById("cfg-menu-wrap")?.contains(e.target)){
          const menu=document.getElementById("cfg-menu");
          if(menu)menu.style.display="none";
          document.removeEventListener("click",cerrar);
        }
      });
    },10);
  }
}
window.seleccionarCalendario=function(id){

  pgAgenda();
}

async function cargarPacientes(q=""){
  let query=SB.from("pacientes").select("id,numero_expediente,nombre,apellido_paterno,apellido_materno,fecha_nacimiento,celular,sexo_biologico").eq("activo",true).order("apellido_paterno");
  if(q)query=query.or(`nombre.ilike.%${q}%,apellido_paterno.ilike.%${q}%,apellido_materno.ilike.%${q}%,curp.ilike.%${q}%`);
  const {data,error}=await query.limit(50);
  const t=document.getElementById("tbl");if(!t)return;
  if(error){t.innerHTML=`<p style="color:${DA};padding:16px">Error: ${error.message}</p>`;return;}
  if(!data||data.length===0){t.innerHTML=`<div style="background:#fff;border-radius:10px;padding:32px;text-align:center;color:${MU}">No se encontraron pacientes${q?" con ese criterio":""}</div>`;return;}
  t.innerHTML=`<div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:${PL}">${["Exp.","Nombre","Ap. Paterno","Ap. Materno","Nacimiento","Celular","Sexo",""].map(h=>`<th style="padding:9px 12px;text-align:left;font-size:14px;font-weight:700;color:${TX};text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
      <tbody>${data.map((p,i)=>`<tr style="border-top:1px solid ${BR};background:${i%2?"#FAFAFA":"#fff"}">
        <td style="padding:10px 12px;font-size:14px;color:${AC};font-weight:700">${p.numero_expediente||"—"}</td>
        <td style="padding:10px 12px;font-weight:600">${p.nombre}</td>

window.abrirExpediente=async function(id){
  // Limpiar TODOS los datos del paciente previo antes de cargar el nuevo
  STATE.pat=null;
  STATE.patData={};STATE.patOtrasNotes="";
  STATE.famData={};STATE.famNotas="";
  STATE.alergs=[];STATE.alOtrosText="";
  STATE.discapacidades=[];
  STATE.ginData={};
  STATE.antNoPatText="";STATE.otrosText="";
  STATE.medText="";STATE.medOtrosText="";
  STATE.signosHoy=null;STATE.consultaActual=null;
  STATE.expTab="ficha";STATE.ficTab="gen";STATE.antTab="fam";STATE.anexoTab="docs";
  loading(true,"Cargando expediente...");
  const {data,error}=await SB.from("pacientes").select("*").eq("id",id).single();
  loading(false);
  if(error||!data){showToast("Error al cargar expediente",false);return;}
  STATE.pat=data;
  logBitacora("APERTURA DE EXPEDIENTE",`Exp. #${data.numero_expediente||data.id?.substring(0,8)||""}`,data.id);
  STATE.expTab="ficha";
  STATE.ficTab="gen";
  STATE.consultaActual=null;
  // Cargar antecedentes en paralelo
  const [{data:ap},{data:af},{data:al},{data:disc},{data:gin},{data:anp}]=await Promise.all([
    SB.from("antecedentes_patologicos").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("antecedentes_familiares").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("alergias").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("discapacidades").select("categoria").eq("paciente_id",id),
    SB.from("antecedentes_gineco").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("antecedentes_no_patologicos").select("*").eq("paciente_id",id).maybeSingle(),
  ]);
  STATE.patData=ap?JSON.parse(JSON.stringify(ap.seleccionados||{})):{};
  STATE.patOtrasNotes=ap?ap.notas_otras||"":"";
  STATE.famData=af?JSON.parse(JSON.stringify(af.datos||{})):{};
  STATE.famNotas=af?.notas||"";
  STATE.alergs=al?JSON.parse(JSON.stringify(al.lista||[])):[];
  STATE.alOtrosText=al?.otros||"";
  STATE.discapacidades=disc?disc.map(d=>d.categoria):[];
  STATE.ginData=gin||{};
  STATE.antNoPatText=anp?.texto||"";
  STATE.otrosText=anp?.otros||"";
  // También cargar medicamentos otros
  const {data:medDB}=await SB.from("medicamentos_usados").select("texto,otros").eq("paciente_id",id).maybeSingle();
  STATE.medText=medDB?.texto||"";
  STATE.medOtrosText=medDB?.otros||"";
  go("expediente");
}

window.enviarPreregistro=async function(){
  const nom=gv("nn").trim();const ap=gv("na").trim();
  const cel=(gv("ncel")||gv("ntelmov")||"").trim();
  if(!nom||!ap){showToast("Ingresa nombre y apellido antes de enviar el pre-registro",false);return;}
  if(!cel){showToast("Ingresa el celular del paciente",false);return;}
  loading(true,"Generando enlace...");
  const token=crypto.randomUUID();
  const nombrePac=`${nom} ${ap} ${gv("na2")||""}`.trim();
  const {error}=await SB.from("pre_registros").insert({token,nombre_paciente:nombrePac,celular:cel.replace(/\D/g,""),completado:false});
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  STATE.preregToken=token;STATE.preregNombre=nombrePac;
  const link=`https://qpclinic.org/prereg.html?token=${token}`;
  const celWA=cel.replace(/\D/g,"");const celFmt=celWA.length===10?"52"+celWA:celWA;
  const msg=`🏥 *QP Clinic — Pre-registro*\n\nHola ${nom}, te saludamos de QP Clinic.\n\nPor favor llena tu información antes de tu consulta:\n\n👉 ${link}\n\nToma solo 3 minutos desde tu celular.\n\n_QP Clinic • Insurgentes Sur 933, CDMX_`;
  window.open(`https://wa.me/${celFmt}?text=${encodeURIComponent(msg)}`,"_blank");
  const st=document.getElementById("prereg-status");
  if(st)st.innerHTML=`<span style="background:#C8E6C9;color:#1B5E20;padding:3px 10px;border-radius:20px;font-weight:600">✓ Enlace enviado por WhatsApp</span>`;
  showToast("✓ Enlace de pre-registro enviado");
}
window.copiarPreregistro=async function(){
  const token=STATE.preregToken;
  const nom=gv("nn").trim();const ap=gv("na").trim();
  loading(true,"Buscando pre-registro...");
  let data;
  if(token){
    const r=await SB.from("pre_registros").select("*").eq("token",token).single();
    data=r.data;
  } else if(nom){
    const r=await SB.from("pre_registros").select("*").ilike("nombre_paciente",`%${nom}%`).eq("completado",true).order("created_at",{ascending:false}).limit(1);
    data=r.data?.[0];
  }
  loading(false);
  if(!data){showToast("No se encontró un pre-registro para este paciente",false);return;}
  if(!data.completado){
    const st=document.getElementById("prereg-status");
    if(st)st.innerHTML=`<span style="background:#FFF8E1;color:#E65100;padding:3px 10px;border-radius:20px;font-weight:600">⏳ El paciente aún no ha completado el formulario</span>`;
    showToast("El paciente aún no ha completado el pre-registro",false);return;
  }
  aplicarPreregistro(data);
}

window.guardarNuevoPac=async function(){
  const nom=gv("nn"),apP=gv("na");

  // Verificar sesión activa
  const {data:{session}}=await SB.auth.getSession();
  if(!session){showToast("Sesión expirada — vuelve a iniciar sesión",false);go("login");return;}
  loading(true,"Registrando paciente...");
  const payload={
    nombre:nom.trim().toUpperCase(),
    apellido_paterno:apP.trim().toUpperCase(),
    apellido_materno:gv("na2").trim().toUpperCase()||null,
    curp:gv("nc").trim().toUpperCase()||null,

    sexo_biologico:gv("nsb")||null,
    sexo_curp:gv("nscurp")||null,
    genero:gv("ngen")||null,
    estado_civil:gv("nec")||null,
    tipo_sangre:gv("nts")||null,

    entidad_federativa:gv("nef")||null,
    migrante:gv("nmig")||null,
    afromexicano:gv("nafro")||null,
    indigena:gv("nindig")||null,
    ocupacion:gv("noc")||null,
    escolaridad:gv("nesc")||null,
    celular:gv("ncel")||null,
    telefono_principal:gv("ntel")||null,
    correo:gv("nmail")||null,
    referido_por:gv("nref")||null,
    firmo_privacidad:document.getElementById("npriv")?.checked||false,
    firmo_consentimiento:document.getElementById("ncons")?.checked||false,
    created_by:session.user.id
  };
  const {data,error}=await SB.from("pacientes").insert(payload).select().single();
  loading(false);
  if(error){
    console.error("Error Supabase:",error);
    showToast("Error: "+error.message,false);
    return;
  }
  STATE.pat=data;
  STATE.expTab="ficha";

  // Limpiar TODOS los datos clínicos — nuevo paciente empieza en blanco
  STATE.famData={};STATE.famNotas="";

  STATE.alergs=["ALERGIAS NEGADAS"];
  STATE.alOtrosText="";

  STATE.ginData={};
  STATE.antNoPatText="";STATE.otrosText="";
  STATE.medText="";STATE.medOtrosText="";
  STATE.signosHoy=null;STATE.consultaActual=null;
  STATE.antTab="fam";
  showToast("✓ Paciente registrado — Exp. "+data.numero_expediente);
  go("expediente");
}

window.guardarFacturacion=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  loading(true,"Guardando datos de facturación...");
  const f={

    razon_social:gv("f_razon").trim(),
    codigo_postal:gv("f_cp").trim(),
    regimen:gv("f_regimen"),
    uso_cfdi:gv("f_uso_cfdi"),
    correo:gv("f_mail").trim(),
    notas:gv("f_notas").trim(),

  const {error}=await SB.from("pacientes").update({datos_facturacion:f}).eq("id",pid);

}

window.setAT=async function(t){
  // Auto-guardar la pestaña actual antes de cambiar (NOM-004 — no perder datos)
  saveABTextareas();
  const pid=STATE.pat?.id;
  if(pid){
    const tab=STATE.antTab||"fam";
    try{
      if(tab==="fam"){
        const fn=document.getElementById("fam_notas");
        if(fn)STATE.famNotas=fn.value;
        await SB.from("antecedentes_familiares").upsert({paciente_id:pid,datos:STATE.famData,notas:STATE.famNotas},{onConflict:"paciente_id"});
      } else if(tab==="pat"||tab==="oc"){
        await SB.from("antecedentes_patologicos").upsert({paciente_id:pid,seleccionados:STATE.patData,notas_otras:STATE.patOtrasNotes},{onConflict:"paciente_id"});
      } else if(tab==="nop"){
        await SB.from("antecedentes_no_patologicos").upsert({paciente_id:pid,texto:STATE.antNoPatText||""},{onConflict:"paciente_id"});
      } else if(tab==="med"){
        await SB.from("medicamentos_usados").upsert({paciente_id:pid,texto:STATE.medText||"",otros:STATE.medOtrosText||""},{onConflict:"paciente_id"});
      } else if(tab==="al"){
        await SB.from("alergias").upsert({paciente_id:pid,lista:STATE.alergs,otros:STATE.alOtrosText||""},{onConflict:"paciente_id"});
      } else if(tab==="ot"){
        await SB.from("antecedentes_no_patologicos").upsert({paciente_id:pid,texto:STATE.antNoPatText||"",otros:STATE.otrosText||""},{onConflict:"paciente_id"});
      }
      // Indicador visual discreto de autoguardado
      const ind=document.getElementById("autosave-ind");
      if(ind){ind.textContent="💾 Guardado";ind.style.opacity="1";setTimeout(()=>{ind.style.opacity="0";},2000);}
    }catch(e){console.warn("Autoguardado:",e.message);}
  }
  STATE.antTab=t;
  const b=document.getElementById("eb");if(b)renderAnt(b);
}

  const {data}=await SB.from("interrogatorio_aparatos").select("*").eq("paciente_id",pid).maybeSingle();
  const ig=document.getElementById("inter-grid");if(!ig)return;
  ig.innerHTML=SIS.map(s=>`
    <div style="border:1.5px solid ${BR};border-radius:10px;overflow:hidden">
      <div style="background:${PL};padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">

          <button onclick="setSintoma('${s.key}','NORMAL')" style="background:#2E7D32;color:#fff;border:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:14px;font-weight:700">✓ Normal</button>

window.addSintoma=function(key,txt){
  const ta=document.getElementById("inter_"+key);if(!ta)return;
  if(ta.value==="NORMAL"||ta.value==="Interrogado y negado")ta.value="";
  const sep=ta.value&&!ta.value.endsWith("\n")&&!ta.value.endsWith(", ")&&ta.value.length>0?", ":"";
  ta.value+=sep+txt;
  ta.focus();
}

}

window.abrirConsulta=async function(cid){
  loading(true,"Cargando consulta...");

  loading(false);
  if(!data){showToast("Error",false);return;}
  STATE.consultaActual=data;
  if(!data.temperatura&&STATE.pat?.id){
    const hoy=new Date().toISOString().split("T")[0];
    const {data:sv}=await SB.from("signos_vitales").select("*").eq("paciente_id",STATE.pat.id).gte("fecha",hoy).order("fecha",{ascending:false}).limit(1);
    if(sv&&sv[0])STATE.consultaActual._svHoy=sv[0];
  }
  go("consulta");
  // Auto-incluir InBody pendiente si lo hay
  if(STATE.inBodyPendiente?.texto){
    setTimeout(()=>{
      const campo=document.getElementById("cs_expl");
      if(campo){
        campo.value=(campo.value?campo.value+"\n\n":"")+STATE.inBodyPendiente.texto;
        showToast("📊 InBody del "+STATE.inBodyPendiente.fecha+" incluido automáticamente");
        STATE.inBodyPendiente=null;
      }
    },600);
  }
}

window.guardarRespuestaInterconsulta=async function(id,medNom){
  const hall=document.getElementById("ic_hallazgos")?.value||"";
  const diag=document.getElementById("ic_diag_resp")?.value||"";
  const recom=document.getElementById("ic_recom")?.value||"";
  if(!hall&&!diag&&!recom){showToast("Escribe al menos los hallazgos o recomendaciones",false);return;}
  loading(true,"Guardando respuesta...");
  const {error}=await SB.from("interconsultas").update({
    hallazgos:hall,
    diagnostico_interconsultante:diag,
    recomendaciones:recom,
    fecha_respuesta:new Date().toLocaleDateString("es-MX"),
    medico_responde:medNom,
    estatus:"Respondida",
  }).eq("id",id);
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Respuesta guardada");
  document.getElementById("modal-inter-ver")?.remove();
  cargarInterconsultas();
}
window.seleccionarMedInter=function(val){
  const ext=document.getElementById("ic_med_externo");
  const hid=document.getElementById("ic_med");
  if(val==="__externo__"){
    if(ext)ext.style.display="block";
    if(hid)hid.value="";
  } else {
    if(ext)ext.style.display="none";
    if(hid)hid.value=val;
  }
}
window.copiarDxInter=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const {data}=await SB.from("consultas").select("analisis").eq("paciente_id",pid).not("analisis","is",null).order("created_at",{ascending:false}).limit(1);
  if(data&&data[0]?.analisis){
    const t=document.getElementById("ic_diag");
    if(t){t.value=data[0].analisis;showToast("✓ Diagnóstico copiado");}
  } else showToast("No hay diagnóstico en consultas anteriores",false);
}

window.cerrarFormInter=function(){const f=document.getElementById("inter-form");if(f)f.style.display="none";}
window.guardarInterconsulta=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const sel=document.getElementById("ic_med_sel")?.value;
  const medInter=sel==="__externo__"?(document.getElementById("ic_med")?.value||gv("ic_med")):gv("ic_med");
  if(!medInter){showToast("Selecciona o escribe el médico interconsultante",false);return;}
  loading(true,"Guardando interconsulta...");
  const {error}=await SB.from("interconsultas").insert({
    paciente_id:pid,
    medico_solicitante_id:STATE.user?.id||null,
    medico_interconsultante:medInter,
    especialidad:gv("ic_esp"),
    diagnostico:gv("ic_diag"),
    tratamiento:gv("ic_trat"),
    motivos:gv("ic_mot"),
    prioridad:gv("ic_pri"),
    estatus:"Pendiente de respuesta"
  });
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Interconsulta guardada");
  cerrarFormInter();
  cargarInterconsultas();
}

  if(!pid)return;
  loading(true,"Subiendo documento...");

window.subirGabinete=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const titulo=(document.getElementById("gab-titulo")?.value||"").trim();
  if(!titulo){showToast("El nombre del estudio es obligatorio",false);return;}
  const file=document.getElementById("gab-file")?.files[0];
  if(!file){showToast("Selecciona un archivo para subir",false);return;}
  if(file.size>30*1024*1024){showToast("El archivo es demasiado grande (máx. 30 MB)",false);return;}
  loading(true,"Subiendo estudio...");
  const fecha=document.getElementById("gab-fecha")?.value||new Date().toISOString().split("T")[0];
  const tipo=document.getElementById("gab-tipo")?.value||"Otro estudio de gabinete";
  const inst=(document.getElementById("gab-inst")?.value||"").trim();
  const desc=(document.getElementById("gab-desc")?.value||"").trim();
  const ext=file.name.split(".").pop().toLowerCase();
  const path=`${pid}/gabinete/${Date.now()}_${titulo.replace(/[^a-zA-Z0-9]/g,"_").substring(0,40)}.${ext}`;
  const {error:upErr}=await SB.storage.from("expedientes").upload(path,file,{upsert:false,contentType:file.type});
  if(upErr){loading(false);showToast("Error al subir archivo: "+upErr.message,false);return;}
  const {data:urlData}=SB.storage.from("expedientes").getPublicUrl(path);
  const {error:dbErr}=await SB.from("anexos").insert({
    paciente_id:pid,titulo,tipo_documento:tipo,fecha,
    origen:"subido",firmado:false,
    url_archivo:urlData?.publicUrl||null,
    storage_path:path,
    nombre_firmante:inst||null,
    descripcion:desc||null,
    created_at:new Date().toISOString()
  });
  loading(false);
  if(dbErr){showToast("Error al guardar: "+dbErr.message,false);return;}
  showToast("✓ Estudio guardado en el expediente");
  renderGabinete(document.getElementById("anexo-body"));
}

window.subirFormulario=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const titulo=(document.getElementById("form-titulo")?.value||"").trim();
  if(!titulo){showToast("El nombre del formulario es obligatorio",false);return;}
  const file=document.getElementById("form-file")?.files[0];
  if(!file){showToast("Selecciona un archivo",false);return;}
  if(file.size>20*1024*1024){showToast("El archivo es demasiado grande (máx. 20 MB)",false);return;}
  loading(true,"Subiendo formulario...");
  const fecha=document.getElementById("form-fecha")?.value||new Date().toISOString().split("T")[0];
  const tipo=document.getElementById("form-tipo")?.value||"Otro formulario";
  const obs=(document.getElementById("form-obs")?.value||"").trim();
  const ext=file.name.split(".").pop().toLowerCase();
  const path=`${pid}/formularios/${Date.now()}_${titulo.replace(/[^a-zA-Z0-9]/g,"_").substring(0,40)}.${ext}`;
  const {error:upErr}=await SB.storage.from("expedientes").upload(path,file,{upsert:false,contentType:file.type});
  if(upErr){loading(false);showToast("Error al subir: "+upErr.message,false);return;}
  const {data:urlData}=SB.storage.from("expedientes").getPublicUrl(path);
  const {error:dbErr}=await SB.from("anexos").insert({
    paciente_id:pid,titulo,tipo_documento:tipo,fecha,
    origen:"subido",firmado:false,
    url_archivo:urlData?.publicUrl||null,
    storage_path:path,
    descripcion:obs||null,
    created_at:new Date().toISOString()
  });
  loading(false);
  if(dbErr){showToast("Error: "+dbErr.message,false);return;}
  showToast("✓ Formulario guardado");
  renderFormularios(document.getElementById("anexo-body"));
}

window.guardarAnalitos=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const panel=(document.getElementById("al-panel")?.value||"").trim();
  const fecha=document.getElementById("al-fecha")?.value||new Date().toISOString().split("T")[0];
  const lab=(document.getElementById("al-lab")?.value||"").trim();
  const obs=(document.getElementById("al-obs")?.value||"").trim();
  // Recoger analitos
  const rows=[...document.querySelectorAll(".analito-row")];
  const analitos=rows.map(r=>({
    nombre:r.querySelector(".al-nombre")?.value?.trim()||"",
    valor:r.querySelector(".al-valor")?.value?.trim()||"",
    unidad:r.querySelector(".al-unidad")?.value?.trim()||"",
    ref_min:r.querySelector(".al-ref-min")?.value?.trim()||"",
    ref_max:r.querySelector(".al-ref-max")?.value?.trim()||"",
    interpretacion:r.querySelector(".al-interp")?.value||"N"
  })).filter(a=>a.nombre);
  if(!panel){showToast("Selecciona un panel",false);return;}
  if(analitos.length===0){showToast("Agrega al menos un analito",false);return;}
  loading(true,"Guardando resultados...");
  // Subir PDF si hay
  let url_pdf=null;
  const file=document.getElementById("al-file")?.files[0];
  if(file){
    const ext=file.name.split(".").pop().toLowerCase();
    const path=`${pid}/laboratorio/${Date.now()}_${panel.replace(/[^a-zA-Z0-9]/g,"_")}.${ext}`;
    const {error:upErr}=await SB.storage.from("expedientes").upload(path,file,{upsert:false,contentType:file.type});
    if(!upErr){const {data:ud}=SB.storage.from("expedientes").getPublicUrl(path);url_pdf=ud?.publicUrl||null;}
  }
  const {error}=await SB.from("resultados_laboratorio").insert({
    paciente_id:pid,panel,fecha,laboratorio:lab||null,
    analitos,observaciones:obs||null,url_pdf,
    registrado_por:`${STATE.userProfile?.titulo||""} ${STATE.userProfile?.nombre||""} ${STATE.userProfile?.apellidos||""}`.trim(),
    created_at:new Date().toISOString()
  });
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Resultados guardados");
  renderAnalitos(document.getElementById("anexo-body"));
}

window.verInBodyPDF=async function(storagePath){
  if(!storagePath){showToast("Sin archivo adjunto",false);return;}
  loading(true,"Abriendo PDF...");
  const {data:urlData}=await SB.storage.from("expedientes").createSignedUrl(storagePath,3600);
  loading(false);
  if(urlData?.signedUrl)window.open(urlData.signedUrl,"_blank");
  else showToast("Error al generar enlace del archivo",false);
}
window.extraerInBodyIA=async function(){
  const file=document.getElementById("ib-pdf")?.files[0];
  if(!file){showToast("Primero selecciona el PDF o imagen del InBody",false);return;}
  if(file.size>10*1024*1024){showToast("Archivo muy grande (máx. 10 MB para extracción con IA)",false);return;}
  loading(true,"🤖 Leyendo InBody con IA... (10-20 seg)");
  try{
    const b64=await new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=()=>res(rd.result.split(",")[1]);
      rd.onerror=rej;rd.readAsDataURL(file);
    });
    const resp=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo:"inbody",imageBase64:b64,mediaType:file.type})
    });
    const json=await resp.json();
    if(!resp.ok||!json.inbody){loading(false);showToast("Error al extraer: "+(json.error||"respuesta inválida"),false);return;}
    const d=json.inbody;
    // Rellenar todos los campos
    const set=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null&&val!=="")el.value=val;};
    set("ib-fecha",d.fecha||new Date().toISOString().split("T")[0]);
    set("ib-hora",d.hora||new Date().toTimeString().substring(0,5));
    if(d.modelo){const s=document.getElementById("ib-modelo");if(s){const o=Array.from(s.options).find(x=>x.value.includes("570")||x.value===d.modelo);if(o)s.value=o.value;else{const n=new Option(d.modelo,d.modelo);s.add(n);s.value=d.modelo;}}}
    set("ib-punt",d.puntuacion);set("ib-peso",d.peso);set("ib-altura",d.altura);
    set("ib-grasa",d.masa_grasa);set("ib-musculo",d.masa_musculo);set("ib-agua",d.agua_corporal);
    set("ib-prot",d.proteina);set("ib-min",d.minerales);
    set("ib-imc",d.imc);set("ib-pgc",d.pgc);set("ib-aec",d.aec_act);set("ib-gv",d.grasa_visceral);
    set("ib-pideal",d.peso_ideal);set("ib-cpeso",d.control_peso);
    set("ib-cgrasa",d.control_grasa);set("ib-cmusculo",d.control_musculo);
    set("ib-sbd",d.seg_brazo_der);set("ib-sbi",d.seg_brazo_izq);set("ib-st",d.seg_tronco);
    set("ib-spd",d.seg_pierna_der);set("ib-spi",d.seg_pierna_izq);
    set("ib-gbd",d.grasa_brazo_der);set("ib-gbi",d.grasa_brazo_izq);set("ib-gt",d.grasa_tronco);
    set("ib-gpd",d.grasa_pierna_der);set("ib-gpi",d.grasa_pierna_izq);
    set("ib-tmb",d.tmb);set("ib-rcl",d.rcl);set("ib-mcel",d.masa_celular);
    loading(false);
    showToast("✅ Datos extraídos del InBody con IA. Revisa y guarda.");
  }catch(e){loading(false);showToast("Error: "+e.message,false);}
}

window.incluirInBodyEnNota=async function(id){
  const {data}=await SB.from("inbody_resultados").select("*").eq("id",id).maybeSingle();
  if(!data){showToast("No se encontró la evaluación",false);return;}
  const N=(v,u="",dec=1)=>v!=null&&v!==""?parseFloat(v).toFixed(dec)+u:"—";
  const lineas=[
    `ANÁLISIS DE COMPOSICIÓN CORPORAL — InBody (${data.modelo||"InBody"}) | Fecha: ${data.fecha}${data.puntuacion?" | Score: "+data.puntuacion+"/100":""}`,
    ``,
    `COMPOSICIÓN CORPORAL:`,
    `  Peso: ${N(data.peso," kg")} | Talla: ${N(data.altura," cm",0)} | IMC: ${N(data.imc," kg/m²")}`,
    `  Masa Músculo Esquelético (MME): ${N(data.masa_musculo," kg")} | Masa Grasa: ${N(data.masa_grasa," kg")} (${N(data.pgc,"%")} de grasa corporal)`,
    `  Agua Corporal Total: ${N(data.agua_corporal," L")} | AEC/ACT: ${N(data.aec_act,"",3)} | Proteína: ${N(data.proteina," kg")} | Minerales: ${N(data.minerales," kg",3)}`,
    ``,
    `ANÁLISIS DE OBESIDAD:`,
    `  IMC: ${N(data.imc," kg/m²")} | % Grasa Corporal: ${N(data.pgc,"%")} | Grasa Visceral: ${data.grasa_visceral||"—"} | TMB: ${N(data.tmb," kcal",0)}`,
    data.rcl?`  Relación Cintura-Cadera: ${N(data.rcl,"",2)}`:"",
    ``,
    `CONTROL DE PESO:`,
    `  Peso ideal: ${N(data.peso_ideal," kg")} | Control peso: ${N(data.control_peso," kg")} | Control grasa: ${N(data.control_grasa," kg")} | Control músculo: ${N(data.control_musculo," kg")}`,
    (data.seg_brazo_der||data.seg_tronco)?[
      ``,`MASA MAGRA SEGMENTAL:`,
      `  Brazo D.: ${N(data.seg_brazo_der," kg")} | Brazo I.: ${N(data.seg_brazo_izq," kg")} | Tronco: ${N(data.seg_tronco," kg")} | Pierna D.: ${N(data.seg_pierna_der," kg")} | Pierna I.: ${N(data.seg_pierna_izq," kg")}`,
    ].join("\n"):"",
    (data.grasa_tronco)?[
      ``,`GRASA SEGMENTAL:`,
      `  Brazo D.: ${N(data.grasa_brazo_der," kg")} | Brazo I.: ${N(data.grasa_brazo_izq," kg")} | Tronco: ${N(data.grasa_tronco," kg")} | Pierna D.: ${N(data.grasa_pierna_der," kg")} | Pierna I.: ${N(data.grasa_pierna_izq," kg")}`,
    ].join("\n"):"",
    data.notas?`\nNOTAS: ${data.notas}`:"",
  ].filter(Boolean).join("\n");

  // ¿Hay una consulta abierta en el DOM?
  const campo=document.getElementById("cs_expl")||document.getElementById("cs_subj");
  if(campo){
    // Insertar directamente en la nota abierta
    const actual=campo.value;
    campo.value=(actual?actual+"\n\n":"")+lineas;
    campo.focus();
    campo.scrollIntoView({behavior:"smooth",block:"center"});
    showToast("✓ Datos InBody incluidos en la nota");
    return;
  }

  // No hay consulta abierta — guardar en STATE y mostrar opciones
  STATE.inBodyPendiente={id,texto:lineas,fecha:data.fecha};
  // Modal con opciones
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9990;display:flex;align-items:center;justify-content:center";
  overlay.innerHTML=`<div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px;box-shadow:0 16px 40px #00000040">
    <h3 style="font-size:15px;font-weight:700;color:#263238;margin-bottom:8px">📊 Incluir InBody en nota médica</h3>
    <p style="font-size:14px;color:#546E7A;margin-bottom:18px">No hay consulta abierta. ¿Qué deseas hacer?</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="this.closest('[style*=fixed]').remove();irAConsultasConInBody()" style="background:#1565C0;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:left">
        📋 Ir a Consultas para abrirla o crear una nueva<br><small style="font-weight:400;opacity:.8">El InBody se incluirá automáticamente al abrir la consulta</small>
      </button>
      <button onclick="copiarInBodyClipboard()" style="background:#37474F;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:left">
        📋 Copiar datos al portapapeles<br><small style="font-weight:400;opacity:.8">Pégalos en cualquier campo de la nota</small>
      </button>
      <button onclick="this.closest('[style*=fixed]').remove()" style="background:#F5F5F5;border:1px solid #E0E0E0;border-radius:9px;padding:10px;font-size:14px;cursor:pointer">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

window.copiarInBodyClipboard=async function(){
  if(!STATE.inBodyPendiente?.texto)return;
  try{
    await navigator.clipboard.writeText(STATE.inBodyPendiente.texto);
    showToast("✓ Datos InBody copiados al portapapeles");
  }catch(e){
    // Fallback para navegadores que no soportan clipboard API
    const ta=document.createElement("textarea");
    ta.value=STATE.inBodyPendiente.texto;
    document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("✓ Copiado al portapapeles");
  }
}
window.guardarInBody=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const fecha=gv("ib-fecha");
  if(!fecha){showToast("La fecha es obligatoria",false);return;}
  loading(true,"Guardando evaluación InBody...");
  // Subir PDF si hay
  let url_pdf=null,storage_path=null;
  const file=document.getElementById("ib-pdf")?.files[0];
  if(file){
    const ext=file.name.split(".").pop().toLowerCase();
    const path=`${pid}/inbody/${Date.now()}_inbody_${fecha}.${ext}`;
    const {error:upErr}=await SB.storage.from("expedientes").upload(path,file,{upsert:false,contentType:file.type});

let _recognition=null;let _grabando=false;let _transcripcion="";let _timerGrab=null;let _segundos=0;
window.sugerirDxIA=async function(){
  const gf=(id)=>{const e=document.getElementById(id);return e?e.value.trim():"";};
  const subj=gf("cs_subj"),expl=gf("cs_expl"),analActual=gf("cs_anal"),
        trat=gf("cs_trat"),plan=gf("cs_plan"),lab=gf("cs_lab"),gab=gf("cs_gab");
  if(!subj&&!expl&&!analActual&&!trat&&!plan&&!lab&&!gab){
    showToast("Escribe al menos el motivo de consulta o la exploración antes de sugerir diagnósticos",false);return;
  }
  const dxDiv=document.getElementById("diagnosticos-ia");
  if(dxDiv){
    dxDiv.style.display="block";
    dxDiv.innerHTML=`<div style="display:flex;align-items:center;gap:8px;color:#7B1FA2;font-size:13px"><span class="spin">⚙️</span> Analizando y generando diagnósticos CIE-10...</div>`;
  }
  const nota=[
    subj&&`MOTIVO DE CONSULTA:\n${subj}`,
    expl&&`EXPLORACIÓN FÍSICA:\n${expl}`,
    analActual&&`ANÁLISIS PREVIO:\n${analActual}`,
    trat&&`TRATAMIENTO:\n${trat}`,
    plan&&`PLAN:\n${plan}`,
    lab&&`LABORATORIO:\n${lab}`,
    gab&&`GABINETE:\n${gab}`,
  ].filter(Boolean).join("\n\n");
  const p=STATE.pat||{};
  const paciente=`${p.nombre||""} ${p.apellido_paterno||""}, Edad: ${calcEdad(p.fecha_nacimiento)}, Sexo: ${p.sexo_biologico||"NS"}`;
  try{
    const res=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo:"diagnosticos",nota,paciente})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const dx=data.diagnosticos||[];
    if(!dxDiv)return;
    if(dx.length===0){
      dxDiv.innerHTML=`<p style="font-size:13px;color:#7B1FA2;padding:4px">Sin diagnósticos sugeridos. Agrega más contenido a la nota.</p>`;
      return;
    }
    const CERT_COLOR={"Principal":"#1B5E20","Secundario":"#E65100","Diferencial":"#1565C0"};
    dxDiv.innerHTML=`
      <p style="font-size:12px;font-weight:700;color:#7B1FA2;margin-bottom:8px;text-transform:uppercase">Diagnósticos sugeridos — haz clic para agregar</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">
        ${dx.map(d=>`<button onclick="agregarDxAlAnalisis('${(d.codigo||"").replace(/'/g,"\\'")} – ${(d.nombre||"").replace(/'/g,"\\'")}',this)"
          style="background:#fff;border:1.5px solid #CE93D8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;text-align:left;transition:all .15s">
          <b style="color:#6A1B9A">${d.codigo||""}</b> <span style="color:#263238">– ${d.nombre||""}</span>
          <span style="font-size:11px;background:${CERT_COLOR[d.certeza]||"#546E7A"}20;color:${CERT_COLOR[d.certeza]||"#546E7A"};padding:1px 6px;border-radius:10px;margin-left:4px;font-weight:600">${d.certeza||""}</span>
        </button>`).join("")}
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="agregarTodosLosDx()" style="background:#7B1FA2;color:#fff;border:none;border-radius:7px;padding:5px 14px;cursor:pointer;font-size:13px;font-weight:600">✓ Agregar todos</button>
        <button onclick="document.getElementById('diagnosticos-ia').style.display='none'" style="background:none;border:1px solid #CE93D8;color:#7B1FA2;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:13px">✕ Cerrar</button>
      </div>`;
  }catch(e){
    if(dxDiv)dxDiv.innerHTML=`<p style="font-size:13px;color:${DA};padding:4px">Error: ${e.message}</p>`;
  }
}

window.toggleGrabacion=function(){
  if(_grabando){
    // Detener grabación
    _grabando=false;
    if(_recognition){try{_recognition.stop();}catch(e){}}
    clearInterval(_timerGrab);
    document.getElementById("btn-grabar").style.background="#C62828";
    document.getElementById("txt-grabar").textContent="Iniciar grabación";
    document.getElementById("ic-grabar").textContent="🎤";
    document.getElementById("ondas").style.display="none";
    document.getElementById("tiempo-grab").style.display="none";
  } else {
    // Iniciar grabación
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("Tu navegador no soporta reconocimiento de voz. Usa Chrome.",false);return;}
    _recognition=new SR();
    _recognition.continuous=true;
    _recognition.interimResults=true;
    _recognition.lang="es-MX";
    _recognition.onresult=function(e){
      let final="";let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      _transcripcion+=final;
      const live=document.getElementById("transcripcion-live");
      if(live)live.innerHTML=(_transcripcion+"<span style='color:#90A4AE;'>"+interim+"</span>")||"Escuchando...";
    };
    _recognition.onerror=function(e){showToast("Error de micrófono: "+e.error,false);_grabando=false;};
    _recognition.start();
    _grabando=true;
    _segundos=0;
    document.getElementById("btn-grabar").style.background="#2E7D32";
    document.getElementById("txt-grabar").textContent="Detener grabación";
    document.getElementById("ic-grabar").textContent="⏹";
    document.getElementById("ondas").style.display="flex";
    document.getElementById("tiempo-grab").style.display="inline";
    _timerGrab=setInterval(()=>{
      _segundos++;
      const m=Math.floor(_segundos/60).toString().padStart(2,"0");
      const s=(_segundos%60).toString().padStart(2,"0");
      const t=document.getElementById("tiempo-grab");
      if(t)t.textContent=m+":"+s;
    },1000);
  }
}
window.limpiarTranscripcion=function(){
  _transcripcion="";
  const live=document.getElementById("transcripcion-live");
  if(live)live.innerHTML="Haz clic en Iniciar grabación y habla...";
}
window.generarNotaIA=async function(){
  const texto=_transcripcion.trim()||(document.getElementById("transcripcion-live")?.textContent||"").trim();
  if(!texto||texto.includes("Haz clic en")){
    showToast("Graba o escribe el interrogatorio primero",false);return;
  }
  const btn=document.getElementById("btn-generar-ia");
  if(btn){btn.disabled=true;btn.textContent="⚙️ Generando nota con IA...";}
  const p=STATE.pat||{};
  const pacData=`Nombre: ${p.nombre||""} ${p.apellido_paterno||""}\nEdad: ${calcEdad(p.fecha_nacimiento)}\nSexo: ${p.sexo_biologico||"No especificado"}`;
  const antData=`Alergias: ${STATE.alergs.join(", ")||"Sin alergias conocidas"}\nPatológicos: ${Object.keys(STATE.patData||{}).filter(k=>STATE.patData[k]).join(", ")||"No especificados"}`;
  try{
    const res=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({transcripcion:texto,paciente:pacData,antecedentes:antData})
    });
    const data=await res.json();
    if(data.error){
      const rawInfo=data.raw?`\n\nRespuesta IA (primeros 300 chars):\n${data.raw.substring(0,300)}`:"";
      throw new Error(data.error+rawInfo);
    }
    // Llenar campos IA
    const set=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    const setSel=(id,val)=>{const e=document.getElementById(id);if(e&&val){const opts=Array.from(e.options).map(o=>o.value.toLowerCase());const match=opts.findIndex(o=>o.includes((val||"").toLowerCase().split(" ")[0]));if(match>0)e.selectedIndex=match;else e.value=val;}};
    set("ia_subj",data.subjetivo);
    set("ia_expl",data.exploracion_sugerida);
    set("ia_trat",data.tratamiento);
    set("ia_lab",data.laboratorios);
    set("ia_gab",data.gabinete);
    set("ia_plan",data.plan);
    setSel("ia_prog_func",data.pronostico_funcion);
    setSel("ia_prog_vida",data.pronostico_vida);
    // Diagnósticos
    const dl=document.getElementById("ia_diagnosticos_lista");
    if(dl&&data.diagnosticos){
      dl.innerHTML=data.diagnosticos.map((d,i)=>`
        <label style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #C8E6C9;cursor:pointer">
          <input type="checkbox" checked data-diag="${d.cie10}: ${d.nombre}" style="accent-color:#2E7D32;width:16px;height:16px;flex-shrink:0;margin-top:2px">
          <div>
            <p style="font-size:14px;font-weight:700;color:#1B5E20">${d.cie10} — ${d.nombre}</p>
            <p style="font-size:14px;color:#546E7A;line-height:1.5">${d.descripcion||""}</p>
            <span style="background:${d.probabilidad==="alta"?"#C8E6C9":d.probabilidad==="media"?"#FFF3E0":"#ECEFF1"};color:${d.probabilidad==="alta"?"#1B5E20":d.probabilidad==="media"?"#E65100":"#546E7A"};padding:1px 7px;border-radius:20px;font-size:14px;font-weight:700">Probabilidad: ${d.probabilidad}</span>
          </div>
        </label>`).join("");
    }
    document.getElementById("ia-resultados").style.display="block";
    document.getElementById("ia-resultados").scrollIntoView({behavior:"smooth"});
    showToast("✓ Nota médica generada con IA");
  }catch(err){
    showToast("Error al generar: "+err.message+". Verifica que ANTHROPIC_API_KEY esté configurada en Vercel.",false);
  }finally{
    if(btn){btn.disabled=false;btn.textContent="✨ Paso 2: Generar Nota Médica Completa";}
  }
}

    frecuencia_respiratoria:parseFloat(gv("cs_fr"))||null,
    saturacion_o2:parseFloat(gv("cs_sat"))||null,
    peso:parseFloat(gv("cs_peso"))||null,talla:parseFloat(gv("cs_talla"))||null,
    imc:parseFloat(gv("cs_imc"))||null,

    presion_diastolica:parseFloat(gv("cs_tad"))||null,

window.generarPDFReceta=async function(tipo="receta"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
  const p=STATE.pat||{};
  const med=STATE.medProfile||STATE.userProfile||{};
  const contenido=document.getElementById("recipe-content")?.value||"";
  const nomPac=`${p.nombre||""} ${p.apellido_paterno||""} ${p.apellido_materno||""}`.trim().toUpperCase();
  const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
  const medNom=`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim().toUpperCase();
  const W=216, M=15; // W=ancho carta, M=margen
  // ── Función imagen con proporción ──
  async function addImg(url,x,y,maxH,maxW){
    try{
      const res=await fetch(url);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      doc.addImage(b64,url.toLowerCase().includes("png")?"PNG":"JPEG",x,y,w,h);
      return{w,h};
    }catch(e){return{w:0,h:0};}
  }
  // ── CALCULAR LÍNEAS del médico ──
  const shortInst=s=>s?s.split(" — ")[0].split(" · ")[0].trim():"";
  const credLines=[];
  credLines.push({txt:medNom,bold:true,sz:9});
  if(med.licenciatura||med.institucion_grado)
    credLines.push({txt:[med.licenciatura,shortInst(med.institucion_grado)].filter(Boolean).join("   ").toUpperCase(),bold:false,sz:8});
  if(med.cedula_medico)
    credLines.push({txt:`Céd. Prof. ${med.cedula_medico}`,bold:false,sz:8});
  if(med.especialidad_1||med.institucion_esp_1)
    credLines.push({txt:`Especialidad en ${[med.especialidad_1,shortInst(med.institucion_esp_1)].filter(Boolean).join("   ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_esp_1)
    credLines.push({txt:`Céd. Esp. ${med.cedula_esp_1}`,bold:false,sz:8});
  if(med.subespecialidad||med.institucion_esp_2)
    credLines.push({txt:`Subespecialidad en ${[med.subespecialidad,shortInst(med.institucion_esp_2)].filter(Boolean).join("   ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_subesp)
    credLines.push({txt:`Céd. Subesp. ${med.cedula_subesp}`,bold:false,sz:8});
  if(med.alta_especialidad)
    credLines.push({txt:`Alta Especialidad en ${med.alta_especialidad}${med.institucion_alta?"   "+shortInst(med.institucion_alta):""}`.toUpperCase(),bold:false,sz:8});
  const headerH=Math.max(18, credLines.length*4.5+4);
  const lineY=headerH+4;
  // ── LOGO izquierda ──
  await addImg(
    "https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg",
    M, 7, headerH-2, 35
  );
  // ── DATOS MÉDICO derecha ──
  let ry=12;
  for(const cl of credLines){
    doc.setFontSize(cl.sz);
    doc.setFont("helvetica",cl.bold?"bold":"normal");
    doc.setTextColor(cl.bold?38:70,cl.bold?50:70,cl.bold?56:70);
    // Truncar si es muy largo
    let txt=cl.txt;
    while(doc.getTextWidth(txt)>90&&txt.length>5)txt=txt.slice(0,-2);
    doc.text(txt,W-M,ry,{align:"right"});
    ry+=cl.sz===9?4.8:4;
  }
  // ── LÍNEA SEPARADORA ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.6);
  doc.line(M,lineY,W-M,lineY);
  // ── DATOS PACIENTE ──
  const py=lineY+6;
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  doc.setFont("helvetica","bold");doc.text("NOMBRE DEL PACIENTE:",M,py);
  doc.setFont("helvetica","normal");doc.text(nomPac,M+45,py);
  doc.setFont("helvetica","bold");doc.text("FECHA:",W-M-27,py);
  doc.setFont("helvetica","normal");doc.text(hoy,W-M,py,{align:"right"});
  const py2=py+5;
  doc.setFont("helvetica","bold");doc.text("Edad:",M,py2);
  doc.setFont("helvetica","normal");doc.text(calcEdad(p.fecha_nacimiento)||"",M+12,py2);
  doc.setFont("helvetica","bold");doc.text("Fecha de nacimiento:",M+46,py2);
  doc.setFont("helvetica","normal");doc.text(p.fecha_nacimiento||"",M+88,py2);
  // ── LÍNEA ──
  const l2y=py2+4;
  doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
  doc.line(M,l2y,W-M,l2y);
  // ── LEYENDA ALERGIA ──
  let contentY=l2y+7;
  if(tipo==="receta"){
    doc.setFontSize(7);doc.setFont("helvetica","italic");doc.setTextColor(90,90,90);
    doc.text("TOMAR O APLICAR SOLO SI NO ES ALÉRGICO / TAKE OR APPLY ONLY IF PATIENT IS NOT ALLERGIC",W/2,l2y+5,{align:"center"});
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
    doc.line(M,l2y+7,W-M,l2y+7);
    contentY=l2y+13;
  }
  // ── TÍTULO ──
  const titulos={receta:"TRATAMIENTO",lab:"SOLICITUD DE LABORATORIO",gab:"SOLICITUD DE ESTUDIOS DE GABINETE"};
  doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text(titulos[tipo],M,contentY);
  doc.setLineWidth(0.4);doc.setDrawColor(38,50,56);
  doc.line(M,contentY+1,M+doc.getTextWidth(titulos[tipo]),contentY+1);
  contentY+=7;
  // ── CONTENIDO ──
  const maxContentY=135; // media carta
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  for(const rawLine of contenido.split("\n")){
    if(contentY>maxContentY){doc.addPage();contentY=20;}
    if(!rawLine.trim()){contentY+=2;continue;}
    const isNum=rawLine.match(/^\d+[.\-]/);
    doc.setFont("helvetica",isNum?"bold":"normal");
    const wrapped=doc.splitTextToSize(rawLine,W-M*2);
    for(const wl of wrapped){
      if(contentY>maxContentY){doc.addPage();contentY=20;}
      doc.text(wl,M,contentY);
      contentY+=4.5;
    }
  }
  // ── FIRMA CENTRADA ──
  const firmaLineY=148;
  const firmaLineX1=W/2-38;
  const firmaLineX2=W/2+38;
  if(med.firma_digital){
    // Calcular proporciones sin dibujar
    try{
      const res=await fetch(med.firma_digital);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const maxH=18,maxW=55;
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      const fx=W/2-w/2;
      const fy=firmaLineY-h-2;
      doc.addImage(b64,med.firma_digital.toLowerCase().includes("png")?"PNG":"JPEG",fx,fy,w,h);
    }catch(e){}
  }
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(firmaLineX1,firmaLineY,firmaLineX2,firmaLineY);
  doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text("FIRMA DEL MÉDICO",W/2,firmaLineY+5,{align:"center"});
  // ── FOOTER ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(M,158,W-M,158);
  doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
  doc.text(medNom,W/2,163,{align:"center"});
  doc.text(med.direccion_clinica||"Insurgentes Sur 933, Nápoles, Benito Juárez, Ciudad de México C.P. 03810",W/2,167,{align:"center"});
  doc.text("Teléfono: 55 5682 4345 / 56 4423 7028  Celular: 55 8767 3104",W/2,171,{align:"center"});
  doc.text(med.email||"dr.polanco@qpclinic.mx",W/2,175,{align:"center"});
  const nombre=tipo==="receta"?"Receta":tipo==="lab"?"Solicitud_Lab":"Solicitud_Gabinete";
  doc.save(`${nombre}_${nomPac.replace(/ /g,"_")}_${hoy.replace(/\//g,"-")}.pdf`);
  showToast("✓ PDF generado");
}

        doc.text(lbl.toUpperCase()+":",M+3,y);y+=4.5;
        doc.setFontSize(FS_BODY);doc.setFont("helvetica","normal");doc.setTextColor(NEGRO[0],NEGRO[1],NEGRO[2]);
        const ls2=doc.splitTextToSize(val,CUERPO-8);
        ls2.forEach(function(l){if(y>253){nuevaPagina();}doc.text(S(l),M+5,y);y+=4.8;});
        y+=2;
      } else {
        doc.setFont("helvetica","bold");doc.setTextColor(GRIS_MED[0],GRIS_MED[1],GRIS_MED[2]);
        doc.text(lbl+":",M+3,y);
        const lw=doc.getTextWidth(lbl+": ")+2;
        doc.setFont("helvetica","normal");doc.setTextColor(NEGRO[0],NEGRO[1],NEGRO[2]);
        doc.text(S(val).substring(0,88),M+3+lw,y);
        y+=5;
      }
    });
    y+=3;
  }

  // ── PRONOSTICO ────────────────────────────────────────
  if(pf||pv){
    if(y>233){nuevaPagina();}
    doc.setFillColor(AZUL[0],AZUL[1],AZUL[2]);doc.rect(M,y,CUERPO,6.5,"F");
    doc.setTextColor(BLANCO[0],BLANCO[1],BLANCO[2]);
    doc.setFontSize(FS_SEC);doc.setFont("helvetica","bold");
    doc.text("PRONOSTICO",M+3,y+4.5);y+=8;
    doc.setTextColor(NEGRO[0],NEGRO[1],NEGRO[2]);doc.setFontSize(FS_BODY);
    if(pf){doc.setFont("helvetica","bold");doc.text("Para la funcion:",M+3,y);doc.setFont("helvetica","normal");doc.text(S(pf),M+38,y);y+=5.5;}
    if(pv){doc.setFont("helvetica","bold");doc.text("Para la vida:",M+3,y);doc.setFont("helvetica","normal");doc.text(S(pv),M+30,y);y+=5.5;}
    y+=3;
  }

  // ── FIRMA ─────────────────────────────────────────────
  const espacioFirma=firmaB64?46:30;
  if(y+espacioFirma>262){nuevaPagina();}
  else y+=4;
  doc.setDrawColor(200,215,225);doc.setLineWidth(0.25);doc.line(M,y,W-M,y);
  y+=3;
  if(firmaB64){try{doc.addImage(firmaB64,"PNG",W/2-25,y,50,16);y+=18;}catch(e){}}
  doc.setDrawColor(NEGRO[0],NEGRO[1],NEGRO[2]);doc.setLineWidth(0.35);
  doc.line(W/2-28,y,W/2+28,y);y+=1;
  doc.setFontSize(FS_SEC);doc.setFont("helvetica","bold");doc.setTextColor(NEGRO[0],NEGRO[1],NEGRO[2]);
  doc.text("FIRMA DEL MEDICO",W/2,y+4,{align:"center"});
  doc.setFont("helvetica","normal");doc.setTextColor(GRIS_MED[0],GRIS_MED[1],GRIS_MED[2]);
  doc.text(medNom,W/2,y+9,{align:"center"});
  if(med.cedula_medico)doc.text("Ced. Prof. "+S(med.cedula_medico),W/2,y+13,{align:"center"});
  if(c.bloqueada&&c.fecha_firma&&c.medico_nombre){
    y+=16;
    const fechaFirma=S(c.fecha_firma).replace("T"," ").replace(/\.\d+\+\d+:\d+$/,"").replace(/\.\d+$/,"");
    doc.setFontSize(FS_FOOTER);doc.setTextColor(46,125,50);
    doc.text("Nota firmada digitalmente el "+fechaFirma+" por "+S(c.medico_nombre),W/2,y,{align:"center"});
  }

  addFooter();
  const archivo="Nota_"+tipoNota.replace(/[^a-zA-Z0-9]/g,"_")+"_"+nomPac.replace(/ /g,"_")+"_"+hoy.replace(/\//g,"-")+".pdf";
  doc.save(archivo);
  showToast("PDF descargado");
  }catch(err){
    console.error("descargarNotaPDF:",err);
    showToast("Error al generar PDF: "+T(err.message),false);
  }
}

function hexToRgb(hex){
  if(!hex||!hex.startsWith("#"))return[38,50,56];
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[isNaN(r)?38:r,isNaN(g)?50:g,isNaN(b)?56:b];
}
async function urlToBase64firma(url){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin="anonymous";
    img.onload=()=>{const c=document.createElement("canvas");c.width=img.width;c.height=img.height;c.getContext("2d").drawImage(img,0,0);res(c.toDataURL("image/png"));};
    img.onerror=()=>res(null);
    img.src=url+"?t="+Date.now();
  });
}

function calcEdad(fnac){
  if(!fnac)return"—";
  const hoy=new Date(),nac=new Date(fnac);
  let años=hoy.getFullYear()-nac.getFullYear();
  let meses=hoy.getMonth()-nac.getMonth();
  if(meses<0){años--;meses+=12;}
  if(hoy.getDate()<nac.getDate())meses--;
  if(meses<0){años--;meses+=12;}
  return años>0?`${años}a ${meses}m`:`${meses} meses`;
}

window.previewImagen=function(input){
  const file=input.files[0];
  const preview=document.getElementById("img-preview");
  const imgEl=document.getElementById("img-preview-src");
  const pdfEl=document.getElementById("img-preview-pdf");
  const pdfName=document.getElementById("img-preview-pdf-name");
  if(!file||!preview)return;
  preview.style.display="block";
  if(file.type==="application/pdf"){
    imgEl.style.display="none";
    pdfEl.style.display="block";
    if(pdfName)pdfName.textContent=file.name;
  } else {
    pdfEl.style.display="none";
    imgEl.style.display="block";
    const reader=new FileReader();
    reader.onload=e=>{if(imgEl)imgEl.src=e.target.result;};
    reader.readAsDataURL(file);
  }
  // Auto-sugerir nombre si está vacío

// Catálogo CIE-10 ligero para extracción de diagnósticos desde texto libre
const CIE10_REGEX=/\b([A-TV-Z][0-9][0-9AB](?:\.[0-9X]{1,2})?)\b/g;

function repRangoFechas(periodo,desde,hasta){
  const hoy=new Date();
  let d,h;
  if(periodo==="hoy"){
    d=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());
    h=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate()+1);
  } else if(periodo==="semana"){
    const diaSemana=hoy.getDay();
    d=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate()-diaSemana);
    h=new Date(d.getFullYear(),d.getMonth(),d.getDate()+7);
  } else if(periodo==="mes"){
    d=new Date(hoy.getFullYear(),hoy.getMonth(),1);
    h=new Date(hoy.getFullYear(),hoy.getMonth()+1,1);
  } else if(periodo==="anio"){
    d=new Date(hoy.getFullYear(),0,1);
    h=new Date(hoy.getFullYear()+1,0,1);
  } else { // personalizado
    d=desde?new Date(desde+"T00:00:00"):new Date(hoy.getFullYear(),hoy.getMonth(),1);
    h=hasta?new Date(hasta+"T23:59:59"):hoy;
  }
  return{desde:d.toISOString(),hasta:h.toISOString(),desdeStr:d.toISOString().split("T")[0],hastaStr:h.toISOString().split("T")[0]};
}

function repEtiquetaPeriodo(periodo,desde,hasta){
  const map={hoy:"Hoy",semana:"Esta semana",mes:"Este mes",anio:"Este año"};
  if(map[periodo])return map[periodo];
  return `${(desde||"").split("-").reverse().join("/")} – ${(hasta||"").split("-").reverse().join("/")}`;
}

// Genera las "buckets" temporales para graficar series dentro del rango
function repBuckets(periodo,rango){
  const buckets=[];
  if(periodo==="hoy"){
    // por hora (horario laboral típico 7-21)
    for(let hh=7;hh<=21;hh++){
      buckets.push({key:String(hh).padStart(2,"0"),label:hh+":00",test:(iso)=>{const dt=new Date(iso);return dt.getHours()===hh;}});
    }
  } else if(periodo==="semana"){
    const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const inicio=new Date(rango.desde);
    for(let i=0;i<7;i++){
      const d=new Date(inicio.getFullYear(),inicio.getMonth(),inicio.getDate()+i);
      const key=d.toISOString().split("T")[0];
      buckets.push({key,label:dias[d.getDay()],test:(iso)=>(iso||"").startsWith(key)});
    }
  } else if(periodo==="anio"){
    const inicio=new Date(rango.desde);
    for(let i=0;i<12;i++){
      const d=new Date(inicio.getFullYear(),i,1);
      const key=d.toISOString().substring(0,7);
      const label=d.toLocaleDateString("es-MX",{month:"short"}).toUpperCase();
      buckets.push({key,label,test:(iso)=>(iso||"").startsWith(key)});
    }
  } else {
    // mes o personalizado: por día
    const inicio=new Date(rango.desde);
    const fin=new Date(rango.hasta);
    const dias=Math.max(1,Math.round((fin-inicio)/86400000));
    const maxDias=Math.min(dias,62);
    for(let i=0;i<maxDias;i++){
      const d=new Date(inicio.getFullYear(),inicio.getMonth(),inicio.getDate()+i);
      if(d>fin)break;
      const key=d.toISOString().split("T")[0];
      const label=d.getDate()+"";
      buckets.push({key,label,test:(iso)=>(iso||"").startsWith(key)});
    }
  }
  return buckets;
}

// ── TAB: EPIDEMIOLÓGICO ─────────────────────────────────────
function renderRepEpi(ctx){
  // Sexo / Género (de pacientes nuevos en el periodo)
  const sexoMap={};
  ctx.pac.forEach(p=>{const s=p.sexo_biologico||"Sin indicar";sexoMap[s]=(sexoMap[s]||0)+1;});
  const sexoArr=Object.entries(sexoMap).sort((a,b)=>b[1]-a[1]);
  const maxSexo=Math.max(...sexoArr.map(s=>s[1]),1);

  // Pirámide de edades
  const rangos=[[0,9,"0-9"],[10,19,"10-19"],[20,29,"20-29"],[30,39,"30-39"],[40,49,"40-49"],[50,59,"50-59"],[60,69,"60-69"],[70,79,"70-79"],[80,150,"80+"]];
  const edadMap={};rangos.forEach(r=>edadMap[r[2]]=0);
  ctx.pac.forEach(p=>{
    if(!p.fecha_nacimiento)return;
    const edad=Math.floor((Date.now()-new Date(p.fecha_nacimiento).getTime())/(365.25*86400000));
    const r=rangos.find(rg=>edad>=rg[0]&&edad<=rg[1]);
    if(r)edadMap[r[2]]++;
  });
  const edadArr=rangos.map(r=>[r[2],edadMap[r[2]]]);
  const maxEdad=Math.max(...edadArr.map(e=>e[1]),1);

  // Diagnósticos CIE-10 extraídos de "analisis"
  const dxMap={};
  ctx.cons.forEach(c=>{
    const txt=c.analisis||"";
    const matches=[...txt.matchAll(CIE10_REGEX)];
    matches.forEach(m=>{const code=m[1].toUpperCase();dxMap[code]=(dxMap[code]||0)+1;});
  });
  const dxArr=Object.entries(dxMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxDx=Math.max(...dxArr.map(d=>d[1]),1);

  // Tipo de nota (perfil de atención)

function preventTerms(sx,age,tc,hdl,sbp,dm,smk,bmi,egfr,htn,statin){
  const M=0.02586;
  const cage=(age-55)/10;
  const cnhdl=((tc-hdl)*M)-3.5;
  const chdl=((hdl*M)-1.3)/0.3;
  const sbp_lt=(Math.min(sbp,110)-110)/20;
  const sbp_ge=(Math.max(sbp,110)-130)/20;
  const bmi_lt=(Math.min(bmi,30)-25)/5;
  const bmi_ge=(Math.max(bmi,30)-30)/5;
  const egfr_lt=(Math.min(egfr,60)-60)/-15;
  const egfr_ge=(Math.max(egfr,60)-90)/-15;
  return{cage,cnhdl,chdl,sbp_lt,sbp_ge,dm,smk,bmi_lt,bmi_ge,egfr_lt,egfr_ge,htn,statin,
    tx_sbp:htn?sbp_ge:0, tx_nhdl:statin?cnhdl:0,
    age_nhdl:cage*cnhdl, age_hdl:cage*chdl, age_sbp:cage*sbp_ge, age_dm:cage*dm,
    age_smk:cage*smk, age_bmi:cage*bmi_ge, age_egfr:cage*egfr_lt, const:1};
}
function preventRisk(model,t){
  let lp=0;PREVENT_ORDER.forEach((k,i)=>{lp+=model[i]*t[k];});
  return Math.exp(lp)/(1+Math.exp(lp));
}

// ── CKD-EPI 2021 + Cockcroft-Gault ─────────────────────────
function ckdEpi2021(scr,age,female){
  const k=female?0.7:0.9, a=female?-0.241:-0.302;
  const ratio=scr/k;
  let egfr=142*Math.pow(Math.min(ratio,1),a)*Math.pow(Math.max(ratio,1),-1.200)*Math.pow(0.9938,age);
  if(female)egfr*=1.012;
  return egfr;
}
// CKD-EPI 2021 Creatinina-Cistatina C (eGFRcr-cys) — NEJM 2021;385:1737-1749
function ckdEpiCrCys2021(scr,scys,age,female){
  const k=female?0.7:0.9, a=female?-0.219:-0.144;
  const ratioCr=scr/k;
  let egfr=135*Math.pow(Math.min(ratioCr,1),a)*Math.pow(Math.max(ratioCr,1),-0.544)
    *Math.pow(Math.min(scys/0.8,1),-0.323)*Math.pow(Math.max(scys/0.8,1),-0.778)
    *Math.pow(0.9961,age);
  if(female)egfr*=0.963;
  return egfr;
}
function kdigoStage(egfr){
  if(egfr>=90)return["G1","≥90 — Normal o alta","#2E7D32"];
  if(egfr>=60)return["G2","60–89 — Levemente disminuida","#558B2F"];
  if(egfr>=45)return["G3a","45–59 — Leve-moderada","#F9A825"];
  if(egfr>=30)return["G3b","30–44 — Moderada-grave","#EF6C00"];
  if(egfr>=15)return["G4","15–29 — Gravemente disminuida","#D84315"];
  return["G5","<15 — Falla renal","#C62828"];
}
function cockcroftGault(age,weight,scr,female){
  let crcl=((140-age)*weight)/(72*scr);
  if(female)crcl*=0.85;
  return crcl;
}
// Categorías de albuminuria KDIGO (UACR mg/g)
function albuminuriaCat(uacr){
  if(uacr<30)return["A1","<30 — Normal a levemente aumentada"];
  if(uacr<=300)return["A2","30–300 — Moderadamente aumentada"];
  return["A3",">300 — Severamente aumentada"];
}
// Mapa de calor KDIGO (riesgo combinado eGFR × albuminuria)
// niveles: 0 verde (bajo riesgo/normal), 1 amarillo (riesgo moderado), 2 naranja (riesgo alto), 3 rojo (riesgo muy alto)
function kdigoHeatmap(gStage,aCat){
  const gIdx={G1:0,G2:1,G3a:2,G3b:3,G4:4,G5:5}[gStage];
  const aIdx={A1:0,A2:1,A3:2}[aCat];
  // matriz [G][A] según KDIGO 2012/2024
  const matriz=[
    [0,1,2], // G1
    [0,1,2], // G2
    [1,2,3], // G3a
    [2,3,3], // G3b
    [3,3,3], // G4
    [3,3,3], // G5
  ];
  const nivel=matriz[gIdx][aIdx];
  const info=[
    {label:"Riesgo bajo (normal)",color:"#2E7D32",bg:"#E8F5E9",rec:"Vigilancia anual o según riesgo basal."},
    {label:"Riesgo moderadamente aumentado",color:"#F9A825",bg:"#FFF8E1",rec:"Vigilar 1×/año. Considerar IECA/ARA2 si hay albuminuria persistente."},
    {label:"Riesgo alto",color:"#EF6C00",bg:"#FFF3E0",rec:"Vigilar ≥2×/año. Optimizar control de TA y glucemia; valorar referencia a nefrología."},
    {label:"Riesgo muy alto",color:"#C62828",bg:"#FFEBEE",rec:"Vigilar ≥3-4×/año. Referencia a nefrología."},
  ];
  return{nivel,...info[nivel]};
}

window.init_prevent=function(){calcPrevent();}
window.calcPrevent=function(){
  const sx=gv("prv_sex");
  const age=parseFloat(gv("prv_age")),sbp=parseFloat(gv("prv_sbp")),tc=parseFloat(gv("prv_tc")),
    hdl=parseFloat(gv("prv_hdl")),egfr=parseFloat(gv("prv_egfr")),bmi=parseFloat(gv("prv_bmi")||"25");
  const dm=document.getElementById("prv_dm")?.checked?1:0, smk=document.getElementById("prv_smk")?.checked?1:0,
    htn=document.getElementById("prv_htn")?.checked?1:0, statin=document.getElementById("prv_statin")?.checked?1:0;
  const res=document.getElementById("tool-result");if(!res)return;
  if([age,sbp,tc,hdl,egfr].some(v=>isNaN(v))){
    res.innerHTML=`<p style="color:${MU};font-size:13px;padding:12px;background:#F0F4F8;border-radius:8px">Complete edad, TA sistólica, colesterol total, HDL y TFG para calcular.</p>`;return;
  }
  let aviso="";
  if(age<30||age>79)aviso="⚠️ PREVENT está validado solo para 30–79 años. ";
  const t=preventTerms(sx,Math.max(30,Math.min(79,age)),tc,hdl,sbp,dm,smk,bmi,egfr,htn,statin);
  const cvd=preventRisk(PREVENT[sx+"_cvd"],t)*100;
  const ascvd=preventRisk(PREVENT[sx+"_ascvd"],t)*100;
  const hf=preventRisk(PREVENT[sx+"_hf"],t)*100;
  // Categoría ASCVD (umbrales ACC/AHA)
  let cat,catCol;
  if(ascvd<5){cat="Bajo";catCol="#2E7D32";}
  else if(ascvd<7.5){cat="Limítrofe";catCol="#F9A825";}
  else if(ascvd<20){cat="Intermedio";catCol="#EF6C00";}
  else{cat="Alto";catCol="#C62828";}
  const card=(label,val,col,sub)=>`<div style="flex:1;min-width:140px;text-align:center;background:${col}14;border:1px solid ${col}40;border-radius:10px;padding:14px">
    <p style="font-size:12px;color:${MU};font-weight:600;text-transform:uppercase;margin-bottom:6px">${label}</p>
    <p style="font-size:30px;font-weight:800;color:${col}">${val.toFixed(1)}%</p>
    ${sub?`<p style="font-size:12px;color:${MU};margin-top:2px">${sub}</p>`:""}</div>`;
  const txt=`Riesgo cardiovascular PREVENT (AHA 2023), 10 años — ECV total: ${cvd.toFixed(1)}%, ASCVD: ${ascvd.toFixed(1)}% (riesgo ${cat}), Insuficiencia cardiaca: ${hf.toFixed(1)}%.`;
  prepararGuardado(Math.round(ascvd*10)/10,"% ASCVD 10a",{ecv_total:Math.round(cvd*10)/10,ascvd:Math.round(ascvd*10)/10,ic:Math.round(hf*10)/10,categoria:cat,edad:age,sbp,tc,hdl,egfr,bmi,dm,smk,htn,statin,sexo:sx});
  res.innerHTML=`${aviso?`<p style="color:#EF6C00;font-size:13px;margin-bottom:10px">${aviso}</p>`:""}
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${card("ECV total 10 años",cvd,"#C62828","ASCVD + IC")}
      ${card("ASCVD 10 años",ascvd,catCol,"Riesgo "+cat)}
      ${card("Insuf. cardiaca",hf,"#6A1B9A","10 años")}
    </div>
    <div style="margin-top:12px;padding:12px;background:#F0F4F8;border-radius:8px;font-size:13px;color:${TX};line-height:1.5">
      <b>Interpretación (ASCVD):</b> umbral de tratamiento de hipertensión y estatina según guía 2025 AHA/ACC ≥7.5% de riesgo a 10 años (o ECV clínica, diabetes o ERC presente). Considere potenciadores de riesgo para personalizar.
    </div>
    ${botonesResultado(txt)}`;
}
