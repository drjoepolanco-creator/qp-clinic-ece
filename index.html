// ── DICTADO POR VOZ ──────────────────────────────────────
let _dictRecog=null;
let _dictActive=null;
window.dictarCampo=function(fieldId){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast("Tu navegador no soporta dictado por voz. Usa Google Chrome.",false);return;
  }
  const btn=document.getElementById("mic_"+fieldId);
  // Si ya está activo en este campo, detener
  if(_dictActive===fieldId&&_dictRecog){
    _dictRecog.stop();return;
  }
  // Si hay otro campo activo, detenerlo
  if(_dictRecog){_dictRecog.stop();}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _dictRecog=new SR();
  _dictRecog.lang="es-MX";
  _dictRecog.continuous=true;
  _dictRecog.interimResults=true;
  _dictActive=fieldId;
  // Estado visual: activo
  if(btn){btn.textContent="⏹";btn.style.background="#FFEBEE";btn.style.borderColor="#E53935";btn.style.color="#E53935";}
  let interim="";
  const ta=document.getElementById(fieldId);
  const base=ta?ta.value:"";
  _dictRecog.onresult=function(e){
    interim="";
    let final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(ta){
      ta.value=base+(base&&final?" ":"")+final+(interim?` [${interim}]`:"");
      ta.scrollTop=ta.scrollHeight;
    }
  };
  _dictRecog.onend=function(){
    // Limpiar el [interim] residual
    if(ta)ta.value=ta.value.replace(/\s?\[.*?\]$/,"");
    if(btn){btn.textContent="🎤";btn.style.background="none";btn.style.borderColor=BR;btn.style.color=MU;}
    _dictActive=null;_dictRecog=null;
    showToast("✓ Dictado finalizado");
  };
  _dictRecog.onerror=function(e){
    if(btn){btn.textContent="🎤";btn.style.background="none";btn.style.borderColor=BR;btn.style.color=MU;}
    _dictActive=null;_dictRecog=null;
    if(e.error!=="aborted")showToast("Error de micrófono: "+e.error,false);
  };
  _dictRecog.start();
  showToast("🎤 Dictando — habla ahora. Clic en ⏹ para detener");
}

window.doLogin=async function(){
  let usuario=gv("lu").trim().toLowerCase();
  const pass=gv("lp");
  if(!usuario||!pass){showLoginError("Ingresa tu usuario y contraseña");return;}
  const lb=document.getElementById("login-btn");
  lb.textContent="Entrando...";lb.disabled=true;
  // Si no tiene @ lo tratamos como username → buscar email en usuarios
  let email=usuario;
  if(!usuario.includes("@")){
    // Buscar en tabla usuarios por username
    const {data:uData}=await SB.from("usuarios").select("email,username").eq("username",usuario).maybeSingle();
    if(uData?.email){
      email=uData.email;
    } else {
      // Intentar con formato username@qpclinic.mx como fallback
      email=usuario+"@qpclinic.mx";
    }
  }
  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){
    showLoginError("Usuario o contraseña incorrectos");
    lb.textContent="Entrar al Sistema";lb.disabled=false;
    return;
  }
  STATE.user=data.user;
  const {data:prof}=await SB.from("usuarios").select("*").eq("id",data.user.id).maybeSingle();
  STATE.userProfile=prof;
  STATE.medProfile=prof; // alias para recetas y documentos
  logBitacora("INICIO DE SESIÓN","Login exitoso",null);
  go("agenda");
}
function showLoginError(msg){const e=document.getElementById("login-error");if(e){e.style.display="block";e.textContent=msg;}}

window.guardarUsuario=async function(uid=""){
  const nom=gv("mu_nom").trim();const ap=gv("mu_ap").trim();
  const usuario=gv("mu_user").trim().toLowerCase().replace(/\s+/g,".");
  if(!nom||!ap||!usuario){showToast("Nombre, apellidos y usuario son obligatorios",false);return;}
  const pass=gv("mu_pass");const pass2=gv("mu_pass2");
  if(!uid&&!pass){showToast("Define una contraseña para el nuevo usuario",false);return;}
  if(pass&&pass!==pass2){showToast("Las contraseñas no coinciden",false);return;}
  if(pass&&pass.length<6){showToast("La contraseña debe tener al menos 6 caracteres",false);return;}
  loading(true,uid?"Guardando cambios...":"Creando usuario...");
  const email=usuario+"@qpclinic.mx";
  // Subir firma si hay archivo seleccionado
  let firma_url=null;
  const firmaFile=document.getElementById("mu_firma_file")?.files[0];
  if(firmaFile&&(uid||true)){
    const targetId=uid||"new_"+Date.now();
    const ext=firmaFile.name.split(".").pop().toLowerCase()||"png";
    const path=`${targetId}/firma.${ext}`;
    const {error:upErr}=await SB.storage.from("firmas-medicos").upload(path,firmaFile,{upsert:true,contentType:firmaFile.type});
    if(!upErr){
      const {data:urlData}=SB.storage.from("firmas-medicos").getPublicUrl(path);
      firma_url=urlData?.publicUrl||null;
    } else {
      showToast("Advertencia: no se pudo subir la firma — "+upErr.message,false);
    }
  }
  const cedMed=gv("mu_cedmed").trim();
  const cedEsp1=gv("mu_cedesp1").trim();
  const profilePayload={
    username:usuario,email,titulo:gv("mu_titulo"),nombre:nom,apellidos:ap,rol:gv("mu_rol"),
    // Formación académica
    licenciatura:gv("mu_lic")||null,
    cedula_medico:cedMed||null,
    institucion_grado:gv("mu_igrado")||null,
    especialidad_1:gv("mu_esp1")||null,
    cedula_esp_1:cedEsp1||null,
    institucion_esp_1:gv("mu_iesp1")||null,
    subespecialidad:gv("mu_subesp")||null,
    cedula_subesp:gv("mu_cedsubesp")||null,
    institucion_esp_2:gv("mu_iesp2")||null,
    alta_especialidad:gv("mu_altaesp")||null,
    institucion_alta:gv("mu_ialta")||null,
    // Agenda y contacto
    telefono:gv("mu_tel")||null,
    calendar_url:gv("mu_cal")||null,
    calendar_color:document.getElementById("mu_color")?.value||"#1565C0",
    activo:true,
  };
  if(firma_url)profilePayload.firma_digital=firma_url;
  if(!uid){
    const {data:authData,error:authErr}=await SB.auth.signUp({
      email,password:pass,
      options:{data:{username:usuario,nombre:nom,apellidos:ap}}
    });
    if(authErr&&!authErr.message?.includes("already registered")){
      loading(false);showToast("Error al crear cuenta: "+authErr.message,false);return;
    }
    const authId=authData?.user?.id;
    if(authId){
      profilePayload.id=authId;
      const {error:dbErr}=await SB.from("usuarios").upsert(profilePayload,{onConflict:"id"});
      if(dbErr){loading(false);showToast("Cuenta creada, error en perfil: "+dbErr.message,false);return;}
    } else {
      const {data:ex}=await SB.from("usuarios").select("id").eq("email",email).maybeSingle();
      if(ex?.id){await SB.from("usuarios").update(profilePayload).eq("id",ex.id);}
      else{loading(false);showToast("No se pudo crear el usuario. Verifica que el username no exista.",false);return;}
    }
    showToast("✓ Usuario creado correctamente");
  } else {
    const {error:dbErr}=await SB.from("usuarios").update(profilePayload).eq("id",uid);
    if(dbErr){loading(false);showToast("Error: "+dbErr.message,false);return;}
    if(pass){
      if(STATE.user?.id===uid){
        const {error:passErr}=await SB.auth.updateUser({password:pass});
        if(passErr)showToast("Perfil guardado. Error de contraseña: "+passErr.message,false);
        else showToast("✓ Usuario y contraseña actualizados");
      } else {
        showToast("✓ Perfil guardado. La contraseña solo puede cambiarla el propio usuario desde su perfil.");
      }
    } else {
      showToast("✓ Usuario actualizado correctamente");
    }
  }
  loading(false);
  cerrarModalUsuario();
  pgMedicos();
}
window.toggleActivoUsuario=async function(uid,activo){
  if(uid===STATE.user?.id){showToast("No puedes desactivar tu propia cuenta",false);return;}
  loading(true,"Actualizando...");
  await SB.from("usuarios").update({activo:!activo}).eq("id",uid);
  loading(false);
  showToast(!activo?"✓ Usuario activado":"✓ Usuario desactivado");
  pgMedicos();
}

          <p style="font-size:12px;color:#2E7D32;font-weight:700;margin-bottom:8px">✅ Opción 1 — Enviar correo de recuperación</p>
          <p style="font-size:12px;color:#546E7A;margin-bottom:10px">Supabase envía al correo <b>${u.email}</b> un enlace para que el usuario cree su nueva contraseña.</p>
          <button onclick="enviarCorreoReset('${u.email}',this)" style="background:#2E7D32;color:#fff;border:none;border-radius:7px;padding:8px 16px;cursor:pointer;font-size:14px;font-weight:700">📧 Enviar correo de recuperación</button>

            <code id="tmp-pass-${uid}" style="font-size:18px;font-weight:700;color:#E65100;letter-spacing:2px;flex:1">${tmp}</code>
            <button onclick="navigator.clipboard.writeText('${tmp}').then(()=>showToast('✓ Contraseña copiada'))" style="background:#FF8F00;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:700">Copiar</button>
          </div>
          <p style="font-size:11px;color:#9E9E9E;margin-top:8px">⚠️ Esta contraseña es solo para comunicar al usuario. Para aplicarla en Supabase, el admin debe ir a: <b>Supabase → Authentication → Users → buscar usuario → Edit → Change password</b></p>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
window.enviarCorreoReset=async function(email,btn){
  if(btn){btn.disabled=true;btn.textContent="Enviando...";}
  const {error}=await SB.auth.resetPasswordForEmail(email,{
    redirectTo:window.location.origin+"/index.html"
  });
  if(error){showToast("Error: "+error.message,false);}
  else{showToast("✓ Correo de recuperación enviado a "+email);}
  if(btn){btn.disabled=false;btn.textContent="📧 Enviar correo de recuperación";}
}

window.previewFirmaPerfil=function(input){
  const file=input.files[0];if(!file)return;
  const prev=document.getElementById("pf_firma_preview");
  const img=document.getElementById("pf_firma_img");
  if(!prev||!img)return;
  const reader=new FileReader();
  reader.onload=e=>{img.src=e.target.result;prev.style.display="block";};
  reader.readAsDataURL(file);
}
window.subirFirmaPerfil=async function(){
  const uid=STATE.user?.id;if(!uid)return;
  const file=document.getElementById("pf_firma_file")?.files[0];
  if(!file){showToast("Selecciona un archivo de firma primero",false);return;}
  if(file.size>2*1024*1024){showToast("El archivo es muy grande (máx. 2MB)",false);return;}
  loading(true,"Subiendo firma...");
  const ext=file.name.split(".").pop().toLowerCase()||"png";
  const path=`${uid}/firma.${ext}`;
  const {error:upErr}=await SB.storage.from("firmas-medicos").upload(path,file,{upsert:true,contentType:file.type});
  if(upErr){loading(false);showToast("Error al subir: "+upErr.message,false);return;}
  const {data:urlData}=SB.storage.from("firmas-medicos").getPublicUrl(path);
  const firma_url=urlData?.publicUrl||null;
  await SB.from("usuarios").update({firma_digital:firma_url}).eq("id",uid);
  loading(false);
  const {data:fresh}=await SB.from("usuarios").select("*").eq("id",uid).maybeSingle();
  if(fresh){STATE.userProfile=fresh;STATE.medProfile=fresh;}
  showToast("✓ Firma subida y guardada correctamente");
  pgPerfil();
}

      4. Copia la URL del iframe y pégala en tu perfil
    </div>
    ${btn("⚙️ Ir a Mi perfil médico","go('perfil')","p",1)}
  </div>`;
  let embedUrl=url;
  if(embedUrl.includes("calendar.google.com/calendar/embed")){
    const sep=embedUrl.includes("?")?"&":"?";
    if(!embedUrl.includes("mode="))embedUrl+=sep+"mode=WEEK";

  return`<iframe src="${embedUrl}" style="width:100%;height:100%;border:none" frameborder="0" scrolling="no" allowfullscreen loading="lazy"></iframe>`;
}

window.abrirExpediente=async function(id){

  loading(false);
  if(error||!data){showToast("Error al cargar expediente",false);return;}
  STATE.pat=data;
  logBitacora("APERTURA DE EXPEDIENTE",`Exp. #${data.numero_expediente||data.id?.substring(0,8)||""}`,data.id);
  STATE.expTab="ficha";
  STATE.ficTab="gen";
  STATE.consultaActual=null;
  // Cargar antecedentes en paralelo
  const [{data:ap},{data:af},{data:al},{data:disc},{data:gin},{data:anp}]=await Promise.all([
    SB.from("antecedentes_patologicos").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("antecedentes_familiares").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("alergias").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("discapacidades").select("categoria").eq("paciente_id",id),
    SB.from("antecedentes_gineco").select("*").eq("paciente_id",id).maybeSingle(),
    SB.from("antecedentes_no_patologicos").select("*").eq("paciente_id",id).maybeSingle(),
  ]);
  STATE.patData=ap?JSON.parse(JSON.stringify(ap.seleccionados||{})):{};
  STATE.patOtrasNotes=ap?ap.notas_otras||"":"";
  STATE.famData=af?JSON.parse(JSON.stringify(af.datos||{})):{};
  STATE.famNotas=af?.notas||"";
  STATE.alergs=al?JSON.parse(JSON.stringify(al.lista||[])):[];
  STATE.alOtrosText=al?.otros||"";
  STATE.discapacidades=disc?disc.map(d=>d.categoria):[];
  STATE.ginData=gin||{};
  STATE.antNoPatText=anp?.texto||"";
  STATE.otrosText=anp?.otros||"";
  // También cargar medicamentos otros
  const {data:medDB}=await SB.from("medicamentos_usados").select("texto,otros").eq("paciente_id",id).maybeSingle();
  STATE.medText=medDB?.texto||"";
  STATE.medOtrosText=medDB?.otros||"";
  go("expediente");
}

window.enviarPreregistro=async function(){
  const nom=gv("nn").trim();const ap=gv("na").trim();
  const cel=(gv("ncel")||gv("ntelmov")||"").trim();
  if(!nom||!ap){showToast("Ingresa nombre y apellido antes de enviar el pre-registro",false);return;}
  if(!cel){showToast("Ingresa el celular del paciente",false);return;}
  loading(true,"Generando enlace...");
  const token=crypto.randomUUID();
  const nombrePac=`${nom} ${ap} ${gv("na2")||""}`.trim();
  const {error}=await SB.from("pre_registros").insert({token,nombre_paciente:nombrePac,celular:cel.replace(/\D/g,""),completado:false});
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  STATE.preregToken=token;STATE.preregNombre=nombrePac;
  const link=`https://qpclinic.org/prereg.html?token=${token}`;
  const celWA=cel.replace(/\D/g,"");const celFmt=celWA.length===10?"52"+celWA:celWA;
  const msg=`🏥 *QP Clinic — Pre-registro*\n\nHola ${nom}, te saludamos de QP Clinic.\n\nPor favor llena tu información antes de tu consulta:\n\n👉 ${link}\n\nToma solo 3 minutos desde tu celular.\n\n_QP Clinic • Insurgentes Sur 933, CDMX_`;
  window.open(`https://wa.me/${celFmt}?text=${encodeURIComponent(msg)}`,"_blank");
  const st=document.getElementById("prereg-status");
  if(st)st.innerHTML=`<span style="background:#C8E6C9;color:#1B5E20;padding:3px 10px;border-radius:20px;font-weight:600">✓ Enlace enviado por WhatsApp</span>`;
  showToast("✓ Enlace de pre-registro enviado");
}
window.copiarPreregistro=async function(){
  const token=STATE.preregToken;
  const nom=gv("nn").trim();const ap=gv("na").trim();
  loading(true,"Buscando pre-registro...");
  let data;
  if(token){
    const r=await SB.from("pre_registros").select("*").eq("token",token).single();
    data=r.data;
  } else if(nom){
    const r=await SB.from("pre_registros").select("*").ilike("nombre_paciente",`%${nom}%`).eq("completado",true).order("created_at",{ascending:false}).limit(1);
    data=r.data?.[0];
  }
  loading(false);
  if(!data){showToast("No se encontró un pre-registro para este paciente",false);return;}
  if(!data.completado){
    const st=document.getElementById("prereg-status");
    if(st)st.innerHTML=`<span style="background:#FFF8E1;color:#E65100;padding:3px 10px;border-radius:20px;font-weight:600">⏳ El paciente aún no ha completado el formulario</span>`;
    showToast("El paciente aún no ha completado el pre-registro",false);return;
  }
  aplicarPreregistro(data);
}

window.addSintoma=function(key,txt){
  const ta=document.getElementById("inter_"+key);if(!ta)return;
  if(ta.value==="NORMAL"||ta.value==="Interrogado y negado")ta.value="";
  const sep=ta.value&&!ta.value.endsWith("\n")&&!ta.value.endsWith(", ")&&ta.value.length>0?", ":"";
  ta.value+=sep+txt;
  ta.focus();
}
window.setSintoma=function(key,txt){
  const ta=document.getElementById("inter_"+key);if(ta){ta.value=txt;ta.focus();}
}
window.guardarInterrogatorio=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  loading(true,"Guardando interrogatorio...");
  const campos=["digestivo","cardiovascular","respiratorio","urinario","genital","hematologico","endocrino","osteomuscular","nervioso"];
  const etiquetas={digestivo:"Ap. Digestivo",cardiovascular:"Ap. Cardiovascular",respiratorio:"Ap. Respiratorio",urinario:"Ap. Urinario",genital:"Ap. Genital",hematologico:"Ap. Hematológico",endocrino:"Sist. Endocrino",osteomuscular:"Sist. Osteomuscular",nervioso:"Sist. Nervioso"};
  const payload={paciente_id:pid};
  campos.forEach(c=>{const e=document.getElementById("inter_"+c);if(e)payload[c]=e.value;});
  await SB.from("interrogatorio_aparatos").upsert(payload,{onConflict:"paciente_id"});
  loading(false);
  showToast("✓ Interrogatorio guardado");
  // Mostrar resumen
  const hoy=new Date().toLocaleString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const resumen=campos.map(c=>{
    const val=payload[c]||"";
    if(!val)return null;
    const esNormal=val.trim().toUpperCase()==="NORMAL";
    const esNegado=val.trim().toLowerCase().includes("interrogado y negado");
    return{etiqueta:etiquetas[c],val,esNormal,esNegado};
  }).filter(Boolean);
  const previo=document.getElementById("inter-resumen");
  if(previo)previo.remove();
  const div=document.createElement("div");
  div.id="inter-resumen";
  div.style.cssText=`max-width:1100px;margin:0 auto 0;padding:0 14px`;
  div.innerHTML=`<div style="background:#fff;border:1.5px solid #B3E5FC;border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px #00000010">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <p style="font-size:14px;font-weight:700;color:${P}">📋 Resumen del Interrogatorio por Aparatos y Sistemas</p>
      <span style="font-size:14px;color:${MU};background:#F0F4F8;padding:3px 9px;border-radius:20px">Guardado: ${hoy}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${resumen.map(r=>`<div style="background:${r.esNormal?"#E8F5E9":r.esNegado?"#ECEFF1":"#FFF8E1"};border-radius:7px;padding:10px 12px">
        <p style="font-size:14px;font-weight:700;color:${r.esNormal?"#2E7D32":r.esNegado?"#546E7A":"#E65100"};margin-bottom:3px">${r.esNormal?"✓":r.esNegado?"—":"⚠️"} ${r.etiqueta}</p>
        <p style="font-size:14px;color:#263238;line-height:1.5">${r.esNormal?"Normal":r.esNegado?"Interrogado y negado":r.val.substring(0,120)+(r.val.length>120?"...":"")}</p>
      </div>`).join("")}
      ${resumen.length===0?`<p style="grid-column:span 3;text-align:center;color:${MU};font-size:14px">Sin datos capturados</p>`:""}
    </div>
  </div>`;
  const grid=document.getElementById("inter-grid");
  if(grid&&grid.parentNode)grid.parentNode.insertBefore(div,grid);
}

async function cargarConsultas(){
  const pid=STATE.pat?.id;if(!pid)return;
  const {data,error}=await SB.from("consultas").select("*").eq("paciente_id",pid).order("created_at",{ascending:false});
  const cl=document.getElementById("consultas-lista");if(!cl)return;
  if(error||!data||data.length===0){cl.innerHTML=`<div class="empty-state"><div class="empty-icon"><i class="ti ti-notes-medical" aria-hidden="true"></i></div><p>Sin consultas registradas</p><small>Crea la primera consulta con el botón de abajo</small><br><br>${btn("➕ Nueva consulta","go('consulta')","p",1)}</div>`;return;}
  // Cargar nombres de médicos que falten
  const uids=[...new Set(data.filter(c=>!c.medico_nombre&&c.medico_id).map(c=>c.medico_id))];
  const medMap={};
  if(uids.length>0){
    const {data:uData}=await SB.from("usuarios").select("id,titulo,nombre,apellidos,especialidad_1,especialidad_2").in("id",uids);
    (uData||[]).forEach(u=>{medMap[u.id]=`${u.titulo||"Dr."} ${u.nombre||""} ${u.apellidos||""}`.trim();});
  }
  // Verificar cierre automático 24h - ya manejado arriba
  const now2=new Date();
  for(const c of data){
    if(!c.bloqueada&&c.created_at){
      const hrs=(now2-new Date(c.created_at))/(1000*3600);
      if(hrs>24){
        await SB.from("consultas").update({bloqueada:true,firma_medico:"Cierre automático 24h",fecha_firma:new Date().toISOString()}).eq("id",c.id);
        c.bloqueada=true;c.firma_medico="Cierre automático 24h";
      }
    }
  }
  cl.innerHTML=`<table style="width:100%;border-collapse:collapse">
    <thead><tr style="background:${PL}">
      ${["Tipo de nota","Especialista","Fecha / Hora","Diagnóstico","Estado",""].map(h=>`<th style="padding:9px 10px;text-align:left;font-size:12px;font-weight:700;color:${TX};text-transform:uppercase">${h}</th>`).join("")}
    </tr></thead>
    <tbody>
      ${data.map((c,i)=>{
        const bloq=c.bloqueada;
        const medNom=c.medico_nombre||(c.medico_id&&medMap[c.medico_id])||"Médico no registrado";

window.abrirConsulta=async function(cid){
  loading(true,"Cargando consulta...");
  const {data}=await SB.from("consultas").select("*").eq("id",cid).single();
  loading(false);
  if(!data){showToast("Error",false);return;}
  STATE.consultaActual=data;
  if(!data.temperatura&&STATE.pat?.id){
    const hoy=new Date().toISOString().split("T")[0];
    const {data:sv}=await SB.from("signos_vitales").select("*").eq("paciente_id",STATE.pat.id).gte("fecha",hoy).order("fecha",{ascending:false}).limit(1);
    if(sv&&sv[0])STATE.consultaActual._svHoy=sv[0];
  }
  go("consulta");
}

window.seleccionarMedInter=function(val){

window.guardarInterconsulta=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const sel=document.getElementById("ic_med_sel")?.value;
  const medInter=sel==="__externo__"?(document.getElementById("ic_med")?.value||gv("ic_med")):gv("ic_med");
  if(!medInter){showToast("Selecciona o escribe el médico interconsultante",false);return;}
  loading(true,"Guardando interconsulta...");
  const {error}=await SB.from("interconsultas").insert({
    paciente_id:pid,
    medico_solicitante_id:STATE.user?.id||null,
    medico_interconsultante:medInter,
    especialidad:gv("ic_esp"),
    diagnostico:gv("ic_diag"),
    tratamiento:gv("ic_trat"),
    motivos:gv("ic_mot"),
    prioridad:gv("ic_pri"),
    estatus:"Pendiente de respuesta"
  });
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Interconsulta guardada");

  cargarInterconsultas();
}

window.enviarFirmaWAGlobal=async function(){
  const cel=document.getElementById("gfcel")?.value||"";
  const pid=STATE.pat?.id;
  if(!cel){showToast("Ingresa el celular del paciente",false);return;}
  const checks=document.querySelectorAll(".doc-check:checked");
  if(checks.length===0){showToast("Selecciona al menos un documento",false);return;}
  const docs=Array.from(checks).map(c=>c.dataset.doc);
  const codigo=Math.random().toString(36).substring(2,8).toUpperCase();
  // Guardar documentos pendientes con código de firma
  if(pid){
    await SB.from("anexos").insert(docs.map(d=>({
      paciente_id:pid,
      titulo:"PENDIENTE FIRMA: "+d.toUpperCase(),
      tipo_documento:"firma_pendiente_"+d,
      origen:"digital",
      firmado:false,
      codigo_firma:codigo,
      fecha:new Date().toISOString().split("T")[0],
    })));
  }
  const celLimpio=cel.replace(/\D/g,"");
  const celFinal=celLimpio.length===10?"52"+celLimpio:celLimpio;
  const nomPac=STATE.pat?`${STATE.pat.nombre} ${STATE.pat.apellido_paterno}`:"Paciente";
  const url=`https://www.qpclinic.org/firmar?pac=${pid}&docs=${docs.join(",")}&cod=${codigo}`;
  const msg=`🏥 *QP Clinic — Firma de Documentos Médicos*\n\nEstimado(a) ${nomPac}, le enviamos el enlace para leer y firmar sus documentos médicos desde su celular:\n\n🔗 ${url}\n\n*Código de seguridad: ${codigo}*\n\nSu información es tratada con absoluta confidencialidad.\n_QP Clinic — Especialistas en Salud Integral_`;
  window.open(`https://wa.me/${celFinal}?text=${encodeURIComponent(msg)}`,"_blank");
  showToast("✓ Abre WhatsApp en +52 5644237028 y envía el mensaje");
  document.getElementById("modal-firma-global")?.remove();
}

window.subirDocumento=async function(){
  const titulo=gv("doc-titulo");const tipo=gv("doc-tipo");
  const fi=document.getElementById("file-input");
  const pid=STATE.pat?.id;
  if(!titulo.trim()){showToast("Escribe un título para el documento",false);return;}
  if(!pid)return;
  loading(true,"Subiendo documento...");
  let storagePath=null;
  if(fi?.files[0]){
    const file=fi.files[0];
    const ext=file.name.split(".").pop();
    const path=`${pid}/${Date.now()}.${ext}`;
    const {data:up,error:ue}=await SB.storage.from("expedientes").upload(path,file,{cacheControl:"3600",upsert:false});
    if(!ue)storagePath=path;
  }
  const {error}=await SB.from("anexos").insert({paciente_id:pid,titulo:titulo.toUpperCase().trim(),tipo_documento:tipo,origen:"subido",firmado:false,storage_path:storagePath||null});
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Documento subido al expediente");
  ocultarFormSubida();
  renderDocsAnexos(document.getElementById("anexo-body"));
}
window.eliminarDocsSel=async function(){
  const checks=document.querySelectorAll("#docs-tbody input[type=checkbox]:checked");
  if(checks.length===0){showToast("Selecciona al menos un documento",false);return;}
  loading(true,"Eliminando...");
  const ids=Array.from(checks).map(c=>c.dataset.id);
  await SB.from("anexos").delete().in("id",ids);
  loading(false);showToast("✓ Documento(s) eliminado(s)");
  renderDocsAnexos(document.getElementById("anexo-body"));
}
window.verPDF=async function(docId){
  loading(true,"Obteniendo documento...");
  const {data}=await SB.from("anexos").select("*").eq("id",docId).single();
  loading(false);
  if(data?.storage_path){
    const {data:urlData}=await SB.storage.from("expedientes").createSignedUrl(data.storage_path,3600);
    if(urlData?.signedUrl){
      window.open(urlData.signedUrl,"_blank");
    } else {
      showToast("Error al obtener el documento",false);
    }
  } else {
    showToast("Este documento no tiene archivo PDF adjunto aún",false);
  }
}
window.descargarDoc=function(docId){verPDF(docId);}

let _recognition=null;let _grabando=false;let _transcripcion="";let _timerGrab=null;let _segundos=0;
window.sugerirDxIA=async function(){
  const gf=(id)=>{const e=document.getElementById(id);return e?e.value.trim():"";};
  const subj=gf("cs_subj"),expl=gf("cs_expl"),analActual=gf("cs_anal"),
        trat=gf("cs_trat"),plan=gf("cs_plan"),lab=gf("cs_lab"),gab=gf("cs_gab");
  if(!subj&&!expl&&!analActual&&!trat&&!plan&&!lab&&!gab){
    showToast("Escribe al menos el motivo de consulta o la exploración antes de sugerir diagnósticos",false);return;
  }
  const dxDiv=document.getElementById("diagnosticos-ia");
  if(dxDiv){
    dxDiv.style.display="block";
    dxDiv.innerHTML=`<div style="display:flex;align-items:center;gap:8px;color:#7B1FA2;font-size:13px"><span class="spin">⚙️</span> Analizando y generando diagnósticos CIE-10...</div>`;
  }
  const nota=[
    subj&&`MOTIVO DE CONSULTA:\n${subj}`,
    expl&&`EXPLORACIÓN FÍSICA:\n${expl}`,
    analActual&&`ANÁLISIS PREVIO:\n${analActual}`,
    trat&&`TRATAMIENTO:\n${trat}`,
    plan&&`PLAN:\n${plan}`,
    lab&&`LABORATORIO:\n${lab}`,
    gab&&`GABINETE:\n${gab}`,
  ].filter(Boolean).join("\n\n");
  const p=STATE.pat||{};
  const paciente=`${p.nombre||""} ${p.apellido_paterno||""}, Edad: ${calcEdad(p.fecha_nacimiento)}, Sexo: ${p.sexo_biologico||"NS"}`;
  try{
    const res=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo:"diagnosticos",nota,paciente})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const dx=data.diagnosticos||[];
    if(!dxDiv)return;
    if(dx.length===0){
      dxDiv.innerHTML=`<p style="font-size:13px;color:#7B1FA2;padding:4px">Sin diagnósticos sugeridos. Agrega más contenido a la nota.</p>`;
      return;
    }
    const CERT_COLOR={"Principal":"#1B5E20","Secundario":"#E65100","Diferencial":"#1565C0"};
    dxDiv.innerHTML=`
      <p style="font-size:12px;font-weight:700;color:#7B1FA2;margin-bottom:8px;text-transform:uppercase">Diagnósticos sugeridos — haz clic para agregar</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">
        ${dx.map(d=>`<button onclick="agregarDxAlAnalisis('${(d.codigo||"").replace(/'/g,"\\'")} – ${(d.nombre||"").replace(/'/g,"\\'")}',this)"
          style="background:#fff;border:1.5px solid #CE93D8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;text-align:left;transition:all .15s">
          <b style="color:#6A1B9A">${d.codigo||""}</b> <span style="color:#263238">– ${d.nombre||""}</span>
          <span style="font-size:11px;background:${CERT_COLOR[d.certeza]||"#546E7A"}20;color:${CERT_COLOR[d.certeza]||"#546E7A"};padding:1px 6px;border-radius:10px;margin-left:4px;font-weight:600">${d.certeza||""}</span>
        </button>`).join("")}
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="agregarTodosLosDx()" style="background:#7B1FA2;color:#fff;border:none;border-radius:7px;padding:5px 14px;cursor:pointer;font-size:13px;font-weight:600">✓ Agregar todos</button>
        <button onclick="document.getElementById('diagnosticos-ia').style.display='none'" style="background:none;border:1px solid #CE93D8;color:#7B1FA2;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:13px">✕ Cerrar</button>
      </div>`;
  }catch(e){
    if(dxDiv)dxDiv.innerHTML=`<p style="font-size:13px;color:${DA};padding:4px">Error: ${e.message}</p>`;
  }
}
window.agregarDxAlAnalisis=function(texto,btn){
  const ta=document.getElementById("cs_anal");

  ta.value=(ta.value.trim()?ta.value.trim()+"\n":"")+texto;
  if(btn){btn.style.background="#E1BEE7";btn.style.borderColor="#7B1FA2";}
  showToast("✓ "+texto.split("–")[0].trim()+" agregado");
}
window.agregarTodosLosDx=function(){
  document.querySelectorAll("#diagnosticos-ia button[onclick^='agregarDxAlAnalisis']").forEach(b=>b.click());

window.toggleGrabacion=function(){
  if(_grabando){
    // Detener grabación
    _grabando=false;
    if(_recognition){try{_recognition.stop();}catch(e){}}
    clearInterval(_timerGrab);
    document.getElementById("btn-grabar").style.background="#C62828";
    document.getElementById("txt-grabar").textContent="Iniciar grabación";
    document.getElementById("ic-grabar").textContent="🎤";
    document.getElementById("ondas").style.display="none";
    document.getElementById("tiempo-grab").style.display="none";
  } else {
    // Iniciar grabación
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("Tu navegador no soporta reconocimiento de voz. Usa Chrome.",false);return;}
    _recognition=new SR();
    _recognition.continuous=true;
    _recognition.interimResults=true;
    _recognition.lang="es-MX";
    _recognition.onresult=function(e){
      let final="";let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      _transcripcion+=final;
      const live=document.getElementById("transcripcion-live");
      if(live)live.innerHTML=(_transcripcion+"<span style='color:#90A4AE;'>"+interim+"</span>")||"Escuchando...";
    };
    _recognition.onerror=function(e){showToast("Error de micrófono: "+e.error,false);_grabando=false;};
    _recognition.start();
    _grabando=true;
    _segundos=0;
    document.getElementById("btn-grabar").style.background="#2E7D32";
    document.getElementById("txt-grabar").textContent="Detener grabación";
    document.getElementById("ic-grabar").textContent="⏹";
    document.getElementById("ondas").style.display="flex";
    document.getElementById("tiempo-grab").style.display="inline";
    _timerGrab=setInterval(()=>{
      _segundos++;
      const m=Math.floor(_segundos/60).toString().padStart(2,"0");
      const s=(_segundos%60).toString().padStart(2,"0");
      const t=document.getElementById("tiempo-grab");
      if(t)t.textContent=m+":"+s;
    },1000);
  }
}

window.generarNotaIA=async function(){

  if(!texto||texto.includes("Haz clic en")){
    showToast("Graba o escribe el interrogatorio primero",false);return;
  }
  const btn=document.getElementById("btn-generar-ia");
  if(btn){btn.disabled=true;btn.textContent="⚙️ Generando nota con IA...";}
  const p=STATE.pat||{};
  const pacData=`Nombre: ${p.nombre||""} ${p.apellido_paterno||""}\nEdad: ${calcEdad(p.fecha_nacimiento)}\nSexo: ${p.sexo_biologico||"No especificado"}`;
  const antData=`Alergias: ${STATE.alergs.join(", ")||"Sin alergias conocidas"}\nPatológicos: ${Object.keys(STATE.patData||{}).filter(k=>STATE.patData[k]).join(", ")||"No especificados"}`;
  try{
    const res=await fetch("/api/ia-medica",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({transcripcion:texto,paciente:pacData,antecedentes:antData})
    });
    const data=await res.json();
    if(data.error){
      const rawInfo=data.raw?`\n\nRespuesta IA (primeros 300 chars):\n${data.raw.substring(0,300)}`:"";
      throw new Error(data.error+rawInfo);
    }
    // Llenar campos IA
    const set=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    const setSel=(id,val)=>{const e=document.getElementById(id);if(e&&val){const opts=Array.from(e.options).map(o=>o.value.toLowerCase());const match=opts.findIndex(o=>o.includes((val||"").toLowerCase().split(" ")[0]));if(match>0)e.selectedIndex=match;else e.value=val;}};
    set("ia_subj",data.subjetivo);
    set("ia_expl",data.exploracion_sugerida);
    set("ia_trat",data.tratamiento);
    set("ia_lab",data.laboratorios);
    set("ia_gab",data.gabinete);
    set("ia_plan",data.plan);
    setSel("ia_prog_func",data.pronostico_funcion);
    setSel("ia_prog_vida",data.pronostico_vida);
    // Diagnósticos
    const dl=document.getElementById("ia_diagnosticos_lista");
    if(dl&&data.diagnosticos){
      dl.innerHTML=data.diagnosticos.map((d,i)=>`
        <label style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #C8E6C9;cursor:pointer">
          <input type="checkbox" checked data-diag="${d.cie10}: ${d.nombre}" style="accent-color:#2E7D32;width:16px;height:16px;flex-shrink:0;margin-top:2px">
          <div>
            <p style="font-size:14px;font-weight:700;color:#1B5E20">${d.cie10} — ${d.nombre}</p>
            <p style="font-size:14px;color:#546E7A;line-height:1.5">${d.descripcion||""}</p>
            <span style="background:${d.probabilidad==="alta"?"#C8E6C9":d.probabilidad==="media"?"#FFF3E0":"#ECEFF1"};color:${d.probabilidad==="alta"?"#1B5E20":d.probabilidad==="media"?"#E65100":"#546E7A"};padding:1px 7px;border-radius:20px;font-size:14px;font-weight:700">Probabilidad: ${d.probabilidad}</span>
          </div>
        </label>`).join("");
    }
    document.getElementById("ia-resultados").style.display="block";
    document.getElementById("ia-resultados").scrollIntoView({behavior:"smooth"});
    showToast("✓ Nota médica generada con IA");
  }catch(err){
    showToast("Error al generar: "+err.message+". Verifica que ANTHROPIC_API_KEY esté configurada en Vercel.",false);
  }finally{
    if(btn){btn.disabled=false;btn.textContent="✨ Paso 2: Generar Nota Médica Completa";}
  }
}

window.generarPDFReceta=async function(tipo="receta"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
  const p=STATE.pat||{};
  const med=STATE.medProfile||STATE.userProfile||{};
  const contenido=document.getElementById("recipe-content")?.value||"";
  const nomPac=`${p.nombre||""} ${p.apellido_paterno||""} ${p.apellido_materno||""}`.trim().toUpperCase();
  const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
  const medNom=`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim().toUpperCase();
  const W=216, M=15; // W=ancho carta, M=margen
  // ── Función imagen con proporción ──
  async function addImg(url,x,y,maxH,maxW){
    try{
      const res=await fetch(url);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      doc.addImage(b64,url.toLowerCase().includes("png")?"PNG":"JPEG",x,y,w,h);
      return{w,h};
    }catch(e){return{w:0,h:0};}
  }
  // ── CALCULAR LÍNEAS del médico ──
  const shortInst=s=>s?s.split(" — ")[0].split(" · ")[0].trim():"";
  const credLines=[];
  credLines.push({txt:medNom,bold:true,sz:9});
  if(med.licenciatura||med.institucion_grado)
    credLines.push({txt:[med.licenciatura,shortInst(med.institucion_grado)].filter(Boolean).join("   ").toUpperCase(),bold:false,sz:8});
  if(med.cedula_medico)
    credLines.push({txt:`Céd. Prof. ${med.cedula_medico}`,bold:false,sz:8});
  if(med.especialidad_1||med.institucion_esp_1)
    credLines.push({txt:`Especialidad en ${[med.especialidad_1,shortInst(med.institucion_esp_1)].filter(Boolean).join("   ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_esp_1)
    credLines.push({txt:`Céd. Esp. ${med.cedula_esp_1}`,bold:false,sz:8});
  if(med.subespecialidad||med.institucion_esp_2)
    credLines.push({txt:`Subespecialidad en ${[med.subespecialidad,shortInst(med.institucion_esp_2)].filter(Boolean).join("   ")}`.toUpperCase(),bold:false,sz:8});
  if(med.cedula_subesp)
    credLines.push({txt:`Céd. Subesp. ${med.cedula_subesp}`,bold:false,sz:8});
  if(med.alta_especialidad)
    credLines.push({txt:`Alta Especialidad en ${med.alta_especialidad}${med.institucion_alta?"   "+shortInst(med.institucion_alta):""}`.toUpperCase(),bold:false,sz:8});
  const headerH=Math.max(18, credLines.length*4.5+4);
  const lineY=headerH+4;
  // ── LOGO izquierda ──
  await addImg(
    "https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg",
    M, 7, headerH-2, 35
  );
  // ── DATOS MÉDICO derecha ──
  let ry=12;
  for(const cl of credLines){
    doc.setFontSize(cl.sz);
    doc.setFont("helvetica",cl.bold?"bold":"normal");
    doc.setTextColor(cl.bold?38:70,cl.bold?50:70,cl.bold?56:70);
    // Truncar si es muy largo
    let txt=cl.txt;
    while(doc.getTextWidth(txt)>90&&txt.length>5)txt=txt.slice(0,-2);
    doc.text(txt,W-M,ry,{align:"right"});
    ry+=cl.sz===9?4.8:4;
  }
  // ── LÍNEA SEPARADORA ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.6);
  doc.line(M,lineY,W-M,lineY);
  // ── DATOS PACIENTE ──
  const py=lineY+6;
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  doc.setFont("helvetica","bold");doc.text("NOMBRE DEL PACIENTE:",M,py);
  doc.setFont("helvetica","normal");doc.text(nomPac,M+45,py);
  doc.setFont("helvetica","bold");doc.text("FECHA:",W-M-27,py);
  doc.setFont("helvetica","normal");doc.text(hoy,W-M,py,{align:"right"});
  const py2=py+5;
  doc.setFont("helvetica","bold");doc.text("Edad:",M,py2);
  doc.setFont("helvetica","normal");doc.text(calcEdad(p.fecha_nacimiento)||"",M+12,py2);
  doc.setFont("helvetica","bold");doc.text("Fecha de nacimiento:",M+46,py2);
  doc.setFont("helvetica","normal");doc.text(p.fecha_nacimiento||"",M+88,py2);
  // ── LÍNEA ──
  const l2y=py2+4;
  doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
  doc.line(M,l2y,W-M,l2y);
  // ── LEYENDA ALERGIA ──
  let contentY=l2y+7;
  if(tipo==="receta"){
    doc.setFontSize(7);doc.setFont("helvetica","italic");doc.setTextColor(90,90,90);
    doc.text("TOMAR O APLICAR SOLO SI NO ES ALÉRGICO / TAKE OR APPLY ONLY IF PATIENT IS NOT ALLERGIC",W/2,l2y+5,{align:"center"});
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);
    doc.line(M,l2y+7,W-M,l2y+7);
    contentY=l2y+13;
  }
  // ── TÍTULO ──
  const titulos={receta:"TRATAMIENTO",lab:"SOLICITUD DE LABORATORIO",gab:"SOLICITUD DE ESTUDIOS DE GABINETE"};
  doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text(titulos[tipo],M,contentY);
  doc.setLineWidth(0.4);doc.setDrawColor(38,50,56);
  doc.line(M,contentY+1,M+doc.getTextWidth(titulos[tipo]),contentY+1);
  contentY+=7;
  // ── CONTENIDO ──
  const maxContentY=135; // media carta
  doc.setFontSize(8.5);doc.setTextColor(38,50,56);
  for(const rawLine of contenido.split("\n")){
    if(contentY>maxContentY){doc.addPage();contentY=20;}
    if(!rawLine.trim()){contentY+=2;continue;}
    const isNum=rawLine.match(/^\d+[.\-]/);
    doc.setFont("helvetica",isNum?"bold":"normal");
    const wrapped=doc.splitTextToSize(rawLine,W-M*2);
    for(const wl of wrapped){
      if(contentY>maxContentY){doc.addPage();contentY=20;}
      doc.text(wl,M,contentY);
      contentY+=4.5;
    }
  }
  // ── FIRMA CENTRADA ──
  const firmaLineY=148;
  const firmaLineX1=W/2-38;
  const firmaLineX2=W/2+38;
  if(med.firma_digital){
    // Calcular proporciones sin dibujar
    try{
      const res=await fetch(med.firma_digital);const blob=await res.blob();
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
      const img=await new Promise((rs,rj)=>{const i=new Image();i.onload=()=>rs(i);i.onerror=rj;i.src=b64;});
      const maxH=18,maxW=55;
      const ratio=img.width/img.height;
      let h=maxH,w=h*ratio;
      if(w>maxW){w=maxW;h=w/ratio;}
      const fx=W/2-w/2;
      const fy=firmaLineY-h-2;
      doc.addImage(b64,med.firma_digital.toLowerCase().includes("png")?"PNG":"JPEG",fx,fy,w,h);
    }catch(e){}
  }
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(firmaLineX1,firmaLineY,firmaLineX2,firmaLineY);
  doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
  doc.text("FIRMA DEL MÉDICO",W/2,firmaLineY+5,{align:"center"});
  // ── FOOTER ──
  doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
  doc.line(M,158,W-M,158);
  doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
  doc.text(medNom,W/2,163,{align:"center"});
  doc.text(med.direccion_clinica||"Insurgentes Sur 933, Nápoles, Benito Juárez, Ciudad de México C.P. 03810",W/2,167,{align:"center"});
  doc.text("Teléfono: 55 5682 4345 / 56 4423 7028  Celular: 55 8767 3104",W/2,171,{align:"center"});
  doc.text(med.email||"dr.polanco@qpclinic.mx",W/2,175,{align:"center"});
  const nombre=tipo==="receta"?"Receta":tipo==="lab"?"Solicitud_Lab":"Solicitud_Gabinete";
  doc.save(`${nombre}_${nomPac.replace(/ /g,"_")}_${hoy.replace(/\//g,"-")}.pdf`);
  showToast("✓ PDF generado");
}

function calcEdad(fnac){
  if(!fnac)return"—";
  const hoy=new Date(),nac=new Date(fnac);
  let años=hoy.getFullYear()-nac.getFullYear();
  let meses=hoy.getMonth()-nac.getMonth();
  if(meses<0){años--;meses+=12;}
  if(hoy.getDate()<nac.getDate())meses--;
  if(meses<0){años--;meses+=12;}
  return años>0?`${años}a ${meses}m`:`${meses} meses`;
}

window.previewImagen=function(input){
  const file=input.files[0];
  const preview=document.getElementById("img-preview");
  const imgEl=document.getElementById("img-preview-src");
  const pdfEl=document.getElementById("img-preview-pdf");
  const pdfName=document.getElementById("img-preview-pdf-name");
  if(!file||!preview)return;
  preview.style.display="block";
  if(file.type==="application/pdf"){
    imgEl.style.display="none";
    pdfEl.style.display="block";
    if(pdfName)pdfName.textContent=file.name;
  } else {
    pdfEl.style.display="none";
    imgEl.style.display="block";
    const reader=new FileReader();
    reader.onload=e=>{if(imgEl)imgEl.src=e.target.result;};
    reader.readAsDataURL(file);
  }
  // Auto-sugerir nombre si está vacío
  const nomInput=document.getElementById("img_nom");
  if(nomInput&&!nomInput.value){
    nomInput.value=file.name.replace(/\.[^/.]+$/,"").replace(/[_-]/g," ");
  }
}

window.calcIMC=function(){
  const p=parseFloat(document.getElementById("sv_peso")?.value||0);
  const t=parseFloat(document.getElementById("sv_talla")?.value||0);
  const imc=document.getElementById("sv_imc");
  if(p>0&&t>0&&imc)imc.value=(p/(t*t)).toFixed(1);
}
window.guardarSV=async function(pid){
  loading(true,"Guardando signos vitales...");
  const p=parseFloat(gv("sv_peso"))||null;const t=parseFloat(gv("sv_talla"))||null;
  const imc=p&&t?parseFloat((p/(t*t)).toFixed(1)):null;
  const payload={
    paciente_id:pid,
    usuario_id:STATE.user?.id||null,
    usuario_nombre:gv("sv_enf"),
    fecha:new Date().toISOString(),
    temperatura:parseFloat(gv("sv_temp"))||null,
    frecuencia_cardiaca:parseInt(gv("sv_fc"))||null,
    frecuencia_respiratoria:parseInt(gv("sv_fr"))||null,
    saturacion_o2:parseFloat(gv("sv_sat"))||null,
    presion_sistolica:parseInt(gv("sv_tas"))||null,
    presion_diastolica:parseInt(gv("sv_tad"))||null,
    glucosa:parseFloat(gv("sv_glu"))||null,
    peso:p,talla:t,imc,
    perimetro_abdominal:parseFloat(gv("sv_pab"))||null,
    observaciones:gv("sv_obs"),
  };
  const {error}=await SB.from("signos_vitales").insert(payload);
  loading(false);
  if(error){showToast("Error: "+error.message,false);return;}
  showToast("✓ Signos vitales guardados");
  setET("triage");
}

    ${notas.length>0?`<div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px #00000012;overflow:hidden">
      <div style="background:#F8F9FA;padding:8px 14px;border-bottom:1px solid ${BR}"><b style="font-size:14px;color:${TX}">Historial de notas (${notas.length})</b></div>
      ${notas.map(n=>`<div style="padding:12px 14px;border-bottom:1px solid ${BR}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div>
            <span style="font-size:14px;font-weight:700;color:${P}">${n.fisioterapeuta||"Fisioterapeuta"}</span>
            ${n.num_sesion?`<span style="background:${PL};color:${P};padding:1px 7px;border-radius:20px;font-size:14px;margin-left:8px">Sesión ${n.num_sesion}</span>`:""}
          </div>
          <span style="font-size:14px;color:${MU}">${n.created_at?new Date(n.created_at).toLocaleDateString("es-MX"):""}</span>
        </div>
        <p style="font-size:14px;color:${TX};line-height:1.6">${n.nota||""}</p>
      </div>`).join("")}
    </div>`:""}
  </div>`;
}
function renderFisioForm(presc,pid){

      <div style="background:${PL};border-radius:8px;padding:10px 12px;margin-bottom:14px">
        <b style="font-size:14px;color:${P};text-transform:uppercase">2. Evaluación funcional</b>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">

      </div>
      <div style="margin-bottom:10px">${fld("Síntomas y signos clínicos principales",ta("ft_sint",p.sintomas||"","Describa síntomas, signos relevantes, hallazgos en la exploración física...",3))}</div>
      <div style="margin-bottom:10px">${fld("Objetivo del tratamiento",ta("ft_obj",p.objetivo||"","Ej: Reducir dolor, recuperar rango de movimiento, reintegro deportivo...",2))}</div>
      <div style="margin-bottom:14px">
        <p style="font-size:14px;font-weight:700;color:${TX};margin-bottom:8px">Limitación funcional</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${chkGroup(limitaciones,"lim",sel.lim||sel.limitaciones||{})}</div>

        <b style="font-size:14px;color:${P};text-transform:uppercase">3. Plan de tratamiento <span style="font-weight:400;font-size:14px;color:${MU}">(marcar lo indicado)</span></b>
      </div>
      <div style="margin-bottom:12px">
        <p style="font-size:14px;font-weight:700;color:${MU};margin-bottom:6px">⚡ Agentes físicos / Electroterapia</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${chkGroup(agentes,"ag",sel.ag||sel.agentes||{})}</div>
      </div>
      <div style="margin-bottom:12px">
        <p style="font-size:14px;font-weight:700;color:${MU};margin-bottom:6px">🙌 Terapia manual</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${chkGroup(manual,"man",sel.man||sel.manual||{})}</div>
      </div>
      <div style="margin-bottom:12px">
        <p style="font-size:14px;font-weight:700;color:${MU};margin-bottom:6px">🏋️ Ejercicio terapéutico</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${chkGroup(ejercicio,"ej",sel.ej||sel.ejercicio||{})}</div>
      </div>
      <div style="margin-bottom:14px">
        <p style="font-size:14px;font-weight:700;color:${MU};margin-bottom:6px">🧠 Terapia neurológica / ocupacional / pediátrica</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${chkGroup(neuro,"neu",sel.neu||sel.neuro||{})}</div>
      </div>
      <div style="margin-bottom:14px">${fld("Parámetros específicos / Medio físico",ta("ft_params",p.parametros||"","Especifique parámetros, intensidades, tiempos, técnicas adicionales...",3))}</div>
      <div style="margin-bottom:14px">${fld("Plan de ejercicios en casa (HEP)",ta("ft_hep",p.hep||"","Home Exercise Program — ejercicios que el paciente debe realizar en casa...",3))}</div>
      <div style="background:${PL};border-radius:8px;padding:10px 12px;margin-bottom:14px">
        <b style="font-size:14px;color:${P};text-transform:uppercase">4. Dosificación</b>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
        ${fld("Número de sesiones",`<input id="ft_nses" type="number" value="${p.num_sesiones||""}" placeholder="Ej: 12" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none">`)}
        ${fld("Frecuencia semanal",`<select id="ft_freq" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none;background:#fff">${["No especificada","1 vez/semana","2 veces/semana","3 veces/semana","4 veces/semana","5 veces/semana","Diario"].map(v=>`<option ${(p.frecuencia||"No especificada")===v?"selected":""}>${v}</option>`).join("")}</select>`)}
        ${fld("Fecha de inicio",`<input id="ft_finicio" type="date" value="${p.fecha_inicio||hoy}" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none">`)}
        ${fld("Fecha estimada de alta",`<input id="ft_falta" type="date" value="${p.fecha_alta||""}" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none">`)}

      <div style="background:${PL};border-radius:8px;padding:10px 12px;margin-bottom:14px">
        <b style="font-size:14px;color:${P};text-transform:uppercase">5. Control de sesiones</b>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${Array.from({length:20},(_,i)=>{const ses=p.sesiones_completadas||[];const done=ses.includes(i+1);return`<div onclick="toggleSesion(${i+1})" style="width:44px;height:44px;border-radius:8px;border:1.5px solid ${done?"#1565C0":BR};background:${done?PL:"#fff"};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column">
          <span style="font-size:14px;font-weight:700;color:${done?P:MU}">${i+1}</span>
          ${done?`<span style="font-size:8px;color:${P}">✓</span>`:`<span style="font-size:7px;color:${BR}">—</span>`}
        </div>`;}).join("")}
      </div>
      <div style="background:${PL};border-radius:8px;padding:10px 12px;margin-bottom:14px">
        <b style="font-size:14px;color:${P};text-transform:uppercase">6. Evolución y reevaluación</b>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        ${fld("Fecha de reevaluación",`<input id="ft_reev" type="date" value="${p.fecha_reeval||""}" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none">`)}
        ${fld("EVA al alta / reevaluación",`<input id="ft_eva_alta" type="number" min="0" max="10" value="${p.eva_alta||""}" placeholder="0-10" style="width:100%;padding:10px 13px;border:1.5px solid ${BR};border-radius:8px;outline:none">`)}
      </div>
      <div style="margin-bottom:16px">${fld("Notas de evolución / reevaluación",ta("ft_evol_nota",p.evolucion||"","Observaciones de la evolución del paciente, cambios en el plan, alta...",3))}</div>

        ${btn("💊 Ver como PDF","generarPDFFisio()","s",1)}

}
function renderFisioVer(presc,pid){
  if(!presc)return`<p style="text-align:center;padding:24px;color:${MU}">Prescripción no encontrada</p>`;
  // Restaurar sesiones completadas al cargar
  if(!STATE.fisioSesiones||STATE.fisioSesiones.length===0){
    STATE.fisioSesiones=presc.sesiones_completadas||[];
  }
  return renderFisioForm(presc,pid);
}
window.toggleDxMenu=async function(){
  const menu=document.getElementById("dx-menu");
  if(!menu)return;
  if(menu.style.display==="none"){
    menu.style.display="block";
    // Cargar consultas con diagnóstico
    const pid=STATE.pat?.id;if(!pid)return;
    const lista=document.getElementById("dx-menu-lista");
    const {data}=await SB.from("consultas").select("id,analisis,fecha,created_at,medico_nombre").eq("paciente_id",pid).not("analisis","is",null).order("created_at",{ascending:false});
    if(!data||data.length===0){
      lista.innerHTML=`<p style="padding:12px;font-size:14px;color:${MU}">No hay consultas con diagnóstico registrado</p>`;
      return;
    }
    lista.innerHTML=data.filter(c=>c.analisis?.trim()).map(c=>`
      <div onclick="copiarDiagnostico('${c.id}')" style="padding:10px 14px;border-bottom:1px solid ${BR};cursor:pointer;transition:background .15s" onmouseover="this.style.background='${PL}'" onmouseout="this.style.background='#fff'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:14px;font-weight:700;color:${P}">${c.medico_nombre||"Médico"}</span>
          <span style="font-size:14px;color:${MU}">${c.fecha||c.created_at?.split("T")[0]||""}</span>
        </div>
        <p style="font-size:14px;color:#263238;line-height:1.5">${c.analisis?.substring(0,150)||""}${c.analisis?.length>150?"...":""}</p>
      </div>`).join("");
    // Cerrar al hacer clic fuera
    setTimeout(()=>document.addEventListener("click",cerrarDxMenu,{once:true}),100);
  } else {
    menu.style.display="none";
  }
}
function cerrarDxMenu(e){
  const menu=document.getElementById("dx-menu");
  if(menu&&!menu.contains(e.target))menu.style.display="none";
}
window.copiarDiagnostico=async function(cid){
  const {data}=await SB.from("consultas").select("analisis").eq("id",cid).single();
  if(!data?.analisis)return;
  const ta=document.getElementById("ft_dx");
  if(ta){ta.value=data.analisis;ta.focus();}
  document.getElementById("dx-menu").style.display="none";
  showToast("✓ Diagnóstico copiado");
}
window.toggleSesion=function(n){
  if(!STATE.fisioSesiones)STATE.fisioSesiones=[];
  const idx=STATE.fisioSesiones.indexOf(n);
  if(idx>=0)STATE.fisioSesiones.splice(idx,1);else STATE.fisioSesiones.push(n);
  // Re-render solo los boxes
  const boxes=document.querySelectorAll("[data-sesion]");
  // update visuals
  setET("fisio");
}
window.guardarFisio=async function(pid,editId=""){
  loading(true,"Guardando prescripción...");
  // Recoger checkboxes
  const grupos=["ag","man","ej","neu","lim"];
  const keys={ag:["tens","ultrasonido","laser","radiofrecuencia","compresion","crioterapia","termoterapia"],man:["masoterapia","movilizacion","manipulacion","miofascial","puncion","vendaje","drenaje"],ej:["estiramiento","fortalecimiento","propiocepcion","postural","cadena","aerobico","pliometria","readaptacion","pilates"],neu:["marcha","sensoriomotriz","avd","cognitiva"],lim:["marcha","laboral","deportiva","avd_bas","avd_ins"]};
  const trat={};
  grupos.forEach(g=>{trat[g]={};(keys[g]||[]).forEach(k=>{const e=document.getElementById(`ft_${g}_${k}`);if(e)trat[g][k]=e.checked;});});
  const lat=document.querySelector("input[name='ft_lat']:checked")?.value||"N/A";
  const d=(v)=>v&&v.trim()?v:null; // fecha o null
  const payload={
    paciente_id:pid,
    fecha:d(gv("ft_fecha")),medico:gv("ft_med"),fisioterapeuta:gv("ft_fisio"),
    diagnostico:gv("ft_dx"),region:gv("ft_region"),lateralidad:lat,
    eva:parseInt(document.getElementById("ft_eva")?.value||0),
    tiempo_evolucion:gv("ft_evol"),sintomas:gv("ft_sint"),
    objetivo:gv("ft_obj"),parametros:gv("ft_params"),hep:gv("ft_hep"),
    tratamiento:trat,
    num_sesiones:parseInt(gv("ft_nses"))||null,
    frecuencia:gv("ft_freq"),
    fecha_inicio:d(gv("ft_finicio")),fecha_alta:d(gv("ft_falta")),
    contraindicaciones:gv("ft_contra"),
    sesiones_completadas:STATE.fisioSesiones||[],
    fecha_reeval:d(gv("ft_reev")),
    eva_alta:gv("ft_eva_alta")?parseInt(gv("ft_eva_alta")):null,
    evolucion:gv("ft_evol_nota"),
  };
  let res;
  if(editId){
    res=await SB.from("fisioterapia_prescripciones").update(payload).eq("id",editId).select().single();
  } else {
    res=await SB.from("fisioterapia_prescripciones").insert(payload).select().single();
  }
  loading(false);
  if(res.error){showToast("Error: "+res.error.message,false);return;}
  STATE.fisioTab="p"+res.data.id;
  STATE.fisioSesiones=res.data.sesiones_completadas||[];
  showToast("✓ Prescripción guardada");
  setET("fisio");
}
window.guardarNotaFisio=async function(){
  const pid=STATE.pat?.id;if(!pid)return;
  const nota=gv("fn_nota");if(!nota.trim()){showToast("Escribe la nota antes de guardar",false);return;}
  loading(true,"Guardando nota...");
  await SB.from("fisioterapia_notas").insert({
    paciente_id:pid,
    fisioterapeuta:gv("fn_ft"),
    num_sesion:parseInt(gv("fn_ses"))||null,
    nota,
  });
  loading(false);
  showToast("✓ Nota guardada");
  STATE.fisioTab="notas";
  setET("fisio");
}
window.editarFisio=async function(id){
  const {data}=await SB.from("fisioterapia_prescripciones").select("*").eq("id",id).single();
  if(!data)return;
  STATE.fisioSesiones=data.sesiones_completadas||[];
  // La renderFisioVer ya muestra el form con los datos
  renderFisio(document.getElementById("eb"));
}
window.generarPDFFisio=function(){showToast("PDF de fisioterapia — próximamente",false);}

;(async function init(){
  try{
    const {data:{session}}=await SB.auth.getSession();
    if(session){
      STATE.user=session.user;
      const {data:prof}=await SB.from("usuarios").select("*").eq("id",session.user.id).single();
      STATE.userProfile=prof;STATE.medProfile=prof;
      go("agenda");
    } else {
      go("login");
    }
  }catch(e){
    console.warn("Session error:",e.message);
    try{await SB.auth.signOut();}catch(e2){}
    go("login");
  }
  SB.auth.onAuthStateChange((event,session)=>{
    if(event==="SIGNED_OUT"){STATE.user=null;STATE.userProfile=null;go("login");}
  });
})();

</script>
