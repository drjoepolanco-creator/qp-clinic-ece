*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F0F4F8;color:#263238;font-size:14px}
.card{background:#fff;border-radius:14px;padding:20px;margin:12px;box-shadow:0 2px 8px #00000015}
.btn-primary{width:100%;padding:14px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-success{width:100%;padding:14px;background:#2E7D32;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-outline{width:100%;padding:12px;background:#fff;color:#1565C0;border:2px solid #1565C0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-danger{width:100%;padding:10px;background:#fff;color:#C62828;border:1.5px solid #C62828;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
input[type=text],input[type=tel]{width:100%;padding:12px 14px;border:2px solid #CFD8DC;border-radius:10px;font-size:15px;outline:none;font-family:inherit}
input:focus{border-color:#1565C0}
.doc-body{font-size:13px;line-height:1.9;color:#263238;max-height:45vh;overflow-y:auto;border:1px solid #CFD8DC;border-radius:8px;padding:14px;background:#FAFAFA;margin:12px 0}
.step-indicator{display:flex;justify-content:center;gap:6px;margin:12px 0}
.step-dot{width:8px;height:8px;border-radius:50%;background:#CFD8DC}
.step-dot.active{background:#1565C0;width:24px;border-radius:4px}
.step-dot.done{background:#2E7D32}
#canvas-firma{border:2px solid #CFD8DC;border-radius:10px;touch-action:none;background:#fff;width:100%;cursor:crosshair}
.spin{display:inline-block;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.fade{animation:fd .3s ease}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
</style>

function toast(msg,ok=true){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${ok?"#2E7D32":"#C62828"};color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 12px #00000030`;
  t.textContent=msg;t.style.display="block";clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",3000);
}

function getDocTexto(tipo,pac,med){
  const nom=pac?`${pac.nombre} ${pac.apellido_paterno} ${pac.apellido_materno||""}`.trim():"_______________";
  const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"});
  const medNom=med?`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim():"el médico tratante";
  const medCred=med?`${med.especialidad_1||""}${med.cedula_medico?", Céd. Prof. "+med.cedula_medico:""}${med.especialidad_2?"\n"+med.especialidad_2+(med.cedula_esp_1?", Céd. Esp. "+med.cedula_esp_1:""):""}`:""

  const textos={
    "general":`CONSENTIMIENTO INFORMADO GENERAL\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\n1. Que he recibido información clara, precisa y suficiente sobre mi condición de salud y el plan de tratamiento propuesto por ${medNom}, y que he tenido la oportunidad de formular todas las preguntas que consideré necesarias, habiendo recibido respuestas satisfactorias a todas ellas.\n\n2. Que he sido informado(a) de los tratamientos alternativos posibles, así como de los efectos secundarios o adversos que puede tener el tratamiento propuesto.\n\n3. Que las indicaciones del médico fueron emitidas de acuerdo con criterio médico-científico y que el cumplimiento de las mismas es voluntario. Entiendo que la efectividad del tratamiento es proporcional al apego a las indicaciones.\n\n4. Que puedo abandonar el plan de tratamiento en cualquier momento, de conformidad con el Art. 51 Bis 1 de la Ley General de Salud, y que el abandono puede implicar consecuencias adversas para mi salud.\n\n5. Que toda la información relacionada con mi atención médica será tratada con estricta confidencialidad, conforme a la NOM-004-SSA3-2012 y la LFPDPPP.\n\nOtorgo el presente consentimiento de forma libre y voluntaria.`,

    "privacidad":`AVISO DE PRIVACIDAD\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nResponsable del tratamiento de datos personales:\nQP Clinic, S.C. (en adelante "QP Clinic"), con domicilio en Avenida de los Insurgentes Sur 933, Int. Piso 12, Colonia Nápoles, Benito Juárez, C.P. 03810, Ciudad de México, es responsable del tratamiento de mis datos personales conforme a este Aviso de Privacidad.\n\nDatos que se recaban:\nLos datos personales de contacto y/o de identificación que tratará QP Clinic son nombre, edad, sexo, ocupación, domicilio, correo electrónico, teléfono (móvil y/o fijo) y Registro Federal de Contribuyentes.\n\nDatos sensibles:\nQP Clinic recabará y tratará datos sensibles relacionados con el estado de salud, antecedentes e historial clínico, e información sobre el modo de vida, necesarios o convenientes para las finalidades señaladas. Dichos datos serán mantenidos y tratados con estricta seguridad y confidencialidad para fines relacionados con la prestación de servicios de salud.\n\nFinalidad del tratamiento de los datos personales:\na) Finalidades necesarias para el mantenimiento de la relación con el titular:\n- Prestación de servicios médicos, terapia, rehabilitación, dieta y nutrición.\n- Creación, estudio, análisis, actualización y mantenimiento de archivo clínico.\n- Facturación y cobranza por servicios.\n- Mantenimiento de registros para seguimiento a servicios.\n\nb) Finalidades distintas:\n- Estudios, registros, estadísticas y análisis de información de salud.\n- Mantenimiento de registros para prestación de servicios en el futuro.\n- Análisis estadísticos y de mercado.\n- Promoción y mercadeo de productos y servicios de QP Clinic u otras empresas del mismo grupo corporativo.\n\nEn caso de no desear que QP Clinic trate mis datos para las finalidades del inciso b), cuento con un plazo de 5 días para manifestar mi negativa a: datospersonales@qpclinic.mx\n\nTransferencia:\nQP Clinic puede transferir, dentro y fuera del país, mis datos personales a laboratorios, clínicas, hospitales, centros de investigación, aseguradoras, empresas del mismo grupo corporativo o autoridades competentes. Para oponerme, dispongo de 5 días para notificarlo a: datospersonales@qpclinic.mx\n\nDerechos ARCO (Acceso, Rectificación, Cancelación y Oposición):\nPuedo ejercer mis derechos ARCO enviando solicitud escrita a datospersonales@qpclinic.mx o a Insurgentes Sur 933 Int. Piso 12, Col. Nápoles, Benito Juárez, C.P. 03810, CDMX, de lunes a viernes de 8:00 a 18:00 hrs y sábados de 08:00 a 14:00 hrs, incluyendo: nombre, domicilio o correo para respuesta, documentos de identidad, descripción de los datos y cualquier elemento que permita su localización.\n\nRevocación del consentimiento:\nEn cualquier momento puedo revocar mi consentimiento enviando solicitud a datospersonales@qpclinic.mx o por escrito a la dirección indicada.\n\nMedidas de protección:\nQP Clinic ha establecido procedimientos físicos, electrónicos y administrativos para evitar el uso o revelación no autorizados de los datos personales.\n\nCambios al aviso de privacidad:\nLas modificaciones estarán disponibles en https://www.qpclinic.mx o por cualquier medio que QP Clinic determine.\n\nDeclaro bajo protesta de decir verdad que he leído en su totalidad este Aviso de Privacidad y entiendo plenamente su alcance y contenido. Otorgo mi consentimiento para que QP Clinic trate mis datos personales de acuerdo con este Aviso de Privacidad, incluyendo datos sensibles de salud y las finalidades distintas descritas en el inciso b).`,

    "telemedicina":`CONSENTIMIENTO INFORMADO PARA SERVICIOS DE TELEMEDICINA / TELESALUD\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue la Telemedicina/Telesalud implica el uso de comunicaciones electrónicas para permitir que los proveedores de atención médica compartan información médica individual del paciente con el fin de mejorar su atención, mediante equipos de telecomunicaciones que permiten comunicación bidireccional en tiempo real.\n\nBENEFICIOS ESPERADOS:\n• Mejora del acceso a la atención desde un sitio remoto.\n• Evaluación y gestión médica más eficientes.\n• Diagnóstico y tratamiento oportunos.\n\nRIESGOS POTENCIALES:\n• La transmisión de información podría verse alterada por fallas técnicas.\n• Los servicios de telemedicina pueden no ser tan completos como los presenciales.\n• En casos poco frecuentes, la información transmitida puede ser insuficiente.\n• En casos excepcionales, los protocolos de seguridad pueden fallar.\n\nDECLARO Y ACEPTO QUE:\n1. Puedo retirar mi consentimiento en cualquier momento sin afectar mi derecho a atención presencial futura.\n2. Las leyes que protegen la confidencialidad de mi información médica aplican también a la telemedicina.\n3. Existen alternativas de atención presencial disponibles.\n\nOtorgo el presente consentimiento de forma libre y voluntaria.`,

    "qpclinic":`CONSENTIMIENTO INFORMADO PARA TRATAMIENTO MÉDICO-DEPORTIVO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom}${medCred?", "+medCred:""} me ha informado de manera clara y suficiente sobre el tratamiento médico-deportivo indicado, y que habiendo comprendido la información, otorgo mi consentimiento libre y voluntario para iniciarlo.\n\nDESCRIPCIÓN DEL TRATAMIENTO: Prescripción y modificación evolutiva de ejercicio físico y plan alimenticio individualizados.\n\nRIESGOS POTENCIALES: Problemas digestivos (náuseas, vómitos, diarreas), cansancio, dolor muscular, calambres, palpitaciones, mareos, hipotensión, hipoglucemia y alteración electrolítica. También pueden presentarse boca seca, caída del cabello, cefalea, cambios en el ritmo menstrual y sensibilidad al frío.\n\nLa aparición de efectos adversos es inversamente proporcional al apego al tratamiento prescrito.\n\nHabiendo sido informado(a) de los beneficios, riesgos y alternativas del tratamiento, otorgo mi consentimiento de forma libre y voluntaria para iniciarlo.`,

    "seguimiento":`CARTA DE COMPROMISO — SEGUIMIENTO MÉDICO-DEPORTIVO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO las características del seguimiento médico-deportivo:\n\n1. Evaluaciones médico-deportivas cada 15 días.\n2. Determinación de composición corporal en cada consulta.\n3. Prescripción y progresión de actividad física y plan alimenticio.\n4. Valoración médica por lesión o enfermedad durante el periodo vigente.\n5. Determinación de capacidad aeróbica al inicio y al finalizar.\n\nCONDICIONES QUE ACEPTO:\n• Duración: 8 o 12 semanas según el plan contratado.\n• Los servicios no tomados NO se repondrán al vencer la vigencia.\n• NO se realizarán devoluciones económicas una vez contratado el periodo.\n• Los resultados no se garantizan si se siguen recomendaciones externas o metodologías no prescritas por el médico tratante.\n\nOtorgo el presente compromiso de forma libre y voluntaria.`,

    "eaa":`CONSENTIMIENTO INFORMADO — USO DE ESTEROIDES ANABÓLICOS ANDROGÉNICOS (EAA)\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre los efectos secundarios y riesgos asociados al uso de esteroides anabólicos androgénicos (EAA):\n\nRIESGOS PARA LA SALUD:\n• Cardiovasculares: hipertensión arterial sistémica, hipertrofia ventricular, trombosis, infarto al miocardio, evento vascular cerebral.\n• Hepáticos: hepatitis, peliosis hepática, carcinoma hepatocelular.\n• Renales: disminución del filtrado glomerular, insuficiencia renal.\n• Psiquiátricos: hostilidad, depresión, manía, psicosis.\n• Reproductivos: azoospermia, atrofia testicular, disfunción eréctil.\n• Reacciones anafilácticas. MUERTE.\n\nConociendo los riesgos descritos, solicito voluntariamente la prescripción médica de EAA bajo seguimiento médico periódico. Entiendo que dicho seguimiento busca minimizar los riesgos, pero no los elimina. Puedo revocar este consentimiento en cualquier momento.`,

    "infiltraciones":`CONSENTIMIENTO INFORMADO PARA TRATAMIENTO CON INFILTRACIONES\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de infiltración, y que habiendo comprendido la información, otorgo mi consentimiento para su realización.\n\nDESCRIPCIÓN: Introducción de una sustancia o medicamento con jeringa en una región anatómica específica, con fines diagnósticos o terapéuticos.\n\nOBJETIVOS: Aliviar el dolor, reducir la inflamación, prevenir la limitación funcional y reducir la necesidad de tratamientos más agresivos.\n\nRIESGOS: Reacción alérgica (incluida anafilaxia), lesiones en vasos sanguíneos, nervios o tendones, infección, descompensación de diabetes o hipertensión arterial, y atrofia cutánea.\n\nALTERNATIVAS: Medicación antiinflamatoria, reposo relativo o fisioterapia.\n\nHe comprendido la información y mis dudas fueron aclaradas satisfactoriamente. Otorgo mi consentimiento para el procedimiento de infiltración. Sé que puedo revocarlo en cualquier momento.`,

    "esfuerzo":`CONSENTIMIENTO INFORMADO PARA PRUEBA DE ESFUERZO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de la prueba de esfuerzo, y que habiendo comprendido su contenido, otorgo mi consentimiento de forma libre y voluntaria para realizarla.\n\n¿QUÉ ES? La prueba de esfuerzo es una evaluación de ejercicio físico progresivo que valora la respuesta del organismo durante el esfuerzo, determina los umbrales aeróbico y anaeróbico, y permite diseñar planes de entrenamiento personalizados. También permite detectar arritmias y cardiopatías.\n\n¿CÓMO SE REALIZA? En cinta rodante o bicicleta ergométrica con carga progresiva, monitorizando presión arterial, frecuencia cardíaca y electrocardiograma de forma continua.\n\nRIESGOS: Cansancio muscular, mareo y angina. En pacientes con enfermedad coronaria: arritmias graves, síncope e infarto. El riesgo de muerte es excepcional (aproximadamente 1 por cada 10,000 pruebas). El personal médico está capacitado y equipado para atender las complicaciones que pudieran presentarse.\n\nHe comprendido el procedimiento y sus riesgos, y tomo esta decisión de manera libre y voluntaria.`,

    "glp1":`CONSENTIMIENTO INFORMADO — TRATAMIENTO CON AGONISTAS GLP-1\n(Semaglutida / Ozempic® — Tirzepatida / Mounjaro®)\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el tratamiento con agonistas del receptor GLP-1, y que habiendo comprendido los beneficios, riesgos y alternativas, otorgo mi consentimiento libre y voluntario para iniciarlo.\n\nOBJETIVO: Control de diabetes tipo 2 y/o reducción de peso en pacientes con obesidad o sobrepeso.\n\nEFECTOS ADVERSOS FRECUENTES (≥5%): Náuseas, vómito, diarrea, dolor abdominal y estreñimiento.\n\nEFECTOS ADVERSOS MENOS FRECUENTES: Hipoglucemia, litiasis vesicular y empeoramiento de retinopatía diabética.\n\nRIESGO GRAVE — NEUROPATÍA ÓPTICA ISQUÉMICA (NAION): Estudios publicados en JAMA Ophthalmology (2024) y confirmados por la EMA (junio 2025) identificaron asociación entre el uso de agonistas GLP-1 y NAION. El riesgo es 4 a 7 veces mayor en comparación con otros tratamientos. El daño puede ser IRREVERSIBLE. La EMA lo clasificó como efecto adverso "muy raro" (≤1 de cada 10,000 pacientes). Ante cualquier cambio en la visión, debo notificarlo inmediatamente al médico.\n\nMe comprometo a reportar cualquier efecto adverso durante el seguimiento médico y a acudir de forma puntual a mis citas de control.`,

    "fisioterapia":`CONSENTIMIENTO INFORMADO — FISIOTERAPIA Y REHABILITACIÓN\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue he sido informado(a) de manera clara y suficiente sobre los procedimientos, posibles riesgos y contraindicaciones de la Fisioterapia y Rehabilitación, y que habiendo comprendido la información, otorgo mi consentimiento libre y voluntario para los tratamientos indicados por QP Clinic.\n\n1. DESCRIPCIÓN\nLa Fisioterapia y Rehabilitación es la especialidad encargada de evaluar, prevenir, corregir y tratar la incapacidad física, las alteraciones del movimiento, la funcionalidad, la postura y el dolor. Los tratamientos pueden incluir: electroterapia, termoterapia, crioterapia, hidroterapia, magnetoterapia, terapia manual, masoterapia, ejercicio terapéutico, acupuntura, punción seca e infiltraciones.\n\n2. POSIBLES MOLESTIAS Y RIESGOS\n- Dolor muscular tardío tras las primeras sesiones.\n- Mareos o náuseas temporales.\n- Irritación de piel por fricción o manipulaciones.\n- ELECTROTERAPIA: quemaduras eléctricas en el sitio de electrodos, sensación de ardor o picazón, espasmos musculares. CONTRAINDICADO en portadores de marcapasos o implantes electrónicos activos.\n- TERMOTERAPIA (calor): quemaduras de primer o segundo grado, eritema, edema, agravamiento de inflamación aguda.\n- CRIOTERAPIA (frío): quemaduras por frío, crioulceración, vasoconstricción excesiva. CONTRAINDICADO en enfermedad de Raynaud o hipersensibilidad al frío.\n- MAGNETOTERAPIA: cefalea, mareo. CONTRAINDICADO en portadores de marcapasos.\n- LÁSER: daño ocular sin protección adecuada, eritema local.\n- Reacciones alérgicas a electrodos, geles, bandas, tapes o adhesivos.\n- Riesgo de lesión en pacientes con osteoporosis o alteraciones anatómicas.\n\nNOTA: Deberá notificar inmediatamente cualquier alergia, molestia o reacción inusual.\n\n3. CONTRAINDICACIONES ABSOLUTAS\n- Tumores malignos activos en zona de tratamiento.\n- Cardiopatías descompensadas, endocarditis activa, hemopatías o tuberculosis activa.\n- Marcapasos o dispositivos intracardíacos (para electroterapia y magnetoterapia).\n- Trombosis o hemorragias activas.\n\n4. CONTRAINDICACIONES RELATIVAS\n- Derrame sinovial, hemartros o heridas recientes.\n- Artritis infecciosa, micosis o dermatitis piógena.\n- Epilepsia no controlada. Embarazo o sospecha de embarazo.\n- Hipertensión arterial no controlada o várices.\n- Enfermedades agudas febriles. Alteraciones graves de la sensibilidad.\n\n5. DECLARACIONES DEL PACIENTE\n1. He recibido información suficiente sobre mi valoración y tratamiento.\n2. Declaro no presentar las contraindicaciones descritas, o haberlas notificado previamente al terapeuta.\n3. Acepto libre y voluntariamente los tratamientos indicados por QP Clinic.\n4. Entiendo que puedo revocar este consentimiento en cualquier momento.\n\nOtorgo el presente consentimiento de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012.`,

    "biopsia_mama":`CONSENTIMIENTO INFORMADO — BIOPSIA DE MAMA\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de biopsia de mama, conforme a la NOM-041-SSA2-2011, y que habiendo comprendido su contenido, autorizo su realización.\n\n1. DESCRIPCIÓN DEL PROCEDIMIENTO\nLa biopsia de mama consiste en la obtención de tejido mamario mediante aguja fina (BAAF), aguja de corte (Core Biopsy/Tru-Cut) o procedimiento quirúrgico (biopsia excisional), para estudio histopatológico. El procedimiento puede realizarse con guía clínica, ultrasonográfica o estereotáxica.\n\n2. OBJETIVO\nConfirmar o descartar la naturaleza benigna o maligna de una lesión mamaria detectada por exploración física o estudios de imagen, permitiendo establecer un diagnóstico definitivo y un plan de tratamiento apropiado.\n\n3. BENEFICIOS\n- Diagnóstico histopatológico preciso.\n- Orientación del tratamiento médico o quirúrgico.\n- Detección temprana de cáncer de mama con potencial curativo.\n\n4. RIESGOS Y POSIBLES COMPLICACIONES\n- Dolor o molestia en el sitio de punción (transitoria).\n- Hematoma o equimosis local.\n- Infección del sitio de biopsia (poco frecuente).\n- Cicatriz residual (en biopsia quirúrgica).\n- Seroma postoperatorio.\n- Resultado falso negativo (no descarta malignidad; puede requerirse nueva biopsia).\n- En casos excepcionales: fístula o reacción adversa a la anestesia local.\n\n5. ALTERNATIVAS\n- Seguimiento imagenológico sin biopsia (según categoría BI-RADS).\n- Biopsia por otro método (BAAF, Core o quirúrgica).\n- Segunda opinión médica.\n\n6. DECLARACIÓN\nHe comprendido el procedimiento, sus objetivos, beneficios, riesgos y alternativas. He podido formular mis preguntas y recibido respuestas satisfactorias. Autorizo la toma de la biopsia y el análisis del tejido obtenido. Entiendo que puedo revocar este consentimiento antes del procedimiento.\n\nOtorgo el presente de forma libre y voluntaria, conforme a los Arts. 80-81 del Reglamento de la Ley General de Salud en Materia de Prestación de Servicios de Atención Médica.`,

    "proloterapia":`CONSENTIMIENTO INFORMADO — INFILTRACIÓN PERINEURAL CON PROLOTERAPIA (DEXTROSA)\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de infiltración perineural con proloterapia, y que habiendo comprendido sus bases, riesgos y alternativas, otorgo mi consentimiento libre y voluntario para recibirlo.\n\n1. DESCRIPCIÓN DEL PROCEDIMIENTO\nLa proloterapia perineural consiste en la aplicación subcutánea de solución de dextrosa (glucosa al 5%) alrededor de nervios periféricos sensitivos sensibilizados, con el objetivo de modular la inflamación neurogénica periférica y reducir el dolor crónico. Técnica desarrollada por el Dr. John Lyftogt (Nueva Zelanda, 2005-presente).\n\n2. MECANISMO DE ACCIÓN\nLa dextrosa inhibe los canales TRPV1 (receptor de calor) de las fibras C sensibilizadas, reduciendo la liberación de neuropéptidos inflamatorios (sustancia P y CGRP), lo que disminuye la hiperalgesia y la alodinia periférica.\n\n3. INDICACIONES\n- Dolor neuropático crónico periférico.\n- Neuropatía diabética periférica dolorosa.\n- Dolor musculoesquelético crónico con componente neuropático.\n- Cefalea tensional y migraña con componente periférico.\n- Síndrome de dolor regional complejo (SDRC) tipo I y II.\n\n4. RIESGOS Y POSIBLES EFECTOS ADVERSOS\n- Dolor temporal en el sitio de inyección (frecuente, resuelve en horas).\n- Hematoma o equimosis local.\n- Reacción vasovagal (mareo, sudoración, síncope breve).\n- Infección del sitio de punción (rara con técnica aséptica adecuada).\n- Lesión nerviosa directa (muy rara con técnica subcutánea correcta).\n- Reacción alérgica a la dextrosa (excepcional).\n- No se han reportado efectos sistémicos graves con la técnica subcutánea.\n\n5. CONTRAINDICACIONES\n- Alergia conocida a la dextrosa.\n- Infección activa en la zona de tratamiento.\n- Alteraciones graves de la coagulación no controladas.\n- Diabetes mellitus no controlada (hiperglucemia activa).\n\n6. ALTERNATIVAS TERAPÉUTICAS\n- Fisioterapia y rehabilitación.\n- Analgésicos y antiinflamatorios.\n- Infiltraciones con anestésico local y/o corticosteroide.\n- Neuromodulación (TENS, acupuntura).\n\n7. DECLARACIÓN\nHe comprendido el procedimiento, sus bases, riesgos y alternativas. Entiendo que pueden requerirse múltiples sesiones para obtener el beneficio esperado. Puedo revocar este consentimiento en cualquier momento.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012 y el Art. 81 del Reglamento de la Ley General de Salud.`,

    "puncion_seca":`CONSENTIMIENTO INFORMADO — PUNCIÓN SECA\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de punción seca, y que habiendo comprendido sus objetivos, riesgos y contraindicaciones, otorgo mi consentimiento libre y voluntario para recibirlo.\n\n1. DESCRIPCIÓN\nLa punción seca (Dry Needling) es una técnica mínimamente invasiva que utiliza agujas de acupuntura estériles de un solo uso, sin introducción de sustancias, para la inactivación de puntos gatillo miofasciales (PGM) activos o latentes causantes de dolor y disfunción muscular.\n\n2. OBJETIVO\nEliminar o reducir la actividad de los PGM mediante la obtención de la respuesta de espasmo local (REL), normalizar la bioquímica del tejido muscular y restaurar la función y el rango de movimiento.\n\n3. RIESGOS Y POSIBLES EFECTOS ADVERSOS\n- Dolor post-tratamiento (dolor muscular tardío de 24 a 72 horas; frecuente y esperado).\n- Hematoma o sangrado leve en el sitio de punción.\n- Reacción vasovagal (mareo, náusea, síncope breve; en aproximadamente el 3-4% de los pacientes).\n- Neumotórax (complicación grave pero excepcional en punción de región torácica o cervical).\n- Lesión nerviosa (muy rara con técnica correcta).\n- Infección (muy rara con material estéril de un solo uso).\n\n4. CONTRAINDICACIONES\n- Trastornos de coagulación o tratamiento anticoagulante sin autorización médica.\n- Infección activa en la zona de tratamiento.\n- Alergia al metal (níquel) del que están compuestas las agujas.\n- Inmunodepresión grave.\n- Miedo intenso a las agujas (belonefobia) no manejable.\n- Embarazo (puntos contraindicados durante la gestación).\n- Prótesis articular en la zona de punción.\n\n5. DECLARACIÓN\nDeclaro no presentar ninguna de las contraindicaciones señaladas, o haberlas comunicado al médico. Entiendo que puedo revocar este consentimiento en cualquier momento.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012.`,

    "electropuntura":`CONSENTIMIENTO INFORMADO — ELECTROPUNTURA (ELECTROACUPUNTURA)\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre el procedimiento de electropuntura, y que habiendo comprendido sus objetivos, riesgos y contraindicaciones, otorgo mi consentimiento libre y voluntario para recibirlo.\n\n1. DESCRIPCIÓN\nLa electropuntura (o electroacupuntura) es una técnica que combina la acupuntura con estimulación eléctrica de baja frecuencia e intensidad, a través de agujas de acupuntura estériles de un solo uso insertadas en puntos anatómicos específicos (puntos de acupuntura, puntos gatillo o zonas de dolor). La corriente eléctrica amplifica el efecto analgésico y neuromodulador de la acupuntura.\n\n2. OBJETIVOS TERAPÉUTICOS\n- Analgesia mediante liberación de endorfinas, encefalinas y dinorfinas endógenas.\n- Reducción de la inflamación local y sistémica.\n- Neuromodulación del sistema nervioso autónomo.\n- Relajación muscular y reducción del espasmo.\n- Mejora de la microcirculación local.\n\n3. RIESGOS Y POSIBLES EFECTOS ADVERSOS\n- Dolor leve en el sitio de punción (transitorio).\n- Hematoma o sangrado puntiforme.\n- Reacción vasovagal (mareo, náuseas, síncope breve).\n- Sensación de quemadura si la intensidad eléctrica es excesiva.\n- Irritación de piel en el sitio de los electrodos (rara).\n- Neumotórax (muy raro en punción torácica inadecuada).\n\n4. CONTRAINDICACIONES ABSOLUTAS\n- MARCAPASOS o cualquier dispositivo electrónico implantado (desfibrilador, neuroestimulador). RIESGO VITAL.\n- Embarazo: no aplicar puntos contraindicados durante la gestación.\n- Epilepsia no controlada.\n- Infección activa o herida abierta en la zona de punción.\n\n5. CONTRAINDICACIONES RELATIVAS\n- Tratamiento con anticoagulantes (evaluar riesgo/beneficio).\n- Diabetes mellitus con neuropatía avanzada (alteración de la sensibilidad).\n- Marcas de nacimiento, cicatrices o piel dañada en la zona de punción.\n\n6. DECLARACIÓN\nDeclaro NO portar marcapasos ni ningún dispositivo electrónico implantado. No me encuentro embarazada o he comunicado mi estado al médico. No presento ninguna de las contraindicaciones absolutas señaladas. Entiendo que puedo revocar este consentimiento en cualquier momento.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012.`,

    "checkup_gine":`CONSENTIMIENTO INFORMADO — CHECKUP GINECOLÓGICO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom} me ha informado de manera clara y suficiente sobre cada uno de los procedimientos incluidos en el checkup ginecológico, y que habiendo comprendido su contenido, otorgo mi consentimiento libre y voluntario para su realización.\n\n1. REVISIÓN MÉDICA Y EXPLORACIÓN FÍSICA GINECOLÓGICA\nValoración clínica general y ginecológica que incluye anamnesis, exploración abdominal y pélvica, conforme a la NOM-035-SSA3-2012 (criterios para información en salud).\n\n2. EXPLORACIÓN MAMARIA\nExploración física de ambas mamas (inspección y palpación), cadenas ganglionares axilares y supraclaviculares, conforme a la NOM-041-SSA2-2011 (prevención, diagnóstico y tratamiento del cáncer de mama). Riesgos: ninguno significativo; posible incomodidad transitoria.\n\n3. TOMA DE PAPANICOLAOU (Citología cervical)\nObtención de células del cuello uterino y canal endocervical mediante espéculo y cepillo/espátula, conforme a la NOM-014-SSA2-2020 (prevención, detección, diagnóstico y tratamiento del cáncer cervicouterino). Riesgos: sangrado mínimo, molestia transitoria, resultado falso negativo (sensibilidad aproximada del 70%; requiere control periódico).\n\n4. COLPOSCOPIA\nVisualización amplificada del cuello uterino, vagina y vulva con colposcopio, con aplicación de ácido acético al 3-5% y solución yodada de Lugol. Puede incluir toma de biopsia dirigida si se identifican lesiones sospechosas. Riesgos: molestia, sangrado mínimo post-biopsia, infección (rara) y dolor pélvico leve.\n\n5. ULTRASONIDO TRANSVAGINAL Y/O VÍA ABDOMINAL\nEstudio de imagen por ultrasonido para valoración del útero, endometrio, ovarios, trompas y estructuras pélvicas. Transvaginal: requiere introducción de transductor de baja frecuencia. Abdominal: requiere vejiga llena. Riesgos: incomodidad transitoria; no implica riesgo de radiación (ultrasonido no ionizante).\n\nCONTRAINDICACIONES GENERALES\n- Menstruación activa (papanicolaou, colposcopia y ultrasonido transvaginal pueden diferirse).\n- Infección vaginal activa (biopsia y toma de PAP pueden diferirse).\n- Relaciones sexuales 48 horas previas al PAP y colposcopia.\n\nDECLARACIÓN\nHe sido informada de cada procedimiento, su objetivo, beneficios, riesgos y alternativas. He podido formular preguntas y recibí respuestas satisfactorias.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012 y las normas específicas citadas.`,

    "quirurgico":`CONSENTIMIENTO INFORMADO QUIRÚRGICO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom}${medCred?", "+medCred:""} me ha informado de manera clara y suficiente sobre el procedimiento quirúrgico indicado, y que habiendo comprendido su contenido, autorizo al cirujano y a su equipo para realizarlo.\n\n1. HE SIDO INFORMADO(A) DE:\n- El diagnóstico que justifica la cirugía y el procedimiento a realizar.\n- La técnica quirúrgica propuesta y las alternativas disponibles.\n- Los beneficios esperados y el pronóstico sin tratamiento quirúrgico.\n- El tipo de anestesia propuesta (se firma consentimiento anestésico por separado).\n- La necesidad de estudios preoperatorios y el ayuno indicado.\n\n2. RIESGOS GENERALES DE CUALQUIER CIRUGÍA\n- Infección del sitio quirúrgico (superficial, profunda o de órgano).\n- Sangrado intraoperatorio o postoperatorio que pueda requerir transfusión.\n- Dehiscencia (apertura) de la herida quirúrgica.\n- Formación de cicatriz queloidea o hipertrófica.\n- Trombosis venosa profunda (TVP) y tromboembolismo pulmonar (TEP).\n- Lesión de estructuras adyacentes (nervios, vasos sanguíneos u órganos vecinos).\n- Reacciones derivadas de la anestesia (cubiertas en el consentimiento anestésico).\n- Necesidad de conversión a técnica abierta si el procedimiento es laparoscópico o artroscópico.\n- Dolor postoperatorio y necesidad de analgesia.\n- Complicaciones específicas del procedimiento a realizar, descritas verbalmente por el cirujano.\n\n3. RIESGOS RAROS PERO GRAVES\n- Fallo orgánico (cardiaco, renal o respiratorio) en pacientes de alto riesgo.\n- Choque o paro cardiaco intraoperatorio.\n- Muerte (riesgo inherente a cualquier procedimiento quirúrgico).\n\n4. ALTERNATIVAS AL TRATAMIENTO QUIRÚRGICO\nHe sido informado(a) sobre las alternativas terapéuticas no quirúrgicas disponibles para mi condición y sus respectivos resultados esperados.\n\n5. DECLARACIÓN\nHe comprendido toda la información proporcionada. He podido formular preguntas y he recibido respuestas satisfactorias. Autorizo al equipo quirúrgico a tomar las medidas médicamente necesarias en caso de hallazgos intraoperatorios imprevistos que pongan en riesgo mi vida o salud. Sé que puedo revocar este consentimiento antes de iniciar el procedimiento.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-004-SSA3-2012 Art. 10 y los Arts. 80-81 del Reglamento de la Ley General de Salud en Materia de Prestación de Servicios de Atención Médica.`,

    "anestesia":`CONSENTIMIENTO INFORMADO ANESTÉSICO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, ACEPTO:\n\nQue ${medNom}${medCred?", "+medCred:""} me ha informado de manera clara y suficiente sobre el tipo de anestesia propuesta para el procedimiento quirúrgico o médico indicado, conforme a la NOM-006-SSA3-2011, y que habiendo comprendido su contenido, autorizo su administración.\n\n1. HE SIDO INFORMADO(A) DE:\n- El tipo de anestesia propuesta y sus alternativas.\n- Mi clasificación de riesgo anestésico (ASA).\n- Los beneficios de la anestesia para tolerar el procedimiento sin dolor.\n- La importancia del ayuno: sólidos mínimo 6 horas, líquidos claros mínimo 2 horas.\n\n2. EFECTOS ADVERSOS FRECUENTES (pueden ocurrir en 1 de cada 10 pacientes)\n- Náusea y vómito postoperatorio (NVPO).\n- Dolor de garganta o ronquera leve tras intubación endotraqueal.\n- Escalofríos y temblores al despertar.\n- Somnolencia, confusión o mareo transitorio.\n- Dolor o hematoma en el sitio de venopunción.\n\n3. EFECTOS ADVERSOS POCO FRECUENTES (1 en 100 a 1 en 1,000)\n- Lesión dental durante la intubación.\n- Hipotensión o hipertensión arterial intraoperatoria.\n- Arritmia cardiaca transitoria.\n- Cefalea post-punción lumbar (anestesia espinal o epidural).\n- Dificultad de intubación (vía aérea difícil).\n\n4. EFECTOS ADVERSOS RAROS PERO GRAVES (menos de 1 en 10,000)\n- Alergia o anafilaxia a medicamentos anestésicos.\n- Hipertermia maligna (reacción genética a agentes anestésicos volátiles).\n- Aspiración de contenido gástrico y neumonía aspirativa.\n- Paro cardiaco intraoperatorio.\n- Daño neurológico con anestesia neuroaxial (espinal/epidural).\n- Conciencia durante anestesia general (awareness): muy rara, menor de 1 en 1,000.\n- Muerte: riesgo inherente a todo procedimiento anestésico.\n\n5. MIS COMPROMISOS\n- Respetar el ayuno indicado de forma estricta.\n- Informar sobre todos mis medicamentos, suplementos y alergias conocidas.\n- Declarar si soy portador(a) de marcapasos, prótesis o implantes electrónicos.\n- Informar antecedentes de complicaciones anestésicas propias o familiares.\n- No conducir vehículos durante las 24 horas siguientes al procedimiento.\n- Reportar inmediatamente cualquier síntoma inusual en el postoperatorio.\n\n6. DECLARACIÓN\nHe comprendido la información recibida. He podido formular mis preguntas y recibí respuestas satisfactorias. Autorizo la administración de anestesia y las maniobras de soporte vital que sean necesarias durante el procedimiento. Sé que puedo revocar este consentimiento antes de iniciar la anestesia.\n\nOtorgo el presente de forma libre y voluntaria, conforme a la NOM-006-SSA3-2011 Arts. 8.2, 9 y 11.`
  };
  return textos[tipo]||`Documento: ${DOCS_NOMBRES[tipo]||tipo}`;
}

// ── PASO 1: VERIFICAR CÓDIGO ──────────────────────────────
function mostrarVerificacion(){
  R().innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0D47A1,#0288D1);display:flex;align-items:center;justify-content:center;padding:16px">
    <div class="card fade" style="width:100%;max-width:380px;text-align:center">
      <img src="https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg" style="width:160px;margin:0 auto 16px;display:block">
      <h2 style="font-size:18px;font-weight:800;color:#1A237E;margin-bottom:6px">Firma de Documentos Médicos</h2>
      <p style="color:#546E7A;font-size:13px;margin-bottom:20px;line-height:1.6">Por favor lea detenidamente los documentos que se le mostrarán y fírmelos para integrarlos a su expediente clínico.<br><br>Su información es tratada con absoluta confidencialidad.</p>
      <p style="font-size:12px;font-weight:700;color:#546E7A;margin-bottom:8px;text-align:left">Código de seguridad (como aparece en su WhatsApp)</p>
      <input id="cod-input" type="text" placeholder="Ej: AB3C9D" style="text-transform:uppercase;letter-spacing:3px;font-size:18px;text-align:center;font-weight:700" value="${COD||""}">
      <button class="btn-primary" onclick="verificarCodigo()">COMENZAR →</button>
      <div id="ver-error" style="display:none;background:#FFEBEE;color:#C62828;padding:10px;border-radius:8px;margin-top:10px;font-size:13px"></div>
      <p style="font-size:11px;color:#90A4AE;margin-top:16px">QP Clinic — Especialistas en Salud Integral<br>qpclinic.org</p>
    </div>
  </div>`;
  // Auto-verificar si viene el código en URL
  if(COD&&PAC_ID)setTimeout(()=>verificarCodigo(),300);
}

window.verificarCodigo=async function(){
  const cod=(document.getElementById("cod-input")?.value||"").trim().toUpperCase();
  if(!cod||cod.length<5){mostrarError("ver-error","Ingrese el código de seguridad completo");return;}
  if(!PAC_ID){mostrarError("ver-error","Enlace inválido — contacte a la clínica");return;}

  // Buscar documentos pendientes
  const {data:carga,error}=await SB.rpc("firma_cargar",{p_pac:PAC_ID,p_cod:cod,p_med:params.get("med")});
  if(error||!carga||!carga.pendientes||carga.pendientes.length===0){
    mostrarError("ver-error","Código incorrecto o documentos ya firmados");
    return;
  }
  S.pendientes=carga.pendientes;
  S.docs=carga.pendientes.map(d=>d.tipo_documento.replace("firma_pendiente_",""));
  S.paciente=carga.paciente;
  S.medico=carga.medico;

  // Pre-cargar firma del médico como base64 para el PDF
  if(S.medico?.firma_digital){
    S.firmaDoctor=await urlToBase64(S.medico.firma_digital);
  }

  S.docIndex=0;
  mostrarDocumento();
}
function mostrarError(id,msg){const e=document.getElementById(id);if(e){e.style.display="block";e.textContent=msg;}}

// Convierte una URL de imagen a base64 para incrustar en jsPDF
function urlToBase64(url){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=img.width;c.height=img.height;
      c.getContext("2d").drawImage(img,0,0);
      resolve(c.toDataURL("image/png"));
    };
    img.onerror=()=>resolve(null);
    img.src=url+"?t="+Date.now();
  });
}

// ── PASO 2: LEER DOCUMENTO ────────────────────────────────
function mostrarDocumento(){
  const docKey=S.docs[S.docIndex];
  const total=S.docs.length;
  const actual=S.docIndex+1;
  const nombre=DOCS_NOMBRES[docKey]||docKey;
  const texto=getDocTexto(docKey,S.paciente,S.medico);
  const esUltimo=S.docIndex===total-1;

  R().innerHTML=`
  <div style="min-height:100vh;background:#F0F4F8">
    <div style="background:#0D47A1;padding:14px 16px;display:flex;align-items:center;gap:10px">
      <img src="https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg" style="height:32px;background:#fff;border-radius:4px;padding:2px">
      <div>
        <p style="color:rgba(255,255,255,.7);font-size:10px">Documento ${actual} de ${total}</p>
        <p style="color:#fff;font-size:12px;font-weight:700">${nombre}</p>
      </div>
    </div>
    <div style="padding:12px 12px 0">
      <div class="step-indicator">
        ${S.docs.map((_,i)=>`<div class="step-dot ${i<S.docIndex?"done":i===S.docIndex?"active":""}"></div>`).join("")}
        <div class="step-dot ${S.docIndex>=total?"active":""}"></div>
      </div>
      <p style="text-align:center;font-size:10px;color:#546E7A;margin-top:4px">Al final firmará una vez para todos los documentos</p>
    </div>
    <div class="card fade" style="margin:8px 12px">
      <p style="font-size:13px;font-weight:700;color:#1A237E;margin-bottom:10px">${nombre}</p>
      <div class="doc-body" id="doc-texto">${texto.replace(/\n/g,"<br>")}</div>
      <label style="display:flex;align-items:flex-start;gap:10px;margin:14px 0;cursor:pointer;background:#E8F5E9;padding:12px;border-radius:8px">
        <input type="checkbox" id="leido-check" style="accent-color:#2E7D32;width:20px;height:20px;flex-shrink:0;margin-top:2px">
        <span style="font-size:13px;font-weight:600;color:#1B5E20">He leído y entendido este documento. Estoy de acuerdo con su contenido.</span>
      </label>
      <button class="btn-primary" onclick="siguienteDoc()">${esUltimo?"✍️ Ir a firmar todos los documentos →":"Siguiente documento →"}</button>
      ${S.docIndex>0?`<button class="btn-outline" onclick="S.docIndex--;mostrarDocumento()">← Documento anterior</button>`:""}
    </div>
  </div>`;
}

// ── PASO 3: FIRMA ÚNICA AL FINAL ─────────────────────────
window.siguienteDoc=function(){
  if(!document.getElementById("leido-check")?.checked){
    toast("Debe marcar que leyó y está de acuerdo antes de continuar",false);return;
  }
  S.docIndex++;

function initCanvas(){initCanvasId("canvas-firma","#1565C0");}
function initCanvasId(id,color){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  canvas.width=canvas.offsetWidth;
  const ctx=canvas.getContext("2d");
  ctx.strokeStyle=color||"#1565C0";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lastX=0,lastY=0;
  function getPos(e){
    const r=canvas.getBoundingClientRect();
    if(e.touches){return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};}
    return{x:e.clientX-r.left,y:e.clientY-r.top};
  }
  canvas.addEventListener("mousedown",e=>{drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;});
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;},{passive:false});
  function draw(e){
    if(!drawing)return;
    if(e.touches)e.preventDefault();
    const p=getPos(e);
    ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();
    lastX=p.x;lastY=p.y;
  }
  canvas.addEventListener("mousemove",draw);
  canvas.addEventListener("touchmove",draw,{passive:false});
  canvas.addEventListener("mouseup",()=>drawing=false);
  canvas.addEventListener("touchend",()=>drawing=false);
}

async function generarYGuardarPDF(docKey, sigImg, isLast=true){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pac=S.paciente||{};
    const med=S.medico||{};
    const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"});
    const nomPac=`${pac.nombre||""} ${pac.apellido_paterno||""} ${pac.apellido_materno||""}`.trim();
    const medNom=`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim();
    const nombre=DOCS_NOMBRES[docKey]||docKey;

    // ENCABEZADO
    doc.setFillColor(13,71,161);
    doc.rect(0,0,210,34,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(13);doc.setFont("helvetica","bold");
    doc.text("QP Clinic — Especialistas en Salud Integral",14,10);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text("Insurgentes Sur 933, Nápoles, Benito Juárez, CDMX",14,16);
    let credLine1=medNom;
    if(med.especialidad_1)credLine1+=` | ${med.especialidad_1}${med.institucion_grado?" "+med.institucion_grado:""}`;
    if(med.cedula_medico)credLine1+=` | Céd. Prof. ${med.cedula_medico}`;
    doc.text(credLine1,14,22);
    if(med.especialidad_2){
      let credLine2=med.especialidad_2;
      if(med.institucion_esp_1)credLine2+=` ${med.institucion_esp_1}`;
      if(med.cedula_esp_1)credLine2+=` | Céd. Esp. ${med.cedula_esp_1}`;
      doc.text(credLine2,14,28);
    }

    // TÍTULO Y FECHA (fecha en línea propia debajo del título)
    doc.setTextColor(26,35,126);
    doc.setFontSize(12);doc.setFont("helvetica","bold");
    const tituloLines=doc.splitTextToSize(nombre.toUpperCase(),170);
    let ty=44;
    tituloLines.forEach(tl=>{doc.text(tl,105,ty,{align:"center"});ty+=6;});
    doc.setTextColor(84,110,122);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text(`Ciudad de México, ${hoy}`,105,ty,{align:"center"});
    ty+=4;

    // SEPARADOR Y PACIENTE
    doc.setDrawColor(207,216,220);doc.setLineWidth(0.3);
    doc.line(14,ty,196,ty);
    ty+=6;
    doc.setTextColor(26,35,126);doc.setFontSize(9);doc.setFont("helvetica","bold");
    doc.text("Paciente: ",14,ty);
    doc.setTextColor(38,50,56);doc.setFont("helvetica","normal");
    doc.text(nomPac,38,ty);
    ty+=8;

    // CONTENIDO
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(38,50,56);
    const texto=getDocTexto(docKey,pac,med);
    const lines=doc.splitTextToSize(texto,178);
    let y=ty;
    for(const line of lines){
      if(y>242){doc.addPage();y=16;}
      const isHeader=line===line.toUpperCase()&&line.trim().length>3&&!line.match(/^\d/);
      doc.setFont("helvetica",isHeader?"bold":"normal");
      doc.setTextColor(isHeader?13:38,isHeader?71:50,isHeader?161:56);
      doc.text(line,14,y);
      y+=4.8;
    }

    // FIRMAS — 3 columnas: Paciente | Médico | Testigo
    const fy=Math.min(Math.max(y+8,215),248);
    const fyf=fy;
    doc.setDrawColor(207,216,220);doc.setLineWidth(0.3);doc.line(14,fyf,196,fyf);

    // Columna 1: Firma del paciente
    if(sigImg)doc.addImage(sigImg,"PNG",14,fyf+2,52,20);
    doc.setDrawColor(38,50,56);doc.setLineWidth(0.4);
    doc.line(14,fyf+24,70,fyf+24);
    doc.setFontSize(7.5);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
    doc.text("FIRMA DEL PACIENTE",14,fyf+29);
    doc.setFont("helvetica","normal");doc.setTextColor(84,110,122);
    doc.text(nomPac,14,fyf+33);
    doc.text("Firmado: "+new Date().toLocaleString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),14,fyf+37);

    // Columna 2: Firma del médico
    const mx=78;
    if(S.firmaDoctor){
      try{doc.addImage(S.firmaDoctor,"PNG",mx,fyf+2,52,20);}catch(e){}
    }
    doc.setDrawColor(38,50,56);doc.line(mx,fyf+24,mx+56,fyf+24);
    doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
    doc.text("FIRMA DEL MÉDICO",mx,fyf+29);
    doc.setFont("helvetica","normal");doc.setTextColor(84,110,122);
    doc.text(medNom,mx,fyf+33);
    if(med.cedula_medico)doc.text("Céd. "+med.cedula_medico,mx,fyf+37);

    // Columna 3: Firma del testigo
    const tx=142;
    if(S.firmaTestigo){
      try{doc.addImage(S.firmaTestigo,"PNG",tx,fyf+2,52,20);}catch(e){}
      doc.setDrawColor(38,50,56);doc.line(tx,fyf+24,tx+56,fyf+24);
      doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
      doc.text("FIRMA DEL TESTIGO",tx,fyf+29);
      doc.setFont("helvetica","normal");doc.setTextColor(84,110,122);
      if(S.nombreTestigo)doc.text(S.nombreTestigo,tx,fyf+33);
    } else {
      doc.setDrawColor(38,50,56);doc.line(tx,fyf+24,tx+56,fyf+24);
      doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
      doc.text("FIRMA DEL TESTIGO",tx,fyf+29);
    }

    // FOOTER
    doc.setFontSize(7);doc.setTextColor(144,164,174);
    doc.text("Documento conforme a NOM-004-SSA3-2012. QP Clinic — qpclinic.org",105,285,{align:"center"});

    // SUBIR A SUPABASE
    const pdfBlob=doc.output("blob");
    const fileName=`firmas/${PAC_ID}/${docKey}_${Date.now()}.pdf`;
    const {error:uploadError}=await SB.storage.from("expedientes").upload(fileName,pdfBlob,{contentType:"application/pdf",upsert:true});
    if(uploadError)throw uploadError;

    const pendiente=S.pendientes.find(p=>p.tipo_documento==="firma_pendiente_"+docKey);
    await SB.rpc("firma_guardar",{p_pac:PAC_ID,p_cod:COD,p_anexo_id:pendiente?pendiente.id:null,p_dockey:docKey,p_titulo:nombre.toUpperCase(),p_storage:fileName,p_nombre_firmante:nomPac});
    if(isLast)mostrarTerminado();
  } catch(err){
    console.error(err);
    R().innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div class="card" style="text-align:center;max-width:360px"><div style="font-size:40px;margin-bottom:12px">⚠️</div><h3 style="color:#C62828;margin-bottom:8px">Error al guardar</h3><p style="font-size:13px;color:#546E7A;margin-bottom:16px">${err.message}</p><button class="btn-primary" onclick="mostrarFirmaUnica()">Intentar de nuevo</button></div></div>`;
  }
}
