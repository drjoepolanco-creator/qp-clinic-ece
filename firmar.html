function toast(msg,ok=true){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${ok?"#2E7D32":"#C62828"};color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 12px #00000030`;

  const textos={
    "general":`CONSENTIMIENTO INFORMADO GENERAL\n\nYo, ${nom}, en Ciudad de México a ${hoy}, manifiesto lo siguiente:\n\nHe recibido información clara, precisa y suficiente sobre mi condición de salud y el plan de tratamiento propuesto por ${medNom}. He tenido la oportunidad de formular todas las preguntas que consideré necesarias y he recibido respuestas satisfactorias.\n\nHe sido informado(a) de los tratamientos alternativos posibles, así como de los efectos secundarios o adversos que puede tener el tratamiento propuesto.\n\nEntiendo que las indicaciones del médico fueron emitidas de acuerdo a criterio médico-científico y que el cumplimiento de las mismas es voluntario. La efectividad del tratamiento es proporcional al apego a las indicaciones.\n\nEntiendo que puedo abandonar el plan de tratamiento en cualquier momento, de conformidad con el Art. 51 Bis 1 de la Ley General de Salud, y que el abandono puede implicar consecuencias adversas para mi salud.\n\nToda la información relacionada con mi atención médica será tratada con estricta confidencialidad conforme a la NOM-004-SSA3-2012 y la LFPDPPP.\n\nFirmo el presente consentimiento de forma libre y voluntaria.`,

    "privacidad":`AVISO DE PRIVACIDAD SIMPLIFICADO\n\nYo, ${nom}, en Ciudad de México a ${hoy}:\n\nQP Clinic — Especialistas en Salud Integral, con domicilio en Insurgentes Sur 933, Nápoles, Benito Juárez, CDMX, es responsable del tratamiento de mis datos personales conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP).\n\nDatos recabados: identificación, contacto y datos sensibles de salud (antecedentes clínicos, diagnósticos, tratamientos, estudios), así como datos financieros para facturación.\n\nFinalidades: integración del expediente clínico, prestación de servicios médicos, diagnóstico y tratamiento, facturación, y cumplimiento de obligaciones legales en materia de salud.\n\nPuedo ejercer mis derechos ARCO (Acceso, Rectificación, Cancelación u Oposición) enviando solicitud a: recepcion@qpclinic.mx.\n\nHe leído y comprendido el Aviso de Privacidad completo disponible en qpclinic.org y otorgo mi consentimiento para el tratamiento de mis datos personales, incluyendo datos sensibles de salud.`,

    "telemedicina":`CONSENTIMIENTO INFORMADO PARA SERVICIOS DE TELEMEDICINA / TELESALUD\n\nYo, ${nom}, en Ciudad de México a ${hoy}:\n\nLa Telemedicina/Telesalud implica el uso de comunicaciones electrónicas para permitir que los proveedores de atención médica compartan información médica individual del paciente con el fin de mejorar su atención, mediante equipos de telecomunicaciones que permiten comunicación bidireccional en tiempo real.\n\nBENEFICIOS ESPERADOS:\n• Mejora del acceso a la atención desde un sitio remoto.\n• Evaluación y gestión médica más eficientes.\n• Diagnóstico y tratamiento oportunos.\n\nRIESGOS POTENCIALES:\n• La transmisión de información podría verse alterada por fallas técnicas.\n• Los servicios de telemedicina pueden no ser tan completos como los presenciales.\n• En casos poco frecuentes la información transmitida puede ser insuficiente.\n• En casos excepcionales los protocolos de seguridad pueden fallar.\n\nDECLARO:\n1. Entiendo que puedo retirar mi consentimiento en cualquier momento sin afectar mi derecho a atención presencial futura.\n2. Las leyes que protegen la confidencialidad de mi información médica aplican también a la telemedicina.\n3. Existen alternativas de atención presencial disponibles.\n\nFirmo el presente consentimiento de forma libre y voluntaria.`,

    "seguimiento":`CARTA DE COMPROMISO — SEGUIMIENTO MÉDICO-DEPORTIVO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, acepto las características del seguimiento médico-deportivo:\n\n1. Evaluaciones médico-deportivas cada 15 días.\n2. Determinación de composición corporal en cada consulta.\n3. Prescripción y progresión de actividad física y plan alimenticio.\n4. Valoración médica por lesión o enfermedad durante el periodo vigente.\n5. Determinación de capacidad aeróbica al inicio y al finalizar.\n\nCONDICIONES:\n• Duración: 8 o 12 semanas según plan contratado.\n• Los servicios no tomados NO se repondrán al vencer la vigencia.\n• NO se realizarán devoluciones económicas una vez contratado el periodo.\n• Los resultados no se garantizan si se siguen recomendaciones externas o metodologías no prescritas por el médico tratante.`,

    "infiltraciones":`CONSENTIMIENTO INFORMADO PARA TRATAMIENTO CON INFILTRACIONES\n\nYo, ${nom}, en Ciudad de México a ${hoy}, declaro haber sido informado(a) por ${medNom} sobre:\n\nDESCRIPCIÓN: Introducción de sustancia o medicamento con jeringa en una región anatómica específica, con fines diagnósticos o terapéuticos.\n\nOBJETIVOS: Aliviar el dolor, reducir inflamación, prevenir limitación funcional y reducir necesidad de tratamientos más agresivos.\n\nRIESGOS: Reacción alérgica (incluida anafilaxia), lesiones en vasos/nervios/tendones, infección, descompensación de diabetes/HAS, atrofia cutánea.\n\nALTERNATIVAS: Medicación antiinflamatoria, reposo relativo o fisioterapia.\n\nHe comprendido la información, mis dudas fueron aclaradas. Otorgo mi consentimiento para el procedimiento de infiltración. Sé que puedo revocarlo en cualquier momento.`,

    "esfuerzo":`CONSENTIMIENTO INFORMADO PARA PRUEBA DE ESFUERZO\n\nYo, ${nom}, en Ciudad de México a ${hoy}, habiendo sido informado(a) por ${medNom} sobre:\n\n¿QUÉ ES? Prueba de ejercicio físico progresivo que valora la respuesta del organismo durante el esfuerzo, determina umbrales aeróbico y anaeróbico, y permite diseñar planes de entrenamiento personalizados. Permite detectar arritmias y cardiopatías.\n\n¿CÓMO SE REALIZA? En cinta rodante o bicicleta ergométrica con carga progresiva, monitorizando presión arterial, frecuencia cardíaca y electrocardiograma.\n\nRIESGOS: Cansancio muscular, mareo, angina. En casos de enfermedad coronaria: arritmias graves, síncope, infarto. Riesgo de muerte excepcional (1 por 10,000). El personal médico está capacitado para atender complicaciones.\n\nHe comprendido el procedimiento y sus riesgos. Tomo la decisión de manera libre y voluntaria.`,

    "glp1":`CONSENTIMIENTO INFORMADO — TRATAMIENTO CON AGONISTAS GLP-1\n(Semaglutida / Ozempic® — Tirzepatida / Mounjaro®)\n\nYo, ${nom}, en Ciudad de México a ${hoy}, declaro que ${medNom} me ha informado:\n\nOBJETIVO: Control de diabetes tipo 2 y/o reducción de peso en obesidad/sobrepeso.\n\nEFECTOS ADVERSOS FRECUENTES (≥5%): Náuseas, vómito, diarrea, dolor abdominal, estreñimiento.\n\nEFECTOS ADVERSOS MENOS FRECUENTES: Hipoglucemia, litiasis vesicular, empeoramiento de retinopatía diabética.\n\nRIESGO GRAVE — NEUROPATÍA ÓPTICA ISQUÉMICA (NAION): Estudios publicados en JAMA Ophthalmology (2024) y confirmados por la EMA (junio 2025) identificaron asociación con NAION. Riesgo 4-7x mayor vs otros tratamientos. El daño puede ser IRREVERSIBLE. La EMA lo clasificó como efecto adverso "muy raro" (≤1 de 10,000 pacientes). Ante cualquier cambio visual debo notificarlo inmediatamente al médico.\n\nHe sido informado(a) de beneficios, riesgos y alternativas. Acepto iniciar el tratamiento bajo supervisión médica, comprometiéndome a reportar cualquier efecto adverso.`

  </div>`;

}

window.verificarCodigo=async function(){
  const cod=(document.getElementById("cod-input")?.value||"").trim().toUpperCase();
  if(!cod||cod.length<5){mostrarError("ver-error","Ingrese el código de seguridad completo");return;}
  if(!PAC_ID){mostrarError("ver-error","Enlace inválido — contacte a la clínica");return;}

  // Buscar documentos pendientes
  const {data,error}=await SB.from("anexos")
    .select("*")
    .eq("paciente_id",PAC_ID)
    .eq("codigo_firma",cod)
    .eq("firmado",false);

  if(error||!data||data.length===0){
    mostrarError("ver-error","Código incorrecto o documentos ya firmados");
    return;
  }

  S.pendientes=data;
  S.docs=data.map(d=>d.tipo_documento.replace("firma_pendiente_",""));

  // Cargar datos del paciente
  const {data:pac}=await SB.from("pacientes").select("*").eq("id",PAC_ID).single();
  S.paciente=pac;

  // Cargar perfil del médico (primer usuario activo)
  const {data:med}=await SB.from("usuarios").select("*").eq("activo",true).limit(1).single();
  S.medico=med;

  S.docIndex=0;
  mostrarDocumento();
}
function mostrarError(id,msg){const e=document.getElementById(id);if(e){e.style.display="block";e.textContent=msg;}}

// ── PASO 2: LEER DOCUMENTO ────────────────────────────────

  const docKey=S.docs[S.docIndex];
  const total=S.docs.length;

      <label style="display:flex;align-items:flex-start;gap:10px;margin:14px 0;cursor:pointer;background:#E8F5E9;padding:12px;border-radius:8px">
        <input type="checkbox" id="leido-check" style="accent-color:#2E7D32;width:20px;height:20px;flex-shrink:0;margin-top:2px">

      <button class="btn-primary" onclick="irAFirmar()">Continuar a firmar →</button>

}

}

function mostrarFirma(){

  const nombre=DOCS_NOMBRES[docKey]||docKey;
  const total=S.docs.length;
  const actual=S.docIndex+1;

  R().innerHTML=`
  <div style="min-height:100vh;background:#F0F4F8">
    <div style="background:#0D47A1;padding:14px 16px;display:flex;align-items:center;gap:10px">
      <img src="https://ebukjdxeekhzeurmhgkj.supabase.co/storage/v1/object/public/assets/QP%20CLINIC%20LOGO.jpg" style="height:32px;background:#fff;border-radius:4px;padding:2px">
      <div>

function initCanvas(){
  const canvas=document.getElementById("canvas-firma");
  if(!canvas)return;
  canvas.width=canvas.offsetWidth;
  const ctx=canvas.getContext("2d");
  ctx.strokeStyle="#1565C0";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  let drawing=false,lastX=0,lastY=0;

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    if(e.touches){return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};}
    return{x:e.clientX-r.left,y:e.clientY-r.top};
  }
  canvas.addEventListener("mousedown",e=>{drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;});
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;},{passive:false});
  function draw(e){
    if(!drawing)return;
    if(e.touches)e.preventDefault();
    const p=getPos(e);
    ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();
    lastX=p.x;lastY=p.y;
  }
  canvas.addEventListener("mousemove",draw);
  canvas.addEventListener("touchmove",draw,{passive:false});
  canvas.addEventListener("mouseup",()=>drawing=false);
  canvas.addEventListener("touchend",()=>drawing=false);
}

window.limpiarFirma=function(){
  const canvas=document.getElementById("canvas-firma");
  if(canvas)canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
}

window.guardarFirma=async function(){
  const canvas=document.getElementById("canvas-firma");
  if(!canvas)return;
  // Verificar que hay firma
  const ctx=canvas.getContext("2d");
  const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const signed=data.some((v,i)=>i%4!==3&&v>0);
  if(!signed){toast("Por favor firme en el recuadro antes de continuar",false);return;}

  const sigImg=canvas.toDataURL("image/png");
  S.firmas[S.docs[S.docIndex]]=sigImg;

  // Mostrar generando PDF
  R().innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#F0F4F8">
    <div style="font-size:40px" class="spin">⚙️</div>
    <p style="font-size:14px;font-weight:600;color:#1565C0">Generando PDF firmado...</p>
    <p style="font-size:12px;color:#546E7A">Esto puede tardar unos segundos</p>
  </div>`;

  await generarYGuardarPDF(S.docs[S.docIndex], sigImg);
}

async function generarYGuardarPDF(docKey, sigImg){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pac=S.paciente||{};
    const med=S.medico||{};
    const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"});
    const nomPac=`${pac.nombre||""} ${pac.apellido_paterno||""} ${pac.apellido_materno||""}`.trim();
    const medNom=`${med.titulo||"Dr."} ${med.nombre||""} ${med.apellidos||""}`.trim();
    const nombre=DOCS_NOMBRES[docKey]||docKey;

    // Header
    doc.setFillColor(13,71,161);
    doc.rect(0,0,210,28,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(14);doc.setFont("helvetica","bold");
    doc.text("QP Clinic — Especialistas en Salud Integral",14,12);
    doc.setFontSize(9);doc.setFont("helvetica","normal");
    doc.text("Insurgentes Sur 933, Nápoles, Benito Juárez, CDMX",14,19);
    doc.text(medNom+" | "+med.especialidad_1+" | Céd. "+med.cedula_medico,14,24);

    // Título
    doc.setTextColor(26,35,126);
    doc.setFontSize(13);doc.setFont("helvetica","bold");
    doc.text(nombre.toUpperCase(),105,38,{align:"center"});

    // Fecha
    doc.setTextColor(84,110,122);
    doc.setFontSize(9);doc.setFont("helvetica","normal");
    doc.text("Ciudad de México, "+hoy,195,38,{align:"right"});

    // Paciente
    doc.setDrawColor(207,216,220);
    doc.setLineWidth(0.3);doc.line(14,42,196,42);
    doc.setTextColor(26,35,126);
    doc.setFontSize(10);doc.setFont("helvetica","bold");
    doc.text("Paciente: ",14,49);
    doc.setTextColor(38,50,56);doc.setFont("helvetica","normal");
    doc.text(nomPac,40,49);

    // Contenido del documento
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(38,50,56);
    const texto=getDocTexto(docKey,pac,med);
    const lines=doc.splitTextToSize(texto,175);
    let y=58;
    for(const line of lines){
      if(y>240){doc.addPage();y=20;}
      if(line.startsWith("CONSENTIMIENTO")||line.startsWith("AVISO")||line.startsWith("CARTA")){
        doc.setFont("helvetica","bold");doc.setTextColor(13,71,161);
      } else if(line===line.toUpperCase()&&line.length>3){
        doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
      } else {
        doc.setFont("helvetica","normal");doc.setTextColor(38,50,56);
      }
      doc.text(line,14,y);
      y+=4.5;
    }

    // Área de firmas
    if(y>220)doc.addPage();
    y=Math.max(y+10,230);
    doc.setDrawColor(207,216,220);
    doc.setLineWidth(0.3);doc.line(14,y,196,y);
    y+=8;

    // Firma del paciente (imagen del canvas)
    doc.addImage(sigImg,"PNG",14,y,60,25);
    doc.setDrawColor(38,50,56);doc.setLineWidth(0.3);
    doc.line(14,y+28,74,y+28);
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
    doc.text("Firma del paciente",14,y+33);
    doc.setFont("helvetica","normal");doc.setTextColor(84,110,122);
    doc.text(nomPac,14,y+38);
    doc.text("Firmado digitalmente: "+new Date().toLocaleString("es-MX"),14,y+42);

    // Firma médico (línea en blanco)
    doc.setDrawColor(38,50,56);doc.line(120,y+28,196,y+28);
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(38,50,56);
    doc.text("Firma del médico",120,y+33);
    doc.setFont("helvetica","normal");doc.setTextColor(84,110,122);
    doc.text(medNom,120,y+38);

    // Footer
    doc.setFontSize(7);doc.setTextColor(144,164,174);
    doc.text("Documento generado conforme a NOM-004-SSA3-2012. QP Clinic — qpclinic.org",105,285,{align:"center"});

    // Convertir a blob y subir a Supabase
    const pdfBlob=doc.output("blob");
    const fileName=`firmas/${PAC_ID}/${docKey}_${Date.now()}.pdf`;
    const {error:uploadError}=await SB.storage.from("expedientes").upload(fileName,pdfBlob,{contentType:"application/pdf",upsert:true});

    if(uploadError)throw uploadError;

    // Actualizar registro en anexos
    const pendiente=S.pendientes.find(p=>p.titulo.toLowerCase().includes(docKey));
    if(pendiente){
      await SB.from("anexos").update({
        firmado:true,
        storage_path:fileName,
        fecha:new Date().toISOString().split("T")[0],
        titulo:nombre.toUpperCase(),
        tipo_documento:docKey,
        origen:"digital",
        fecha_firma:new Date().toISOString(),
        nombre_firmante:nomPac,
      }).eq("id",pendiente.id);
    } else {
      // Crear nuevo registro
      await SB.from("anexos").insert({
        paciente_id:PAC_ID,
        titulo:nombre.toUpperCase(),
        tipo_documento:docKey,
        origen:"digital",
        firmado:true,
        storage_path:fileName,
        fecha:new Date().toISOString().split("T")[0],
        fecha_firma:new Date().toISOString(),
        nombre_firmante:nomPac,
        codigo_firma:COD,
      });
    }

    // Siguiente documento o terminar
    S.docIndex++;
    if(S.docIndex<S.docs.length){
      mostrarDocumento();
      toast("✓ Documento firmado — continuando con el siguiente");
    } else {
      mostrarTerminado();
    }
  } catch(err){
    console.error(err);
    R().innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
      <div class="card" style="text-align:center;max-width:360px">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <h3 style="color:#C62828;margin-bottom:8px">Error al guardar</h3>
        <p style="font-size:13px;color:#546E7A;margin-bottom:16px">${err.message}</p>
        <button class="btn-primary" onclick="mostrarFirma()">Intentar de nuevo</button>
      </div>
    </div>`;
  }
}

mostrarVerificacion();
</script>
